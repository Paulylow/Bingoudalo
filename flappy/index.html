<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flappy JEJ</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --cyan: #00F5FF;
    --magenta: #FF0080;
    --gold: #FFD700;
    --bg: #060810;
    --panel: rgba(8, 10, 20, 0.95);
    --border: rgba(0, 245, 255, 0.15);
    --glow-c: rgba(0, 245, 255, 0.4);
    --glow-m: rgba(255, 0, 128, 0.4);
  }

  body {
    background: var(--bg);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Bebas Neue', sans-serif;
    overflow: hidden;
    position: relative;
  }

  /* Animated grid background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(0,245,255,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,245,255,0.03) 1px, transparent 1px);
    background-size: 50px 50px;
    animation: gridScroll 20s linear infinite;
    pointer-events: none;
    z-index: 0;
  }

  /* Radial vignette */
  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background: radial-gradient(ellipse at 50% 50%, transparent 30%, rgba(6,8,16,0.85) 100%);
    pointer-events: none;
    z-index: 0;
  }

  @keyframes gridScroll {
    0% { background-position: 0 0; }
    100% { background-position: 50px 50px; }
  }

  /* HUB BUTTON */
  #hub-btn {
    position: fixed;
    top: 18px;
    left: 18px;
    z-index: 100;
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 8px 16px 8px 12px;
    background: rgba(6, 8, 16, 0.9);
    border: 1px solid rgba(0, 245, 255, 0.3);
    border-radius: 8px;
    text-decoration: none;
    color: var(--cyan);
    font-family: 'Orbitron', monospace;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    transition: all 0.2s ease;
    backdrop-filter: blur(10px);
    cursor: pointer;
  }

  #hub-btn::before {
    content: '';
    position: absolute;
    inset: 0;
    border-radius: 8px;
    background: linear-gradient(135deg, rgba(0,245,255,0.05), transparent);
    opacity: 0;
    transition: opacity 0.2s;
  }

  #hub-btn:hover {
    border-color: var(--cyan);
    box-shadow: 0 0 20px var(--glow-c), inset 0 0 20px rgba(0,245,255,0.05);
    color: #fff;
  }

  #hub-btn:hover::before { opacity: 1; }

  #hub-btn svg {
    flex-shrink: 0;
    transition: transform 0.2s;
  }

  #hub-btn:hover svg { transform: translateX(-3px); }

  /* MAIN WRAPPER */
  #game-shell {
    position: relative;
    z-index: 10;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0;
  }

  /* HEADER */
  #game-header {
    width: 490px;
    padding: 18px 24px 14px;
    background: linear-gradient(180deg, rgba(0,245,255,0.04) 0%, transparent 100%);
    border: 1px solid var(--border);
    border-bottom: none;
    border-radius: 16px 16px 0 0;
    text-align: center;
    position: relative;
    overflow: hidden;
  }

  #game-header::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--cyan), transparent);
    opacity: 0.6;
  }

  #game-title {
    font-family: 'Orbitron', monospace;
    font-size: 32px;
    font-weight: 900;
    letter-spacing: 8px;
    background: linear-gradient(90deg, var(--cyan) 0%, #fff 50%, var(--magenta) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    line-height: 1;
    text-shadow: none;
    filter: drop-shadow(0 0 20px rgba(0,245,255,0.3));
  }

  #game-sub {
    font-family: 'Share Tech Mono', monospace;
    font-size: 9px;
    color: rgba(0,245,255,0.35);
    letter-spacing: 4px;
    margin-top: 5px;
    text-transform: uppercase;
  }

  /* CANVAS CONTAINER */
  #canvas-wrap {
    position: relative;
    width: 490px;
    border-left: 1px solid var(--border);
    border-right: 1px solid var(--border);
  }

  #fb-canvas {
    display: block;
    width: 490px;
    height: 490px;
    cursor: pointer;
    image-rendering: pixelated;
  }

  /* Scanlines overlay */
  #canvas-wrap::after {
    content: '';
    position: absolute;
    inset: 0;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(0,0,0,0.08) 2px,
      rgba(0,0,0,0.08) 4px
    );
    pointer-events: none;
    z-index: 5;
  }

  /* Corner accents */
  .corner {
    position: absolute;
    width: 16px;
    height: 16px;
    z-index: 10;
    pointer-events: none;
  }
  .corner-tl { top: -1px; left: -1px; border-top: 2px solid var(--cyan); border-left: 2px solid var(--cyan); }
  .corner-tr { top: -1px; right: -1px; border-top: 2px solid var(--cyan); border-right: 2px solid var(--cyan); }
  .corner-bl { bottom: -1px; left: -1px; border-bottom: 2px solid var(--cyan); border-left: 2px solid var(--cyan); }
  .corner-br { bottom: -1px; right: -1px; border-bottom: 2px solid var(--cyan); border-right: 2px solid var(--cyan); }

  /* HUD FOOTER */
  #game-footer {
    width: 490px;
    padding: 14px 20px;
    background: rgba(6, 8, 16, 0.95);
    border: 1px solid var(--border);
    border-top: 1px solid rgba(0,245,255,0.08);
    border-radius: 0 0 16px 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: relative;
  }

  #game-footer::before {
    content: '';
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(255,0,128,0.3), transparent);
  }

  .hud-block {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 2px;
    min-width: 90px;
  }

  .hud-label {
    font-family: 'Share Tech Mono', monospace;
    font-size: 8px;
    letter-spacing: 3px;
    color: rgba(255,255,255,0.2);
    text-transform: uppercase;
  }

  .hud-value {
    font-family: 'Orbitron', monospace;
    font-size: 28px;
    font-weight: 900;
    line-height: 1;
  }

  #score-val { color: var(--cyan); filter: drop-shadow(0 0 8px var(--glow-c)); }
  #best-val  { color: var(--gold); filter: drop-shadow(0 0 8px rgba(255,215,0,0.4)); }

  .hud-sep {
    width: 1px;
    height: 40px;
    background: linear-gradient(180deg, transparent, rgba(0,245,255,0.2), transparent);
  }

  /* Pulse on score change */
  @keyframes scorePulse {
    0% { transform: scale(1); }
    50% { transform: scale(1.25); }
    100% { transform: scale(1); }
  }
  .score-pulse { animation: scorePulse 0.2s ease; }

  /* Ambient glow behind game */
  .game-glow {
    position: absolute;
    z-index: -1;
    border-radius: 50%;
    filter: blur(80px);
    pointer-events: none;
  }
  .glow-left  { width: 300px; height: 300px; background: rgba(0,245,255,0.06); top: 20%; left: -80px; }
  .glow-right { width: 300px; height: 300px; background: rgba(255,0,128,0.05); top: 40%; right: -80px; }
</style>
</head>
<body>

<!-- HUB BUTTON -->
<a id="hub-btn" href="https://bingoudalo.vercel.app/index.html">
  <svg width="14" height="14" viewBox="0 0 14 14" fill="none" xmlns="http://www.w3.org/2000/svg">
    <path d="M8.5 2L3.5 7L8.5 12" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
  </svg>
  HUB
</a>

<!-- AMBIENT GLOWS -->
<div class="game-glow glow-left"></div>
<div class="game-glow glow-right"></div>

<!-- GAME SHELL -->
<div id="game-shell">
  <div id="game-header">
    <div id="game-title">FLAPPY JEJ</div>
    <div id="game-sub">ESPACE &nbsp;/&nbsp; CLIC &nbsp;/&nbsp; TAP POUR VOLER</div>
  </div>

  <div id="canvas-wrap">
    <div class="corner corner-tl"></div>
    <div class="corner corner-tr"></div>
    <div class="corner corner-bl"></div>
    <div class="corner corner-br"></div>
    <canvas id="fb-canvas" width="490" height="490"></canvas>
  </div>

  <div id="game-footer">
    <div class="hud-block">
      <span class="hud-label">Score</span>
      <span class="hud-value" id="score-val">0</span>
    </div>
    <div class="hud-sep"></div>
    <div class="hud-block">
      <span class="hud-label">Meilleur</span>
      <span class="hud-value" id="best-val">0</span>
    </div>
  </div>
</div>

<script>
const canvas = document.getElementById('fb-canvas');
const ctx = canvas.getContext('2d');
const W = canvas.width, H = canvas.height;

const CYAN    = '#00F5FF';
const MAGENTA = '#FF0080';
const GOLD    = '#FFD700';
const BG      = '#060810';
const PIPE_DARK   = '#0a0c1a';
const PIPE_BORDER = '#1a1d30';
const PIPE_W  = 56;
const GAP     = 150;
const PIPE_SPEED = 2.4;
const BIRD_R  = 16;

let state = 'idle';
let bird, pipes, score, bestScore = 0, frame = 0, raf;
let particles = [];
let stars = [];

// Generate stars once
for (let i = 0; i < 60; i++) {
  stars.push({ x: Math.random()*W, y: Math.random()*H, r: Math.random()*1.2+0.2, a: Math.random() });
}

function init() {
  bird = { x: 110, y: H/2, vy: 0, angle: 0 };
  pipes = [];
  particles = [];
  score = 0;
  frame = 0;
  updateHUD();
}

function flap() {
  if (state === 'dead') { state = 'idle'; init(); draw(); return; }
  if (state === 'idle') { state = 'playing'; loop(); }
  bird.vy = -7;
  spawnFlapParticles();
}

canvas.addEventListener('click', flap);
document.addEventListener('keydown', e => {
  if (e.code === 'Space' || e.code === 'ArrowUp') { e.preventDefault(); flap(); }
});

// Particles
function spawnFlapParticles() {
  for (let i = 0; i < 6; i++) {
    particles.push({
      x: bird.x - 8, y: bird.y + 8,
      vx: -Math.random()*2 - 0.5,
      vy: Math.random()*2 - 1,
      life: 1, maxLife: 1,
      r: Math.random()*3 + 1,
      color: Math.random() > 0.5 ? CYAN : '#fff'
    });
  }
}

function spawnDeathParticles() {
  for (let i = 0; i < 24; i++) {
    const a = (i / 24) * Math.PI * 2;
    const spd = Math.random() * 4 + 1;
    particles.push({
      x: bird.x, y: bird.y,
      vx: Math.cos(a) * spd,
      vy: Math.sin(a) * spd,
      life: 1, maxLife: 1,
      r: Math.random() * 4 + 1,
      color: i % 3 === 0 ? MAGENTA : (i % 3 === 1 ? CYAN : GOLD)
    });
  }
}

function updateParticles() {
  for (let p of particles) {
    p.x += p.vx; p.y += p.vy;
    p.vy += 0.1;
    p.life -= 0.04;
  }
  particles = particles.filter(p => p.life > 0);
}

function drawParticles() {
  for (let p of particles) {
    ctx.save();
    ctx.globalAlpha = p.life;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.r, 0, Math.PI*2);
    ctx.fillStyle = p.color;
    ctx.shadowColor = p.color;
    ctx.shadowBlur = 8;
    ctx.fill();
    ctx.restore();
  }
}

function spawnPipe() {
  const topH = 80 + Math.random() * (H - GAP - 160);
  pipes.push({ x: W + 10, topH, scored: false });
}

function update() {
  frame++;
  bird.vy += 0.38;
  bird.y += bird.vy;
  bird.angle = Math.min(Math.max(bird.vy * 3.5, -30), 80);

  if (frame % 88 === 0) spawnPipe();

  for (let p of pipes) {
    p.x -= PIPE_SPEED;
    if (!p.scored && p.x + PIPE_W < bird.x) {
      p.scored = true; score++;
      updateHUD(true);
    }
  }
  pipes = pipes.filter(p => p.x + PIPE_W > -10);

  updateParticles();

  if (bird.y - BIRD_R < 0 || bird.y + BIRD_R > H) return die();
  for (let p of pipes) {
    const inX = bird.x + BIRD_R - 6 > p.x && bird.x - BIRD_R + 6 < p.x + PIPE_W;
    const inTop = bird.y - BIRD_R + 6 < p.topH;
    const inBot = bird.y + BIRD_R - 6 > p.topH + GAP;
    if (inX && (inTop || inBot)) return die();
  }
}

function die() {
  spawnDeathParticles();
  state = 'dead';
  if (score > bestScore) bestScore = score;
  updateHUD();
  cancelAnimationFrame(raf);
  // Brief flash then draw dead
  let flashCount = 0;
  function flashFrame() {
    updateParticles();
    draw();
    ctx.fillStyle = `rgba(255,0,128,${0.3 * (1 - flashCount/6)})`;
    ctx.fillRect(0, 0, W, H);
    flashCount++;
    if (flashCount < 6) requestAnimationFrame(flashFrame);
    else drawDead();
  }
  flashFrame();
}

function updateHUD(pulse = false) {
  const sv = document.getElementById('score-val');
  const bv = document.getElementById('best-val');
  sv.textContent = score;
  bv.textContent = bestScore;
  if (pulse) {
    sv.classList.remove('score-pulse');
    void sv.offsetWidth;
    sv.classList.add('score-pulse');
  }
}

// ---- DRAWING ----

function drawBird(x, y, angle) {
  ctx.save();
  ctx.translate(x, y);
  ctx.rotate(angle * Math.PI / 180);

  // Outer glow
  const grd = ctx.createRadialGradient(0, 0, 2, 0, 0, BIRD_R + 14);
  grd.addColorStop(0, 'rgba(0,245,255,0.2)');
  grd.addColorStop(1, 'rgba(0,245,255,0)');
  ctx.beginPath(); ctx.arc(0, 0, BIRD_R + 14, 0, Math.PI*2);
  ctx.fillStyle = grd; ctx.fill();

  // Body fill
  const bodyGrd = ctx.createRadialGradient(-4, -4, 2, 0, 0, BIRD_R);
  bodyGrd.addColorStop(0, '#0d1830');
  bodyGrd.addColorStop(1, '#060810');
  ctx.beginPath(); ctx.arc(0, 0, BIRD_R, 0, Math.PI*2);
  ctx.fillStyle = bodyGrd; ctx.fill();

  // Body border
  ctx.strokeStyle = CYAN;
  ctx.lineWidth = 2;
  ctx.shadowColor = CYAN;
  ctx.shadowBlur = 10;
  ctx.stroke();
  ctx.shadowBlur = 0;

  // Inner ring detail
  ctx.beginPath(); ctx.arc(0, 0, BIRD_R - 5, 0, Math.PI*2);
  ctx.strokeStyle = 'rgba(0,245,255,0.12)';
  ctx.lineWidth = 1;
  ctx.stroke();

  // Wing
  ctx.save();
  ctx.translate(-3, 4);
  ctx.beginPath(); ctx.ellipse(0, 0, 10, 5, -0.3, 0, Math.PI*2);
  ctx.fillStyle = 'rgba(0,245,255,0.18)';
  ctx.fill();
  ctx.strokeStyle = 'rgba(0,245,255,0.5)';
  ctx.lineWidth = 1.5;
  ctx.stroke();
  ctx.restore();

  // Eye white
  ctx.beginPath(); ctx.arc(6, -4, 5, 0, Math.PI*2);
  ctx.fillStyle = CYAN;
  ctx.shadowColor = CYAN; ctx.shadowBlur = 8;
  ctx.fill();
  ctx.shadowBlur = 0;
  // Eye pupil
  ctx.beginPath(); ctx.arc(7, -4, 2.5, 0, Math.PI*2);
  ctx.fillStyle = '#060810'; ctx.fill();
  // Eye shine
  ctx.beginPath(); ctx.arc(8, -5, 1, 0, Math.PI*2);
  ctx.fillStyle = '#fff'; ctx.fill();

  // Beak
  ctx.beginPath();
  ctx.moveTo(13, -2); ctx.lineTo(21, 0); ctx.lineTo(13, 4);
  ctx.closePath();
  ctx.fillStyle = GOLD;
  ctx.shadowColor = GOLD; ctx.shadowBlur = 6;
  ctx.fill();
  ctx.shadowBlur = 0;

  ctx.restore();
}

function drawPipe(p) {
  const r = 7;

  // Pipe body gradient
  const pipeGrd = ctx.createLinearGradient(p.x, 0, p.x + PIPE_W, 0);
  pipeGrd.addColorStop(0, '#0a0c1a');
  pipeGrd.addColorStop(0.3, '#0f1225');
  pipeGrd.addColorStop(1, '#070912');

  ctx.fillStyle = pipeGrd;
  ctx.strokeStyle = '#1c1f35';
  ctx.lineWidth = 1.5;

  // Top pipe
  roundRect(ctx, p.x, 0, PIPE_W, p.topH - 18, [0, 0, r, r]);
  ctx.fill(); ctx.stroke();
  // Top cap
  const capGrd = ctx.createLinearGradient(p.x - 5, 0, p.x + PIPE_W + 5, 0);
  capGrd.addColorStop(0, '#0c0e20');
  capGrd.addColorStop(0.4, '#141728');
  capGrd.addColorStop(1, '#080a18');
  ctx.fillStyle = capGrd;
  roundRect(ctx, p.x - 6, p.topH - 28, PIPE_W + 12, 28, [0, 0, r, r]);
  ctx.fill();
  ctx.strokeStyle = '#242640';
  ctx.stroke();

  // Bottom pipe
  ctx.fillStyle = pipeGrd;
  ctx.strokeStyle = '#1c1f35';
  const botY = p.topH + GAP;
  roundRect(ctx, p.x, botY + 18, PIPE_W, H - botY - 18, [r, r, 0, 0]);
  ctx.fill(); ctx.stroke();
  // Bottom cap
  ctx.fillStyle = capGrd;
  roundRect(ctx, p.x - 6, botY, PIPE_W + 12, 28, [r, r, 0, 0]);
  ctx.fill();
  ctx.strokeStyle = '#242640';
  ctx.stroke();

  // Neon edge glow on caps
  ctx.save();
  ctx.strokeStyle = MAGENTA;
  ctx.lineWidth = 1.5;
  ctx.globalAlpha = 0.25;
  ctx.shadowColor = MAGENTA;
  ctx.shadowBlur = 8;
  ctx.beginPath(); ctx.moveTo(p.x-6, p.topH - 27); ctx.lineTo(p.x+PIPE_W+6, p.topH - 27); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(p.x-6, botY+1); ctx.lineTo(p.x+PIPE_W+6, botY+1); ctx.stroke();
  ctx.restore();

  // Pipe body highlight stripe
  ctx.save();
  ctx.fillStyle = 'rgba(255,255,255,0.03)';
  ctx.fillRect(p.x + 8, 0, 6, p.topH - 18);
  ctx.fillRect(p.x + 8, botY + 18, 6, H);
  ctx.restore();
}

function roundRect(ctx, x, y, w, h, radii) {
  const [tl, tr, br, bl] = radii;
  ctx.beginPath();
  ctx.moveTo(x+tl, y);
  ctx.lineTo(x+w-tr, y); ctx.arcTo(x+w, y, x+w, y+tr, tr);
  ctx.lineTo(x+w, y+h-br); ctx.arcTo(x+w, y+h, x+w-br, y+h, br);
  ctx.lineTo(x+bl, y+h); ctx.arcTo(x, y+h, x, y+h-bl, bl);
  ctx.lineTo(x, y+tl); ctx.arcTo(x, y, x+tl, y, tl);
  ctx.closePath();
}

function drawBg() {
  ctx.fillStyle = BG;
  ctx.fillRect(0, 0, W, H);

  // Subtle stars
  for (let s of stars) {
    ctx.globalAlpha = s.a * 0.5;
    ctx.beginPath(); ctx.arc(s.x, s.y, s.r, 0, Math.PI*2);
    ctx.fillStyle = '#fff'; ctx.fill();
  }
  ctx.globalAlpha = 1;

  // Ground
  const groundY = H - 28;
  const groundGrd = ctx.createLinearGradient(0, groundY, 0, H);
  groundGrd.addColorStop(0, '#0c0f1e');
  groundGrd.addColorStop(1, '#060810');
  ctx.fillStyle = groundGrd;
  ctx.fillRect(0, groundY, W, H - groundY);

  // Ground line
  ctx.save();
  ctx.strokeStyle = CYAN;
  ctx.lineWidth = 1.5;
  ctx.globalAlpha = 0.25;
  ctx.shadowColor = CYAN; ctx.shadowBlur = 10;
  ctx.beginPath(); ctx.moveTo(0, groundY); ctx.lineTo(W, groundY);
  ctx.stroke();
  ctx.restore();
}

function drawFloatingScore() {
  ctx.save();
  ctx.font = '900 80px Orbitron, sans-serif';
  ctx.textAlign = 'center';
  ctx.fillStyle = 'rgba(255,255,255,0.04)';
  ctx.fillText(score, W/2 + 2, 96);
  ctx.fillStyle = 'rgba(255,255,255,0.55)';
  ctx.fillText(score, W/2, 94);
  ctx.restore();
}

function draw() {
  drawBg();
  for (let p of pipes) drawPipe(p);
  drawParticles();
  drawBird(bird.x, bird.y, bird.angle);
  drawFloatingScore();
}

function drawOverlayBox(x, y, w, h, borderColor) {
  ctx.save();
  ctx.fillStyle = 'rgba(4, 5, 14, 0.92)';
  roundRect(ctx, x, y, w, h, [14,14,14,14]);
  ctx.fill();
  ctx.strokeStyle = borderColor;
  ctx.lineWidth = 1.5;
  ctx.globalAlpha = 0.6;
  ctx.shadowColor = borderColor;
  ctx.shadowBlur = 16;
  roundRect(ctx, x, y, w, h, [14,14,14,14]);
  ctx.stroke();
  ctx.restore();
}

function drawIdle() {
  drawBg();
  drawBird(bird.x, bird.y, 0);

  const bx = W/2 - 150, by = H/2 - 64, bw = 300, bh = 120;
  drawOverlayBox(bx, by, bw, bh, CYAN);

  ctx.save();
  ctx.font = '900 38px Orbitron, sans-serif';
  ctx.textAlign = 'center';
  ctx.fillStyle = CYAN;
  ctx.shadowColor = CYAN; ctx.shadowBlur = 20;
  ctx.fillText('FLAPPY JEJ', W/2, H/2 - 14);
  ctx.shadowBlur = 0;

  ctx.font = '400 12px Share Tech Mono, monospace';
  ctx.fillStyle = 'rgba(255,255,255,0.35)';
  ctx.letterSpacing = '3px';
  ctx.fillText('CLIC / ESPACE POUR JOUER', W/2, H/2 + 22);
  ctx.restore();
}

function drawDead() {
  draw();
  ctx.fillStyle = 'rgba(4, 5, 14, 0.75)';
  ctx.fillRect(0, 0, W, H);

  const bx = W/2 - 155, by = H/2 - 100, bw = 310, bh = 200;
  drawOverlayBox(bx, by, bw, bh, MAGENTA);

  ctx.save();
  ctx.font = '900 54px Orbitron, sans-serif';
  ctx.textAlign = 'center';
  ctx.fillStyle = MAGENTA;
  ctx.shadowColor = MAGENTA; ctx.shadowBlur = 24;
  ctx.fillText('GAME', W/2, H/2 - 42);
  ctx.fillText('OVER', W/2, H/2 + 4);
  ctx.shadowBlur = 0;

  ctx.font = '400 10px Share Tech Mono, monospace';
  ctx.fillStyle = 'rgba(255,255,255,0.3)';
  ctx.fillText('SCORE  ' + score + '   ·   MEILLEUR  ' + bestScore, W/2, H/2 + 36);

  ctx.font = '700 11px Share Tech Mono, monospace';
  ctx.fillStyle = CYAN;
  ctx.shadowColor = CYAN; ctx.shadowBlur = 10;
  ctx.fillText('[ CLIC / ESPACE POUR REJOUER ]', W/2, H/2 + 72);
  ctx.restore();
}

function loop() {
  if (state !== 'playing') return;
  update();
  draw();
  raf = requestAnimationFrame(loop);
}

init();
drawIdle();
</script>
</body>
</html>
