
<style>
  @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&display=swap');
  #fb-wrap { background:#0b0c10; border-radius:16px; overflow:hidden; display:flex; flex-direction:column; align-items:center; font-family:'Bebas Neue',sans-serif; padding-bottom:16px; }
  #fb-header { width:100%; text-align:center; padding:10px; background:rgba(0,0,0,0.6); border-bottom:2px solid #1f2833; }
  #fb-title { font-size:28px; letter-spacing:4px; background:linear-gradient(90deg,#00FFFF,#FF00FF); -webkit-background-clip:text; -webkit-text-fill-color:transparent; line-height:1; }
  #fb-sub { font-size:10px; color:#444; letter-spacing:2px; margin-top:2px; }
  #fb-canvas { display:block; border:2px solid #252535; border-radius:8px; margin:12px auto 0; cursor:pointer; }
  #fb-hud { display:flex; gap:20px; margin-top:8px; }
  .fb-stat { background:rgba(0,0,0,0.6); border:1px solid #1a1b2e; border-radius:8px; padding:6px 14px; text-align:center; }
  .fb-stat-label { font-size:9px; letter-spacing:2px; color:#3a3a5a; }
  .fb-stat-val { font-size:22px; color:#fff; line-height:1; }
  #fb-score-val { color:#00FFFF; text-shadow:0 0 10px rgba(0,255,255,0.5); }
  #fb-best-val { color:#FFD700; text-shadow:0 0 10px rgba(255,215,0,0.5); }
</style>

<div id="fb-wrap">
  <div id="fb-header">
    <div id="fb-title">FLAPPY JEJ</div>
    <div id="fb-sub">ESPACE / CLIC / TAP POUR VOLER</div>
  </div>
  <canvas id="fb-canvas" width="460" height="520"></canvas>
  <div id="fb-hud">
    <div class="fb-stat"><div class="fb-stat-label">SCORE</div><div class="fb-stat-val" id="fb-score-val">0</div></div>
    <div class="fb-stat"><div class="fb-stat-label">MEILLEUR</div><div class="fb-stat-val" id="fb-best-val">0</div></div>
  </div>
</div>

<script>
const canvas = document.getElementById('fb-canvas');
const ctx = canvas.getContext('2d');
const W = canvas.width, H = canvas.height;

const CYAN = '#00FFFF', MAGENTA = '#FF00FF', GOLD = '#FFD700';
const BG = '#0b0c10', PIPE_DARK = '#0e1020', PIPE_BORDER = '#252535';
const PIPE_W = 54, GAP = 145, PIPE_SPEED = 2.2;
const BIRD_R = 16;

let state = 'idle'; // idle | playing | dead
let bird, pipes, score, bestScore = 0, frame = 0, raf;

function init() {
  bird = { x: 100, y: H / 2, vy: 0, angle: 0 };
  pipes = [];
  score = 0;
  frame = 0;
  updateHUD();
}

function flap() {
  if (state === 'dead') { state = 'idle'; init(); draw(); return; }
  if (state === 'idle') { state = 'playing'; loop(); }
  bird.vy = -6.8;
}

canvas.addEventListener('click', flap);
document.addEventListener('keydown', e => { if (e.code === 'Space' || e.code === 'ArrowUp') { e.preventDefault(); flap(); } });

function spawnPipe() {
  const topH = 80 + Math.random() * (H - GAP - 160);
  pipes.push({ x: W + 10, topH, scored: false });
}

function update() {
  frame++;
  // Bird physics
  bird.vy += 0.38;
  bird.y += bird.vy;
  bird.angle = Math.min(Math.max(bird.vy * 3.5, -30), 80);

  // Spawn pipes
  if (frame % 90 === 0) spawnPipe();

  // Move pipes
  for (let p of pipes) {
    p.x -= PIPE_SPEED;
    if (!p.scored && p.x + PIPE_W < bird.x) { p.scored = true; score++; updateHUD(); }
  }
  pipes = pipes.filter(p => p.x + PIPE_W > -10);

  // Collision
  if (bird.y - BIRD_R < 0 || bird.y + BIRD_R > H) return die();
  for (let p of pipes) {
    const inX = bird.x + BIRD_R - 6 > p.x && bird.x - BIRD_R + 6 < p.x + PIPE_W;
    const inTop = bird.y - BIRD_R + 6 < p.topH;
    const inBot = bird.y + BIRD_R - 6 > p.topH + GAP;
    if (inX && (inTop || inBot)) return die();
  }
}

function die() {
  state = 'dead';
  if (score > bestScore) bestScore = score;
  updateHUD();
  cancelAnimationFrame(raf);
  drawDead();
}

function updateHUD() {
  document.getElementById('fb-score-val').textContent = score;
  document.getElementById('fb-best-val').textContent = bestScore;
}

function drawBird(x, y, angle) {
  ctx.save();
  ctx.translate(x, y);
  ctx.rotate(angle * Math.PI / 180);

  // Body glow
  const grd = ctx.createRadialGradient(0, 0, 2, 0, 0, BIRD_R + 8);
  grd.addColorStop(0, 'rgba(0,255,255,0.15)');
  grd.addColorStop(1, 'rgba(0,255,255,0)');
  ctx.beginPath(); ctx.arc(0, 0, BIRD_R + 8, 0, Math.PI * 2);
  ctx.fillStyle = grd; ctx.fill();

  // Body
  ctx.beginPath(); ctx.arc(0, 0, BIRD_R, 0, Math.PI * 2);
  ctx.fillStyle = '#0b0c10'; ctx.fill();
  ctx.strokeStyle = CYAN; ctx.lineWidth = 2.5; ctx.stroke();

  // Eye
  ctx.beginPath(); ctx.arc(6, -4, 4, 0, Math.PI * 2);
  ctx.fillStyle = CYAN; ctx.fill();
  ctx.beginPath(); ctx.arc(7, -4, 2, 0, Math.PI * 2);
  ctx.fillStyle = '#0b0c10'; ctx.fill();

  // Wing
  ctx.save(); ctx.translate(-4, 4);
  ctx.beginPath(); ctx.ellipse(0, 0, 9, 5, -0.3, 0, Math.PI * 2);
  ctx.fillStyle = 'rgba(0,255,255,0.2)'; ctx.fill();
  ctx.strokeStyle = CYAN; ctx.lineWidth = 1.5; ctx.stroke();
  ctx.restore();

  // Beak
  ctx.beginPath(); ctx.moveTo(12, -2); ctx.lineTo(20, 0); ctx.lineTo(12, 4);
  ctx.closePath(); ctx.fillStyle = GOLD; ctx.fill();

  ctx.restore();
}

function drawPipe(p) {
  const r = 6;
  // Top pipe body
  ctx.fillStyle = PIPE_DARK;
  ctx.strokeStyle = PIPE_BORDER;
  ctx.lineWidth = 1.5;
  roundRect(ctx, p.x, 0, PIPE_W, p.topH - 16, [0, 0, r, r]);
  ctx.fill(); ctx.stroke();

  // Top cap
  roundRect(ctx, p.x - 5, p.topH - 26, PIPE_W + 10, 26, [0, 0, r, r]);
  ctx.fill(); ctx.stroke();

  // Bottom pipe body
  const botY = p.topH + GAP;
  roundRect(ctx, p.x, botY + 16, PIPE_W, H - botY - 16, [r, r, 0, 0]);
  ctx.fill(); ctx.stroke();

  // Bottom cap
  roundRect(ctx, p.x - 5, botY, PIPE_W + 10, 26, [r, r, 0, 0]);
  ctx.fill(); ctx.stroke();

  // Neon edge lines on caps
  ctx.strokeStyle = MAGENTA;
  ctx.lineWidth = 1;
  ctx.globalAlpha = 0.35;
  ctx.beginPath(); ctx.moveTo(p.x - 5, p.topH - 25); ctx.lineTo(p.x + PIPE_W + 5, p.topH - 25);
  ctx.stroke();
  ctx.beginPath(); ctx.moveTo(p.x - 5, botY + 1); ctx.lineTo(p.x + PIPE_W + 5, botY + 1);
  ctx.stroke();
  ctx.globalAlpha = 1;
}

function roundRect(ctx, x, y, w, h, radii) {
  const [tl, tr, br, bl] = radii;
  ctx.beginPath();
  ctx.moveTo(x + tl, y);
  ctx.lineTo(x + w - tr, y); ctx.arcTo(x + w, y, x + w, y + tr, tr);
  ctx.lineTo(x + w, y + h - br); ctx.arcTo(x + w, y + h, x + w - br, y + h, br);
  ctx.lineTo(x + bl, y + h); ctx.arcTo(x, y + h, x, y + h - bl, bl);
  ctx.lineTo(x, y + tl); ctx.arcTo(x, y, x + tl, y, tl);
  ctx.closePath();
}

function drawBg() {
  ctx.fillStyle = BG;
  ctx.fillRect(0, 0, W, H);

  // Grid lines
  ctx.strokeStyle = 'rgba(255,255,255,0.025)';
  ctx.lineWidth = 1;
  for (let x = 0; x < W; x += 40) { ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, H); ctx.stroke(); }
  for (let y = 0; y < H; y += 40) { ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke(); }

  // Ground
  ctx.fillStyle = '#0d0f1e';
  ctx.fillRect(0, H - 22, W, 22);
  ctx.fillStyle = CYAN;
  ctx.globalAlpha = 0.3;
  ctx.fillRect(0, H - 22, W, 2);
  ctx.globalAlpha = 1;
}

function drawScore() {
  ctx.font = '800 64px Bebas Neue, sans-serif';
  ctx.textAlign = 'center';
  ctx.fillStyle = 'rgba(255,255,255,0.08)';
  ctx.fillText(score, W / 2 + 2, 80);
  ctx.fillStyle = 'rgba(255,255,255,0.7)';
  ctx.fillText(score, W / 2, 78);
}

function draw() {
  drawBg();
  for (let p of pipes) drawPipe(p);
  drawBird(bird.x, bird.y, bird.angle);
  drawScore();
}

function drawIdle() {
  drawBg();
  drawBird(bird.x, bird.y, 0);

  // Prompt box
  ctx.save();
  ctx.fillStyle = 'rgba(0,0,0,0.7)';
  roundRect(ctx, W/2 - 130, H/2 - 55, 260, 100, [12, 12, 12, 12]);
  ctx.fill();
  ctx.strokeStyle = CYAN; ctx.lineWidth = 1.5; ctx.globalAlpha = 0.6;
  roundRect(ctx, W/2 - 130, H/2 - 55, 260, 100, [12, 12, 12, 12]);
  ctx.stroke(); ctx.globalAlpha = 1;

  ctx.font = '700 36px Bebas Neue, sans-serif';
  ctx.textAlign = 'center';
  ctx.fillStyle = CYAN;
  ctx.fillText('FLAPPY JEJ', W / 2, H / 2 - 16);

  ctx.font = '500 16px Bebas Neue, sans-serif';
  ctx.fillStyle = '#888';
  ctx.letterSpacing = '3px';
  ctx.fillText('CLIC / ESPACE POUR JOUER', W / 2, H / 2 + 20);
  ctx.restore();
}

function drawDead() {
  draw();

  ctx.fillStyle = 'rgba(0,0,0,0.72)';
  ctx.fillRect(0, 0, W, H);

  ctx.save();
  ctx.fillStyle = 'rgba(0,0,0,0.8)';
  roundRect(ctx, W/2 - 145, H/2 - 90, 290, 180, [14, 14, 14, 14]);
  ctx.fill();
  ctx.strokeStyle = MAGENTA; ctx.lineWidth = 2; ctx.globalAlpha = 0.7;
  roundRect(ctx, W/2 - 145, H/2 - 90, 290, 180, [14, 14, 14, 14]);
  ctx.stroke(); ctx.globalAlpha = 1;

  ctx.font = '700 52px Bebas Neue, sans-serif';
  ctx.textAlign = 'center';
  ctx.fillStyle = MAGENTA;
  ctx.shadowColor = MAGENTA; ctx.shadowBlur = 20;
  ctx.fillText('GAME OVER', W / 2, H / 2 - 30);
  ctx.shadowBlur = 0;

  ctx.font = '500 18px Bebas Neue, sans-serif';
  ctx.fillStyle = '#666';
  ctx.fillText('SCORE : ' + score + '   ·   MEILLEUR : ' + bestScore, W / 2, H / 2 + 10);

  ctx.font = '500 15px Bebas Neue, sans-serif';
  ctx.fillStyle = CYAN;
  ctx.fillText('CLIC / ESPACE POUR REJOUER', W / 2, H / 2 + 52);
  ctx.restore();
}

function loop() {
  if (state !== 'playing') return;
  update();
  draw();
  raf = requestAnimationFrame(loop);
}

init();
drawIdle();
</script>
