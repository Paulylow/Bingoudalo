<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CDSI GAMES - Hub</title>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --cyan: #00FFFF; --magenta: #FF00FF; --yellow: #f1c40f; --text: #ffffff; }
        * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; }
        
        body { 
            background: linear-gradient(-45deg, #1a0509, #4a1010, #80231c, #9c3f00);
            background-size: 400% 400%; animation: fondChaud 15s ease infinite;
            color: var(--text); font-family: 'DM Sans', sans-serif; 
            min-height: 100vh; overflow-x: hidden; display: flex;
        }
        @keyframes fondChaud { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }

        /* VUES */
        #authView, #appView { width: 100%; display: none; flex-direction: column; align-items: center; }
        #authView.active { display: flex; justify-content: center; height: 100vh; }
        #appView.active { display: flex; }

        /* AUTHENTIFICATION */
        .auth-card {
            background: rgba(20, 20, 30, 0.8); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
            border: 2px solid rgba(255, 255, 255, 0.1); border-radius: 20px; padding: 40px; width: 100%; max-width: 400px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.8); text-align: center;
        }
        .auth-logo { font-family: 'Bebas Neue'; font-size: 50px; color: var(--yellow); margin-bottom: 20px; text-shadow: 0 0 15px rgba(241, 196, 15, 0.5); }
        .auth-input { width: 100%; background: rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.2); border-radius: 8px; padding: 15px; color: white; margin-bottom: 15px; font-size: 16px; outline: none; transition: 0.3s; text-align: center;}
        .auth-input:focus { border-color: var(--cyan); box-shadow: 0 0 15px rgba(0,255,255,0.3); }
        .auth-btn { width: 100%; padding: 15px; border: none; border-radius: 8px; font-weight: bold; text-transform: uppercase; cursor: pointer; transition: 0.2s; font-size: 16px; margin-bottom: 10px; }
        
        .btn-cyan { background: var(--cyan); color: black; box-shadow: 0 0 15px rgba(0,255,255,0.4); }
        .btn-cyan:hover { transform: translateY(-2px); box-shadow: 0 0 25px rgba(0,255,255,0.6); }
        .btn-magenta { background: transparent; border: 2px solid var(--magenta); color: var(--magenta); }
        .btn-magenta:hover { background: var(--magenta); color: white; box-shadow: 0 0 20px rgba(255,0,255,0.5); }
        .btn-yellow { background: var(--yellow); color: black; box-shadow: 0 0 15px rgba(241, 196, 15, 0.4); }
        .btn-yellow:hover { transform: translateY(-2px); box-shadow: 0 0 25px rgba(241, 196, 15, 0.6); }
        
        .error-msg { color: #ff4444; font-size: 14px; margin-bottom: 15px; min-height: 20px; font-weight: bold; }

        /* PROFIL FLOTTANT */
        #floatingProfile {
            display: none; position: absolute; top: 30px; right: 40px; width: 70px; height: 70px;
            border-radius: 50%; border: 3px solid var(--yellow); cursor: pointer;
            box-shadow: 0 0 20px rgba(241, 196, 15, 0.5); transition: 0.3s; z-index: 50;
        }
        #floatingProfile:hover { transform: scale(1.1); box-shadow: 0 0 30px rgba(241, 196, 15, 0.8); }
        #floatingProfile img { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; }

        /* APP VIEW - LAYOUT PRINCIPAL */
        .main-container { display: flex; width: 100%; max-width: 1400px; margin: 0 auto; padding: 20px; flex-direction: column; align-items: center; }
        .main-logo { max-width: 400px; margin-bottom: 50px; margin-top: 30px; filter: drop-shadow(0 0 20px rgba(243, 156, 18, 0.8)); }
        
        .games-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 30px; width: 100%; max-width: 1200px; margin-bottom: 50px; }
        .game-card { background: rgba(20, 20, 20, 0.6); border-radius: 15px; overflow: hidden; text-decoration: none; color: white; border: 2px solid rgba(255, 255, 255, 0.1); transition: 0.3s; backdrop-filter: blur(5px); }
        .game-card:hover { transform: translateY(-10px); border-color: var(--yellow); box-shadow: 0 15px 30px rgba(241, 196, 15, 0.4); }
        .game-thumbnail { width: 100%; height: 180px; object-fit: cover; border-bottom: 2px solid rgba(243, 156, 18, 0.5); }
        .game-info { padding: 15px; text-align: center; }
        .game-info h2 { margin: 0 0 5px 0; font-family: 'Bebas Neue'; font-size: 28px; color: var(--yellow); letter-spacing: 1px;}
        .game-info span { font-size: 13px; color: #aaa; }

        /* MODAL PROFIL */
        #profileModal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 100; align-items: center; justify-content: center; backdrop-filter: blur(5px); }
        .modal-content { 
            background: rgba(20, 20, 30, 0.9); border: 2px solid var(--yellow); border-radius: 20px; padding: 30px; 
            width: 90%; max-width: 600px; max-height: 90vh; overflow-y: auto; box-shadow: 0 0 50px rgba(241, 196, 15, 0.3);
            position: relative;
        }
        .close-btn { position: absolute; top: 15px; right: 20px; font-size: 30px; cursor: pointer; color: #aaa; transition: 0.2s; }
        .close-btn:hover { color: red; }

        .modal-header { display: flex; flex-direction: column; align-items: center; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 20px; margin-bottom: 20px; }
        .modal-avatar { width: 100px; height: 100px; border-radius: 50%; border: 3px solid var(--cyan); object-fit: cover; margin-bottom: 10px;}
        .modal-pseudo { font-family: 'Bebas Neue'; font-size: 40px; color: white; letter-spacing: 2px; }

        /* DEUX COLONNES DANS LE MODAL */
        .modal-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        @media (max-width: 600px) { .modal-grid { grid-template-columns: 1fr; } }

        /* STATS */
        .stats-section { background: rgba(0,0,0,0.4); padding: 15px; border-radius: 10px; border: 1px solid rgba(255,255,255,0.05); }
        .stats-section h3 { font-family: 'Bebas Neue'; color: var(--cyan); margin-bottom: 15px; font-size: 24px; letter-spacing: 1px; text-align: center;}
        .stat-row { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid rgba(255,255,255,0.1); padding: 8px 0; }
        .stat-row:last-child { border-bottom: none; }
        .stat-label { font-size: 13px; color: #bbb; text-transform: uppercase; }
        .stat-value { font-family: 'Bebas Neue'; font-size: 24px; color: var(--yellow); }

        /* EDITION PROFIL */
        .edit-section { background: rgba(0,0,0,0.4); padding: 15px; border-radius: 10px; border: 1px solid rgba(255,255,255,0.05); }
        .edit-section h3 { font-family: 'Bebas Neue'; color: var(--magenta); margin-bottom: 15px; font-size: 24px; letter-spacing: 1px; text-align: center;}
        .edit-input { width: 100%; background: #000; border: 1px solid #333; border-radius: 5px; padding: 10px; color: white; margin-bottom: 10px; font-size: 14px; text-align: center; }
        .edit-input:focus { border-color: var(--yellow); outline: none; }

        /* GRILLE AVATARS */
        .avatar-picker { margin-top: 20px; text-align: center; }
        .avatar-grid-container { display: none; grid-template-columns: repeat(auto-fill, minmax(60px, 1fr)); gap: 10px; margin-top: 15px; background: rgba(0,0,0,0.5); padding: 15px; border-radius: 10px;}
        .avatar-option { width: 60px; height: 60px; border-radius: 50%; cursor: pointer; object-fit: cover; border: 2px solid transparent; transition: 0.2s; }
        .avatar-option:hover { transform: scale(1.1); border-color: var(--cyan); }
        .avatar-option.selected { border-color: var(--yellow); box-shadow: 0 0 15px var(--yellow); }

        .logout-btn { margin-top: 20px; width: 100%; padding: 12px; background: rgba(255,0,0,0.1); border: 1px solid red; color: red; border-radius: 5px; cursor: pointer; text-transform: uppercase; font-weight: bold; transition: 0.2s; }
        .logout-btn:hover { background: red; color: white; box-shadow: 0 0 15px rgba(255,0,0,0.5);}

    </style>
</head>
<body>

    <div id="floatingProfile" onclick="openProfileModal()">
        <img id="floatingAvatarSrc" src="" alt="Profil">
    </div>

    <div id="authView" class="screen active">
        <div class="auth-card">
            <div class="auth-logo">CDSI GAMES</div>
            <p style="color: #aaa; margin-bottom: 20px; font-size: 14px;">Connecte-toi pour sauvegarder tes stats</p>
            
            <div id="errorMsg" class="error-msg"></div>
            
            <input type="text" id="pseudoInput" class="auth-input" placeholder="Pseudo" maxlength="15">
            <input type="password" id="passwordInput" class="auth-input" placeholder="Mot de passe">
            
            <button class="auth-btn btn-cyan" onclick="login()">Se Connecter</button>
            <button class="auth-btn btn-magenta" onclick="register()">Créer un compte</button>
        </div>
    </div>

    <div id="appView" class="screen">
        <div class="main-container">
            
            <img src="images/cdsi-games-logo.png" alt="CDSI GAMES" class="main-logo" onerror="this.src='https://via.placeholder.com/400x150/111/f1c40f?text=CDSI+GAMES'">
            
            <div class="games-grid">
                <a href="bingoudalo/index.html" class="game-card">
                    <img src="images/bingoudalo-vignette.png" class="game-thumbnail" onerror="this.src='https://via.placeholder.com/400x190/111/fff?text=BINGOUDALO'">
                    <div class="game-info"><h2>Bingoudalo</h2><span>Jeu multijoueur</span></div>
                </a>
                <a href="kavale/index.html" class="game-card">
                    <img src="images/kavale-vignette.png" class="game-thumbnail" onerror="this.src='https://via.placeholder.com/400x190/111/fff?text=KAVALE'">
                    <div class="game-info"><h2>Kavale</h2><span>Arène multijoueur</span></div>
                </a>
                <a href="franclick/index.html" class="game-card">
                    <img src="images/franclick-vignette.png" class="game-thumbnail" onerror="this.src='https://via.placeholder.com/400x190/111/fff?text=FRANCLICK'">
                    <div class="game-info"><h2>Franclick</h2><span>Clicker Solo</span></div>
                </a>
                <a href="wanted/index.html" class="game-card">
                    <img src="images/wanted-vignette.jpg" class="game-thumbnail" onerror="this.src='https://via.placeholder.com/400x190/111/fff?text=WANTED'">
                    <div class="game-info"><h2>Wanted Dayoub</h2><span>Réflexe Multijoueur</span></div>
                </a>
            </div>

        </div>
    </div>

    <div id="profileModal" onclick="if(event.target === this) closeProfileModal()">
        <div class="modal-content">
            <span class="close-btn" onclick="closeProfileModal()">&times;</span>
            
            <div class="modal-header">
                <img src="" id="modalAvatar" class="modal-avatar">
                <div class="modal-pseudo" id="modalPseudo">PSEUDO</div>
            </div>

            <div class="modal-grid">
                <div class="stats-section">
                    <h3>Palmarès</h3>
                    <div class="stat-row"><span class="stat-label">Kavale</span><span class="stat-value" id="statKavale">0</span></div>
                    <div class="stat-row"><span class="stat-label">Bingoudalo</span><span class="stat-value" id="statBingo">0</span></div>
                    <div class="stat-row"><span class="stat-label">Wanted</span><span class="stat-value" id="statWanted">0</span></div>
                    <div class="stat-row"><span class="stat-label">Franclick</span><span class="stat-value" id="statFranclick" style="color:var(--cyan);">0</span></div>
                </div>

                <div class="edit-section">
                    <h3>Modifier Profil</h3>
                    <input type="text" id="editPseudo" class="edit-input" placeholder="Nouveau Pseudo">
                    <input type="password" id="editPassword" class="edit-input" placeholder="Nouveau Mot de passe">
                    <button class="auth-btn btn-yellow" style="font-size: 13px; padding: 10px;" onclick="saveProfileChanges()">Enregistrer</button>
                </div>
            </div>

            <div class="avatar-picker">
                <button class="auth-btn btn-cyan" style="font-size: 13px; padding: 10px; width: auto;" onclick="toggleAvatarGrid()">Changer d'avatar de profil</button>
                <div class="avatar-grid-container" id="avatarGridContainer">
                    </div>
            </div>

            <button class="logout-btn" onclick="logout()">Déconnexion</button>
        </div>
    </div>

<script>
    // --- CONFIGURATION SUPABASE ---
    const SUPABASE_URL = 'https://pdybshweyfvxzvngnuxe.supabase.co'; 
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBkeWJzaHdleWZ2eHp2bmdudXhlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ5NDg2MDAsImV4cCI6MjA5MDUyNDYwMH0.u442X28Mhs-4T-tydabnMm8now8VfAEeNU-Sicuipq4'; 
    const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    let currentUser = null;
    let tempSelectedAvatar = null;

    // TOUTES LES PHOTOS CONNUES
    const AVATARS = [
        'bingoudalo/avatar/9k.png', 'bingoudalo/avatar/bbc.png', 'bingoudalo/avatar/christophe.jpg', 
        'bingoudalo/avatar/coudoux.png', 'bingoudalo/avatar/elian.jpg', 'bingoudalo/avatar/elian.png',
        'bingoudalo/avatar/ellio.png', 'bingoudalo/avatar/epstein.jpg', 'bingoudalo/avatar/epstein.png',
        'bingoudalo/avatar/matheo.jpg', 'bingoudalo/avatar/paulin.jpg', 'bingoudalo/avatar/paulin.png',
        'bingoudalo/avatar/paulo1.jpg', 'bingoudalo/avatar/tom.jpg', 'bingoudalo/avatar/tom.png',
        'bingoudalo/avatar/wilbaut_suss.jpg', 'bingoudalo/avatar/wilbaut_suss.png', 'bingoudalo/avatar/francky.jpg',
        'bingoudalo/avatar/affronte.jpg', 'bingoudalo/avatar/dayoub.jpg', 'bingoudalo/avatar/dayoub.png'
    ];

    // --- INITIALISATION ---
    window.onload = () => {
        const savedPseudo = localStorage.getItem('cdsi_logged_user');
        if(savedPseudo) {
            loadUserProfile(savedPseudo);
        } else {
            showView('authView');
        }
        
        // Générer la grille d'avatars (les `onerror` cacheront ceux qui n'existent pas vraiment)
        document.getElementById('avatarGridContainer').innerHTML = AVATARS.map(src => 
            `<img src="${src}" class="avatar-option" onclick="selectTempAvatar('${src}', this)" onerror="this.style.display='none'">`
        ).join('');
    };

    function showView(id) {
        document.getElementById('authView').classList.remove('active');
        document.getElementById('appView').classList.remove('active');
        document.getElementById(id).classList.add('active');
    }

    function showError(msg) {
        document.getElementById('errorMsg').innerText = msg;
    }

    // --- AUTHENTIFICATION ---
    async function login() {
        const pseudo = document.getElementById('pseudoInput').value.trim();
        const pwd = document.getElementById('passwordInput').value;
        if(!pseudo || !pwd) return showError("Remplis tous les champs.");

        const { data, error } = await sb.from('cdsi_users').select('*').eq('pseudo', pseudo).single();
        
        if(error || !data) return showError("Ce pseudo n'existe pas.");
        if(data.password !== pwd) return showError("Mot de passe incorrect.");

        localStorage.setItem('cdsi_logged_user', pseudo);
        currentUser = data;
        onLoginSuccess();
    }

    async function register() {
        const pseudo = document.getElementById('pseudoInput').value.trim();
        const pwd = document.getElementById('passwordInput').value;
        if(!pseudo || !pwd) return showError("Remplis tous les champs.");

        const { data: existing } = await sb.from('cdsi_users').select('pseudo').eq('pseudo', pseudo).maybeSingle();
        if(existing) return showError("Ce pseudo est déjà pris !");

        const newUser = {
            pseudo: pseudo, password: pwd, avatar: 'bingoudalo/avatar/paulo1.jpg', // Avatar par défaut safe
            kavale_wins: 0, bingoudalo_wins: 0, wanted_wins: 0, franclick_score: 0
        };

        const { error } = await sb.from('cdsi_users').insert([newUser]);
        if(error) return showError("Erreur lors de la création.");

        localStorage.setItem('cdsi_logged_user', pseudo);
        currentUser = newUser;
        onLoginSuccess();
    }

    function onLoginSuccess() {
        document.getElementById('floatingProfile').style.display = 'block';
        updateDashboardUI();
        showView('appView');
    }

    function logout() {
        localStorage.removeItem('cdsi_logged_user');
        currentUser = null;
        document.getElementById('pseudoInput').value = '';
        document.getElementById('passwordInput').value = '';
        document.getElementById('floatingProfile').style.display = 'none';
        closeProfileModal();
        showError("");
        showView('authView');
    }

    async function loadUserProfile(pseudo) {
        const { data, error } = await sb.from('cdsi_users').select('*').eq('pseudo', pseudo).single();
        if(error || !data) {
            logout();
        } else {
            currentUser = data;
            onLoginSuccess();
        }
    }

    // --- GESTION DU PROFIL (MODAL) ---
    function updateDashboardUI() {
        if(!currentUser) return;
        
        // Bouton flottant
        document.getElementById('floatingAvatarSrc').src = currentUser.avatar || 'https://via.placeholder.com/70';
        
        // Modal Header
        document.getElementById('modalAvatar').src = currentUser.avatar || 'https://via.placeholder.com/100';
        document.getElementById('modalPseudo').innerText = currentUser.pseudo;
        
        // Inputs Edition
        document.getElementById('editPseudo').value = currentUser.pseudo;
        document.getElementById('editPassword').value = currentUser.password;
        tempSelectedAvatar = currentUser.avatar;

        // Stats
        document.getElementById('statKavale').innerText = currentUser.kavale_wins;
        document.getElementById('statBingo').innerText = currentUser.bingoudalo_wins;
        document.getElementById('statWanted').innerText = currentUser.wanted_wins;
        document.getElementById('statFranclick').innerText = Math.floor(currentUser.franclick_score);
    }

    function openProfileModal() {
        updateDashboardUI();
        document.getElementById('profileModal').style.display = 'flex';
        document.getElementById('avatarGridContainer').style.display = 'none';
    }

    function closeProfileModal() {
        document.getElementById('profileModal').style.display = 'none';
    }

    function toggleAvatarGrid() {
        const grid = document.getElementById('avatarGridContainer');
        grid.style.display = grid.style.display === 'grid' ? 'none' : 'grid';
    }

    function selectTempAvatar(src, imgElement) {
        tempSelectedAvatar = src;
        // Gérer visuel de sélection
        document.querySelectorAll('.avatar-option').forEach(el => el.classList.remove('selected'));
        imgElement.classList.add('selected');
    }

    async function saveProfileChanges() {
        let newPseudo = document.getElementById('editPseudo').value.trim();
        let newPass = document.getElementById('editPassword').value;

        if(!newPseudo || !newPass) return alert("Les champs ne peuvent pas être vides.");

        // Si le pseudo a changé, vérifier qu'il n'est pas déjà pris
        if(newPseudo !== currentUser.pseudo) {
             const { data: existing } = await sb.from('cdsi_users').select('pseudo').eq('pseudo', newPseudo).maybeSingle();
             if(existing) return alert("Ce pseudo est déjà pris par quelqu'un d'autre !");
        }

        // Mise à jour de la base de données
        const { error } = await sb.from('cdsi_users').update({
             pseudo: newPseudo,
             password: newPass,
             avatar: tempSelectedAvatar
        }).eq('pseudo', currentUser.pseudo);

        if(error) {
            console.error(error);
            return alert("Erreur lors de la sauvegarde.");
        }

        // Succès ! On met à jour en local
        currentUser.pseudo = newPseudo;
        currentUser.password = newPass;
        currentUser.avatar = tempSelectedAvatar;
        localStorage.setItem('cdsi_logged_user', newPseudo);

        alert("Profil mis à jour avec succès !");
        updateDashboardUI();
        document.getElementById('avatarGridContainer').style.display = 'none';
    }

</script>
</body>
</html>
