<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CDSI GAMES - Salle d'arcade</title>
    <style>
        /* =========================================
           LE FOND ANIMÉ EN PUR CSS (COULEURS CHAUDES)
           ========================================= */
        body {
            margin: 0;
            padding: 0;
            /* Le dégradé qui mélange rouge foncé, orange et jaune chaud */
            background: linear-gradient(-45deg, #2b0b12, #7a1b1b, #c0392b, #d35400);
            background-size: 400% 400%; /* On l'agrandit pour pouvoir l'animer */
            animation: fondChaud 15s ease infinite; /* Animation fluide en boucle */
            
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh; /* S'assure que le fond prend au moins tout l'écran */
        }

        /* L'animation qui fait bouger le dégradé */
        @keyframes fondChaud {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        header {
            margin-top: 50px;
            margin-bottom: 30px;
            text-align: center;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* LOGO PRINCIPAL */
        .main-logo {
            max-width: 400px;
            width: 100%;
            height: auto;
            border-radius: 10px;
            /* Une ombre jaune/orange pour le faire ressortir */
            box-shadow: 0 0 30px rgba(243, 156, 18, 0.4);
            transition: transform 0.3s ease;
        }

        .main-logo:hover {
            transform: scale(1.02); /* Petit effet de zoom au survol */
        }

        p.subtitle {
            color: #f1c40f; /* Un jaune clair pour le sous-titre */
            font-size: 1.2em;
            margin-top: -15px;
            margin-bottom: 30px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        /* La grille pour les jeux */
        .games-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 30px;
            width: 85%;
            max-width: 1100px;
            padding: 20px;
            margin-bottom: 50px;
        }

        /* Le style d'une vignette */
        .game-card {
            background-color: rgba(20, 20, 20, 0.7); /* Fond noir légèrement transparent */
            border-radius: 20px;
            overflow: hidden;
            text-decoration: none;
            color: white;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            border: 2px solid transparent;
            display: flex;
            flex-direction: column;
            backdrop-filter: blur(5px); /* Effet verre trempé (glassmorphism) */
            box-shadow: 0 10px 20px rgba(0,0,0,0.5);
        }

        .game-card:hover {
            transform: translateY(-10px);
            border-color: #f39c12; /* Bordure orange au survol */
            box-shadow: 0 15px 30px rgba(211, 84, 0, 0.5);
        }

        /* L'image de la vignette */
        .game-thumbnail {
            width: 100%;
            height: 180px;
            background-color: #2a2a35;
            object-fit: cover;
            border-bottom: 2px solid #f39c12;
        }

        /* Le texte sous l'image */
        .game-info {
            padding: 15px;
            text-align: center;
        }

        .game-info h2 {
            margin: 0 0 10px 0;
            font-size: 1.6em;
            background: linear-gradient(90deg, #f1c40f, #e67e22);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .game-info span {
            font-size: 0.9em;
            color: #bdc3c7;
        }
    </style>
</head>
<body>

    <header>
        <img src="images/cdsi-games-logo.png" alt="CDSI GAMES" class="main-logo">
    </header>
    
    <p class="subtitle">Sélectionne un jeu</p>

    <div class="games-grid">
        
        <a href="bingoudalo/index.html" class="game-card">
            <img src="images/bingoudalo-vignette.png" alt="Vignette Bingoudalo" class="game-thumbnail">
            <div class="game-info">
                <h2>Bingoudalo</h2>
                <span>Jeu solo</span>
            </div>
        </a>

        <a href="kavale/index.html" class="game-card">
            <img src="images/kavale-vignette.png" alt="Vignette Kavale" class="game-thumbnail">
            <div class="game-info">
                <h2>Kavale</h2>
                <span>Multijoueur en ligne</span>
            </div>
        </a>

    </div>

</body>
</html>
