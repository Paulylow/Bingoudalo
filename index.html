<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CDSI GAMES - Salle d'arcade</title>
    <style>
        /* =========================================
           LE FOND ANIMÉ EN PUR CSS (COULEURS CHAUDES)
           ========================================= */
        body {
            margin: 0;
            padding: 0;
            background: linear-gradient(-45deg, #2b0b12, #7a1b1b, #c0392b, #d35400);
            background-size: 400% 400%;
            animation: fondChaud 15s ease infinite;
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        @keyframes fondChaud {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        header {
            margin-top: 50px;
            margin-bottom: 30px;
            text-align: center;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* LOGO PRINCIPAL */
        .main-logo {
            max-width: 400px;
            width: 100%;
            height: auto;
            border: none;
            background: transparent;
            filter: drop-shadow(0 0 15px rgba(243, 156, 18, 0.6));
            transition: transform 0.3s ease, filter 0.3s ease;
        }

        .main-logo:hover {
            transform: scale(1.05);
            filter: drop-shadow(0 0 25px rgba(243, 156, 18, 0.9));
        }

        p.subtitle {
            color: #f1c40f;
            font-size: 1.2em;
            margin-top: -15px;
            margin-bottom: 40px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 2px;
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
        }

        /* La grille pour les jeux */
        .games-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 35px;
            width: 90%;
            max-width: 1100px;
            padding: 20px;
            margin-bottom: 50px;
        }

        /* Le style d'une vignette (effet verre) */
        .game-card {
            background-color: rgba(20, 20, 20, 0.6);
            border-radius: 20px;
            overflow: hidden;
            text-decoration: none;
            color: white;
            transition: transform 0.3s ease, box-shadow 0.3s ease, border-color 0.3s ease;
            border: 2px solid rgba(255, 255, 255, 0.1);
            display: flex;
            flex-direction: column;
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .game-card:hover {
            transform: translateY(-10px);
            border-color: #f39c12;
            box-shadow: 0 15px 40px rgba(211, 84, 0, 0.6);
        }

        /* L'image de la vignette */
        .game-thumbnail {
            width: 100%;
            height: 190px;
            background-color: #111;
            object-fit: cover;
            border-bottom: 2px solid rgba(243, 156, 18, 0.5);
        }

        /* Le texte sous l'image */
        .game-info {
            padding: 20px;
            text-align: center;
        }

        .game-info h2 {
            margin: 0 0 10px 0;
            font-size: 1.8em;
            background: linear-gradient(90deg, #f1c40f, #e67e22, #e74c3c);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .game-info span {
            font-size: 1em;
            color: #bdc3c7;
        }
    </style>
</head>
<body>

    <header>
        <img src="images/cdsi-games-logo.png" alt="CDSI GAMES" class="main-logo">
    </header>
    
    <p class="subtitle">Sélectionne un jeu</p>

    <div class="games-grid">
        
        <a href="bingoudalo/index.html" class="game-card">
            <img src="images/bingoudalo-vignette.png" alt="Vignette Bingoudalo" class="game-thumbnail">
            <div class="game-info">
                <h2>Bingoudalo</h2>
                <span>Jeu multijoueur</span>
            </div>
        </a>

        <a href="kavale/index.html" class="game-card">
            <img src="images/kavale-vignette.png" alt="Vignette Kavale" class="game-thumbnail">
            <div class="game-info">
                <h2>Kavale</h2>
                <span>Arène multijoueur</span>
            </div>
        </a>

        <a href="franclick/index.html" class="game-card">
            <img src="images/franclick-vignette.png" alt="Vignette Franclick" class="game-thumbnail">
            <div class="game-info">
                <h2>Franclick</h2>
                <span>Clicker Solo</span>
            </div>
        </a>

    </div>

</body>
</html>
