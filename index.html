<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Le Hub de Paulylow</title>
    <style>
        /* Style global (Thème Sombre / Gaming) */
        body {
            margin: 0;
            padding: 0;
            background-color: #0f0f13;
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        header {
            margin-top: 50px;
            margin-bottom: 30px;
            text-align: center;
        }

        h1 {
            font-size: 3em;
            margin: 0;
            background: linear-gradient(90deg, #00FFFF, #FF00FF);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p {
            color: #aaa;
            font-size: 1.2em;
        }

        /* La grille pour les jeux */
        .games-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 30px;
            width: 80%;
            max-width: 1000px;
            padding: 20px;
        }

        /* Le style d'une vignette (Carte cliquable) */
        .game-card {
            background-color: #1a1a24;
            border-radius: 15px;
            overflow: hidden;
            text-decoration: none; /* Enlever le soulignement du lien */
            color: white;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            border: 2px solid transparent;
            display: flex;
            flex-direction: column;
        }

        .game-card:hover {
            transform: translateY(-10px);
            border-color: #00FFFF;
            box-shadow: 0 10px 20px rgba(0, 255, 255, 0.2);
        }

        /* L'image de la vignette */
        .game-thumbnail {
            width: 100%;
            height: 150px;
            background-color: #333; /* Couleur de fond si l'image ne charge pas */
            object-fit: cover; /* Recadre l'image proprement */
        }

        /* Le texte sous l'image */
        .game-info {
            padding: 15px;
            text-align: center;
        }

        .game-info h2 {
            margin: 0 0 10px 0;
            font-size: 1.5em;
        }

        .game-info span {
            font-size: 0.9em;
            color: #888;
        }
    </style>
</head>
<body>

    <header>
        <h1>Arcade Hub</h1>
        <p>Sélectionne un jeu pour commencer</p>
    </header>

    <div class="games-grid">
        
        <a href="bingoudalo/index.html" class="game-card">
            <img src="https://via.placeholder.com/400x200/444444/FFFFFF?text=Bingoudalo" alt="Vignette Bingoudalo" class="game-thumbnail">
            <div class="game-info">
                <h2>Bingoudalo</h2>
                <span>Jeu solo</span>
            </div>
        </a>

        <a href="kavale/index.html" class="game-card">
            <img src="https://via.placeholder.com/400x200/111111/00FFFF?text=Kavale" alt="Vignette Kavale" class="game-thumbnail">
            <div class="game-info">
                <h2>Kavale</h2>
                <span>Multijoueur en ligne</span>
            </div>
        </a>

        </div>

</body>
</html>
