<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KAVALE - Arène Multijoueur</title>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --bg: #0b0c10; --surface: #14141e; --border: #1f2833;
            --cyan: #00FFFF; --magenta: #FF00FF; --text: #c5c6c7;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; }
        
        body {
            background-color: var(--bg);
            /* Petit quadrillage style arène cyber */
            background-image: linear-gradient(rgba(0, 255, 255, 0.05) 1px, transparent 1px),
                              linear-gradient(90deg, rgba(0, 255, 255, 0.05) 1px, transparent 1px);
            background-size: 30px 30px;
            color: var(--text);
            font-family: 'DM Sans', sans-serif;
            display: flex; flex-direction: column; align-items: center;
            min-height: 100vh; overflow: hidden; padding: 20px;
        }

        .hub-link { position: absolute; top: 20px; left: 20px; color: var(--cyan); text-decoration: none; font-weight: bold; font-size: 14px; text-transform: uppercase; z-index: 100;}

        /* VUES */
        .screen { display: none; flex-direction: column; align-items: center; width: 100%; max-width: 800px; margin-top: 50px; }
        .screen.active { display: flex; animation: fadeIn 0.3s; }
        @keyframes fadeIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }

        .logo { font-family: 'Bebas Neue'; font-size: 80px; letter-spacing: 5px; background: linear-gradient(90deg, var(--cyan), var(--magenta)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 10px; text-align: center;}
        .subtitle { background: #004d4d; color: white; padding: 5px 15px; font-weight: bold; letter-spacing: 2px; font-size: 14px; text-transform: uppercase; margin-bottom: 40px; border-left: 4px solid var(--cyan); }

        /* ÉCRAN DE CHARGEMENT */
        #loadingMsg { font-size: 20px; color: var(--cyan); font-weight: bold; text-shadow: 0 0 10px var(--cyan); animation: pulse 1s infinite alternate; margin-top: 50px;}
        @keyframes pulse { from { opacity: 0.5; } to { opacity: 1; } }

        /* LOBBY */
        .card { background: rgba(20, 20, 30, 0.9); border: 2px solid var(--border); border-radius: 15px; padding: 30px; width: 100%; box-shadow: 0 0 30px rgba(0,0,0,0.8); }
        .player-list { display: flex; flex-direction: column; gap: 10px; margin-bottom: 20px; }
        .player-row { display: flex; align-items: center; justify-content: space-between; padding: 12px; background: rgba(0,0,0,0.5); border: 1px solid rgba(0,255,255,0.2); border-radius: 8px; font-weight: bold; }
        .player-row img { width: 40px; height: 40px; border-radius: 50%; object-fit: cover; border: 2px solid var(--cyan); margin-right: 15px; }
        .player-info { display: flex; align-items: center; }
        .badge { background: rgba(255,0,255,0.2); color: var(--magenta); padding: 3px 8px; border-radius: 4px; font-size: 11px; text-transform: uppercase; border: 1px solid var(--magenta);}

        button { font-family: 'DM Sans'; font-weight: bold; text-transform: uppercase; border: none; border-radius: 8px; cursor: pointer; padding: 15px 24px; transition: 0.2s; width: 100%; font-size: 16px; }
        .btn-cyan { background: var(--cyan); color: #000; box-shadow: 0 0 15px rgba(0,255,255,0.4); }
        .btn-cyan:hover { transform: translateY(-2px); box-shadow: 0 0 25px rgba(0,255,255,0.7); }

        /* JEU */
        #gameHeader { display: flex; justify-content: space-between; width: 100%; max-width: 900px; margin-bottom: 15px; color: white; font-family: 'Bebas Neue'; font-size: 24px; }
        .score-board { display: flex; gap: 15px; }
        .score-item { background: rgba(0,0,0,0.5); padding: 5px 15px; border-radius: 8px; border: 1px solid var(--border); display: flex; align-items: center; gap: 10px; }
        .score-item img { width: 30px; height: 30px; border-radius: 50%; }
        
        #gameContainer { position: relative; width: 100%; max-width: 900px; }
        canvas { background: rgba(10,10,15,0.9); border: 3px solid var(--cyan); border-radius: 10px; width: 100%; height: auto; aspect-ratio: 16/9; box-shadow: 0 0 30px rgba(0,255,255,0.2); display: block; cursor: crosshair;}
        
        .overlay { position: absolute; inset: 0; display: none; flex-direction: column; align-items: center; justify-content: center; background: rgba(0,0,0,0.85); border-radius: 10px; z-index: 10; backdrop-filter: blur(5px); }
        .overlay h2 { font-family: 'Bebas Neue'; font-size: 60px; color: var(--magenta); text-shadow: 0 0 20px var(--magenta); letter-spacing: 2px; text-align: center; }
    </style>
</head>
<body>

    <a href="../index.html" class="hub-link">← Retour au Hub</a>

    <div id="screenLoading" class="screen active">
        <div class="logo">KAVALE</div>
        <div class="subtitle">3 MANCHES GAGNANTES - JUSQU'À 4 JOUEURS</div>
        <div id="loadingMsg">Connexion au profil en cours...</div>
    </div>

    <div id="screenLobby" class="screen">
        <div class="logo">KAVALE</div>
        <div class="subtitle">SALLE D'ATTENTE</div>
        <div class="card">
            <div class="player-list" id="playersList"></div>
            <div id="lobbyControls"></div>
        </div>
    </div>

    <div id="screenGame" class="screen" style="margin-top: 20px;">
        <div id="gameHeader">
            <div>OBJECTIF : CATCH LA CIBLE</div>
            <div class="score-board" id="scoreBoard"></div>
        </div>
        <div id="gameContainer">
            <canvas id="gameCanvas" width="1280" height="720"></canvas>
            <div class="overlay" id="endOverlay">
                <h2 id="winnerText">VICTOIRE !</h2>
                <p style="color: white; margin-top: 10px;" id="winSubText">Enregistrement des stats...</p>
                <div id="endControls" style="margin-top: 20px; width: 200px;"></div>
            </div>
        </div>
    </div>

<script>
    // --- CONFIGURATION SUPABASE ---
    const SUPABASE_URL = 'https://pdybshweyfvxzvngnuxe.supabase.co'; 
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBkeWJzaHdleWZ2eHp2bmdudXhlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ5NDg2MDAsImV4cCI6MjA5MDUyNDYwMH0.u442X28Mhs-4T-tydabnMm8now8VfAEeNU-Sicuipq4'; 
    const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
    const ROOM_ID = 'kavale_arena';

    // --- VARIABLES JOUEUR ---
    let myPseudo = localStorage.getItem('cdsi_logged_user');
    let myAvatar = '';
    let isMaster = false;
    let dbSyncInterval = null;
    let currentPhase = 'loading';

    // --- VARIABLES JEU ---
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    let animFrame;
    let gameState = {};
    let mousePos = { x: 640, y: 360 };
    let playerImgs = {}; // Cache pour les avatars

    // --- INITIALISATION & AUTHENTIFICATION ---
    window.onload = async () => {
        if(!myPseudo) {
            // Non connecté -> Retour au Hub
            window.location.href = '../index.html';
            return;
        }
        
        // Charger l'avatar depuis cdsi_users
        const { data, error } = await sb.from('cdsi_users').select('avatar').eq('pseudo', myPseudo).single();
        if(data) {
            myAvatar = data.avatar || 'https://via.placeholder.com/50';
            joinRoom();
        } else {
            window.location.href = '../index.html'; // Profil introuvable
        }
    };

    function showScreen(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }

    // --- LOGIQUE MULTIJOUEUR ---
    async function fetchState() {
        try {
            const {data} = await sb.from('bingo_state').select('data').eq('id', ROOM_ID).maybeSingle();
            return data?.data || null;
        } catch(e) { return null; }
    }

    async function updateState(newState) {
        try {
            await sb.from('bingo_state').upsert({ id: ROOM_ID, data: newState, updated_at: new Date().toISOString() }, { onConflict: 'id' });
        } catch(e) {}
    }

    async function joinRoom() {
        let state = await fetchState();
        
        if(!state || !state.players) {
            state = { phase: 'lobby', master: myPseudo, players: {}, target: {x: 640, y: 360}, winner: null };
        }

        isMaster = (state.master === myPseudo);
        
        // Init player
        if(!state.players[myPseudo]) {
            state.players[myPseudo] = { pseudo: myPseudo, avatar: myAvatar, score: 0, x: 640, y: 360 };
        } else {
            // Update au cas où on a changé d'avatar
            state.players[myPseudo].avatar = myAvatar;
        }
        
        await updateState(state);
        startSync();
    }

    function startSync() {
        if(dbSyncInterval) clearInterval(dbSyncInterval);
        
        // En jeu, on sync plus vite (150ms). Dans le lobby, 1s suffit.
        let syncRate = currentPhase === 'playing' ? 150 : 1000;
        
        dbSyncInterval = setInterval(async () => {
            const state = await fetchState();
            if(state) {
                // Si on est en jeu, on envoie aussi notre position
                if(state.phase === 'playing' && state.players[myPseudo]) {
                    state.players[myPseudo].x = mousePos.x;
                    state.players[myPseudo].y = mousePos.y;
                    
                    // Master vérifie les collisions (premier arrivé à la cible)
                    if(isMaster && !state.winner) {
                        checkCollisions(state);
                    }
                    await updateState(state);
                }
                updateUI(state);
            }
        }, syncRate);
    }

    function checkCollisions(state) {
        let targetRadius = 25;
        let playerRadius = 25;
        
        for (let pName in state.players) {
            let p = state.players[pName];
            let dx = p.x - state.target.x;
            let dy = p.y - state.target.y;
            let distance = Math.sqrt(dx*dx + dy*dy);
            
            if(distance < targetRadius + playerRadius) {
                // Touché !
                state.players[pName].score += 1;
                if(state.players[pName].score >= 3) {
                    state.phase = 'end';
                    state.winner = pName;
                    registerWin(pName); // On enregistre la victoire dans les stats
                } else {
                    // Respawn de la cible
                    state.target.x = 100 + Math.random() * 1080;
                    state.target.y = 100 + Math.random() * 520;
                }
                break; // Un seul peut toucher à la fois
            }
        }
    }

    // --- ENREGISTREMENT DES STATS DANS LA DB ---
    async function registerWin(winnerPseudo) {
        // Seul le Master fait la requête pour éviter les doublons
        if(isMaster) {
            // 1. Lire le score actuel du gagnant
            const { data } = await sb.from('cdsi_users').select('kavale_wins').eq('pseudo', winnerPseudo).single();
            if(data) {
                let newWins = (data.kavale_wins || 0) + 1;
                // 2. Mettre à jour
                await sb.from('cdsi_users').update({ kavale_wins: newWins }).eq('pseudo', winnerPseudo);
            }
        }
    }

    // --- INTERFACE ---
    function updateUI(state) {
        gameState = state;
        isMaster = (state.master === myPseudo);

        // --- LOBBY ---
        if(state.phase === 'lobby') {
            if(currentPhase !== 'lobby') { currentPhase = 'lobby'; showScreen('screenLobby'); startSync(); }
            
            document.getElementById('playersList').innerHTML = Object.values(state.players).map(p => `
                <div class="player-row">
                    <div class="player-info">
                        <img src="${p.avatar}" onerror="this.src='https://via.placeholder.com/40'">
                        <span>${p.pseudo}</span>
                    </div>
                    ${state.master === p.pseudo ? '<span class="badge">Hôte</span>' : ''}
                </div>
            `).join('');

            const ctrl = document.getElementById('lobbyControls');
            if(isMaster) {
                ctrl.innerHTML = `<button class="btn-cyan" onclick="startGame()">LANCER L'ARÈNE</button>`;
            } else {
                ctrl.innerHTML = `<p style="text-align:center; color:var(--cyan);">En attente de l'hôte...</p>`;
            }
        }

        // --- EN JEU ---
        if(state.phase === 'playing') {
            if(currentPhase !== 'playing') { 
                currentPhase = 'playing'; 
                showScreen('screenGame'); 
                document.getElementById('endOverlay').style.display = 'none';
                startSync(); // On relance le sync pour qu'il soit plus rapide
                startGameEngine();
            }
            
            // MAJ Scores
            document.getElementById('scoreBoard').innerHTML = Object.values(state.players).map(p => `
                <div class="score-item" style="${p.score >= 2 ? 'border-color:var(--magenta);' : ''}">
                    <img src="${p.avatar}" onerror="this.src='https://via.placeholder.com/30'">
                    <span>${p.score} pts</span>
                </div>
            `).join('');
        }

        // --- FIN DE PARTIE ---
        if(state.phase === 'end') {
            if(currentPhase !== 'end') {
                currentPhase = 'end';
                document.getElementById('endOverlay').style.display = 'flex';
                document.getElementById('winnerText').innerText = `${state.winner} REMPORTE LA KAVALE !`;
                
                const ctrl = document.getElementById('endControls');
                if(isMaster) {
                    ctrl.innerHTML = `<button class="btn-cyan" onclick="resetLobby()">RETOURNER AU LOBBY</button>`;
                } else {
                    ctrl.innerHTML = `<p style="font-size:14px;">En attente de l'hôte...</p>`;
                }
            }
        }
    }

    async function startGame() {
        let state = await fetchState();
        state.phase = 'playing';
        state.winner = null;
        state.target = { x: 640, y: 360 };
        for (let p in state.players) {
            state.players[p].score = 0;
            state.players[p].x = 100 + Math.random() * 1000;
            state.players[p].y = 100 + Math.random() * 500;
        }
        await updateState(state);
    }

    async function resetLobby() {
        let state = await fetchState();
        state.phase = 'lobby';
        await updateState(state);
    }

    // --- MOTEUR DE JEU CANVAS ---
    function startGameEngine() {
        // Précharger les images pour pas lagger
        Object.values(gameState.players).forEach(p => {
            if(!playerImgs[p.pseudo]) {
                let img = new Image();
                img.src = p.avatar;
                playerImgs[p.pseudo] = img;
            }
        });
        
        if(animFrame) cancelAnimationFrame(animFrame);
        gameLoop();
    }

    function gameLoop() {
        if(currentPhase !== 'playing') return;

        ctx.clearRect(0, 0, canvas.width, canvas.height);

        // Dessiner la cible (Orbe Néon)
        if(gameState.target) {
            ctx.beginPath();
            ctx.arc(gameState.target.x, gameState.target.y, 25, 0, Math.PI * 2);
            ctx.fillStyle = '#FF00FF';
            ctx.shadowBlur = 20;
            ctx.shadowColor = '#FF00FF';
            ctx.fill();
            ctx.shadowBlur = 0; // Reset
        }

        // Dessiner les joueurs
        if(gameState.players) {
            Object.values(gameState.players).forEach(p => {
                // Interpolation basique pour fluidifier (on dessine notre curseur direct, et les autres selon la DB)
                let renderX = (p.pseudo === myPseudo) ? mousePos.x : p.x;
                let renderY = (p.pseudo === myPseudo) ? mousePos.y : p.y;
                
                let size = 50;
                ctx.save();
                ctx.beginPath();
                ctx.arc(renderX, renderY, size/2, 0, Math.PI * 2);
                ctx.clip();
                
                if(playerImgs[p.pseudo] && playerImgs[p.pseudo].complete) {
                    ctx.drawImage(playerImgs[p.pseudo], renderX - size/2, renderY - size/2, size, size);
                } else {
                    ctx.fillStyle = '#00FFFF';
                    ctx.fill();
                }
                ctx.restore();
                
                // Anneau autour du joueur
                ctx.beginPath();
                ctx.arc(renderX, renderY, size/2, 0, Math.PI * 2);
                ctx.strokeStyle = (p.pseudo === myPseudo) ? '#00FFFF' : '#ffffff';
                ctx.lineWidth = 3;
                ctx.stroke();

                // Pseudo
                ctx.fillStyle = "white";
                ctx.font = "14px 'DM Sans'";
                ctx.textAlign = "center";
                ctx.fillText(p.pseudo, renderX, renderY - 35);
            });
        }

        animFrame = requestAnimationFrame(gameLoop);
    }

    // --- CONTROLES SOURIS ---
    canvas.addEventListener('mousemove', (e) => {
        if(currentPhase !== 'playing') return;
        const rect = canvas.getBoundingClientRect();
        const scaleX = canvas.width / rect.width;
        const scaleY = canvas.height / rect.height;
        mousePos.x = (e.clientX - rect.left) * scaleX;
        mousePos.y = (e.clientY - rect.top) * scaleY;
    });

    // Nettoyage si on quitte la page
    window.addEventListener("beforeunload", async () => {
        if (isMaster) await sb.from('bingo_state').delete().eq('id', ROOM_ID);
    });

</script>
</body>
</html>
