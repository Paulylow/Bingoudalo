<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KAVALE 🏍️💨 - Arène Multijoueur</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0b0c10; --surface: #14141e; --border: #1f2833;
    --cyan: #00FFFF; --magenta: #FF00FF; --accent3: #45a29e;
    --text: #c5c6c7; --muted: #66fcf1;
  }
  body { background:var(--bg); color:var(--text); font-family:'DM Sans',sans-serif; min-height:100vh; display:flex; flex-direction:column; align-items:center; padding:32px 16px; position:relative; overflow-x:hidden; }
  body::before { content:''; position:fixed; inset:0; background-image: linear-gradient(rgba(0, 255, 255, 0.05) 1px, transparent 1px), linear-gradient(90deg, rgba(0, 255, 255, 0.05) 1px, transparent 1px); background-size: 30px 30px; pointer-events:none; z-index:0; }
  
  .hub-link { position: absolute; top: 20px; left: 20px; color: var(--muted); text-decoration: none; font-weight: bold; z-index: 10; font-size: 14px; text-transform: uppercase; letter-spacing: 1px; transition: 0.2s;}
  .hub-link:hover { color: var(--cyan); text-shadow: 0 0 10px var(--cyan); }

  .screen { display:none; flex-direction:column; align-items:center; width:100%; max-width:800px; position:relative; z-index:1; }
  .screen.active { display:flex; }
  .logo { font-family:'Bebas Neue',sans-serif; font-size:clamp(52px,10vw,88px); letter-spacing:8px; line-height:1; background:linear-gradient(135deg,var(--cyan) 0%,var(--magenta) 100%); -webkit-background-clip:text; -webkit-text-fill-color:transparent; filter:drop-shadow(0 0 20px rgba(0,255,255,0.4)); font-style: italic; }
  .tagline { color:var(--muted); font-size:14px; letter-spacing:4px; text-transform:uppercase; margin-top:6px; margin-bottom:32px; font-weight: bold;}
  
  .join-card, .players-list { background:rgba(20,20,30,0.8); border:1px solid var(--border); border-radius:16px; padding:36px 32px; width:100%; max-width:500px; display:flex; flex-direction:column; gap:16px; backdrop-filter: blur(10px); box-shadow: 0 0 30px rgba(0,255,255,0.1); }
  .join-card h2, .players-list h3 { font-family:'Bebas Neue',sans-serif; font-size:24px; letter-spacing:2px; color:white; margin:0;}
  
  button { font-family:'DM Sans',sans-serif; font-weight:700; font-size:14px; letter-spacing:2px; text-transform:uppercase; border:none; border-radius:8px; cursor:pointer; padding:14px 24px; transition:0.2s; width: 100%;}
  .btn-primary { background:var(--cyan); color:#000; box-shadow:0 0 20px rgba(0,255,255,0.3); }
  .btn-primary:hover { transform:translateY(-2px); box-shadow:0 0 30px rgba(0,255,255,0.6); }
  button:disabled { opacity:0.5; cursor:not-allowed; transform:none !important; }

  .player-row { display:flex; align-items:center; gap:15px; padding:12px 0; border-bottom:1px solid var(--border); font-size:15px; font-weight:bold; color: white;}
  .player-avatar { width:40px; height:40px; border-radius:50%; object-fit: cover; border: 2px solid transparent; background: #111;}
  .badge { font-size:10px; letter-spacing:1px; text-transform:uppercase; padding:4px 8px; border-radius:4px; margin-left:auto; }
  .badge-master { background:rgba(0,255,255,0.1); color:var(--cyan); border:1px solid var(--cyan); }
  
  #gameCanvas { border: 4px solid var(--border); background: #000; box-shadow: 0 0 40px rgba(0,0,0,0.8); border-radius: 8px; margin-top: 10px; max-width: 100%;}
  .game-header { display: flex; justify-content: space-around; width: 100%; margin-bottom: 10px; flex-wrap: wrap; gap: 15px; background: rgba(0,0,0,0.5); padding: 10px; border-radius: 10px; border: 1px solid #333;}
  .player-hud { display: flex; align-items: center; gap: 10px; font-weight: bold; font-size: 16px; text-transform: uppercase; letter-spacing: 1px; transition: 0.3s;}
  .player-hud img { width: 35px; height: 35px; border-radius: 50%; border: 2px solid transparent; object-fit: cover; background: #111;}
  .player-hud .score-hud { font-size: 20px; font-family: 'Bebas Neue'; background: rgba(255,255,255,0.1); padding: 2px 10px; border-radius: 5px; }
  #statusText { font-family: 'Bebas Neue'; font-size: 38px; letter-spacing: 2px; text-align: center; height: 45px;}

  .victory-card { text-align: center; padding: 40px; background: rgba(20,20,30,0.95); border: 2px solid; border-radius: 20px; backdrop-filter: blur(10px); width: 100%; max-width: 500px; display: flex; flex-direction: column; align-items: center;}
  .victory-avatar { width: 120px; height: 120px; border-radius: 50%; border: 4px solid; margin-bottom: 20px; object-fit: cover; background: #111;}
  .victory-title { font-family: 'Bebas Neue'; font-size: 70px; margin-bottom: 5px; letter-spacing: 4px;}
  .victory-name { font-size: 35px; margin-bottom: 30px; font-weight: bold; text-transform: uppercase; letter-spacing: 2px;}

  .loading-text { text-align: center; font-size: 18px; color: var(--cyan); font-weight: bold; margin-bottom: 20px; animation: blink 1s infinite alternate; }
  @keyframes blink { from { opacity: 0.5; } to { opacity: 1; } }
</style>
</head>
<body>

<a href="../index.html" class="hub-link">← Retour au Hub</a>

<div class="screen active" id="screenJoin">
  <div class="logo">KAVALE</div>
  <div class="tagline">3 manches gagnantes - Jusqu'à 4 joueurs</div>
  <div class="join-card" style="background: transparent; border: none; box-shadow: none;">
    <div id="loadingProfile" class="loading-text">VÉRIFICATION DU COMPTE...</div>
  </div>
</div>

<div class="screen" id="screenLobby">
  <div class="logo">KAVALE</div>
  <div class="tagline" id="lobbySubtitle">En attente des pilotes...</div>
  <div class="players-list">
    <h3>Pilotes (Max 4)</h3>
    <div id="playersList"></div>
    <div id="lobbyControls" style="margin-top: 15px;"></div>
  </div>
</div>

<div class="screen" id="screenGame">
    <div id="statusText">PRÉPARATION...</div>
    <div class="game-header" id="gameHeader"></div>
    <canvas id="gameCanvas" width="600" height="600"></canvas>
    <p style="color: #666; font-size: 12px; margin-top: 15px; text-transform: uppercase; letter-spacing: 1px;">Contrôles : Flèches directionnelles</p>
</div>

<div class="screen" id="screenVictory">
  <div class="logo" style="margin-bottom: 40px;">KAVALE</div>
  <div class="victory-card" id="victoryCard">
    <h2 class="victory-title" id="victoryTitle">VICTOIRE !</h2>
    <img src="" id="victoryAvatar" class="victory-avatar" onerror="this.onerror=null; this.src='../bingoudalo/avatar/paulo1.jpg';">
    <div class="victory-name" id="victoryName">Pseudo</div>
    <button class="btn-primary" onclick="location.reload()">🔄 Rejouer</button>
    <button class="btn-primary" style="margin-top:10px; background:transparent; border:1px solid #555; color:white;" onclick="window.location.href='../index.html'">🏠 Menu Principal</button>
  </div>
</div>

<script>
// --- CONFIGURATION SUPABASE ---
const SUPABASE_URL = 'https://pdybshweyfvxzvngnuxe.supabase.co'; 
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBkeWJzaHdleWZ2eHp2bmdudXhlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ5NDg2MDAsImV4cCI6MjA5MDUyNDYwMH0.u442X28Mhs-4T-tydabnMm8now8VfAEeNU-Sicuipq4'; 
const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
const GAME_ID = 'kavale_main_lobby';

let myPseudo = '';
let myAvatar = '';
let myColorCode = '#00FFFF'; 
let isMaster = false;
let gameState = 'lobby'; 
let realtimeChannel = null; 
let dbSyncInterval = null; 

const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const gridSize = 10;
let gameLoop = null;
let playersGameData = {}; 
let orderedPlayerNames = [];

function showLoadingError(message) {
    const loader = document.getElementById('loadingProfile');
    loader.style.animation = 'none';
    loader.style.color = '#ff4444';
    loader.innerHTML = `ERREUR : ${message}<br><br><button class="btn-primary" style="width: 100%;" onclick="window.location.href='../index.html'">RETOUR AU HUB</button>`;
}

// --- CHARGEMENT ---
window.onload = async () => {
    try {
        myPseudo = localStorage.getItem('cdsi_logged_user');
        
        if (!myPseudo || myPseudo === 'null' || myPseudo.trim() === '') {
            window.location.href = '../index.html'; 
            return;
        }

        const { data, error } = await sb.from('cdsi_users').select('avatar').eq('pseudo', myPseudo).maybeSingle();
        
        if (error) throw new Error("Impossible de lire la base de données.");

        if (data && data.avatar) {
            myAvatar = data.avatar.startsWith('../') ? data.avatar : '../' + data.avatar; 
        } else {
            myAvatar = '../bingoudalo/avatar/paulo1.jpg';
        }

        await autoJoinLobby();

    } catch (e) {
        console.error("Crash initialisation:", e);
        showLoadingError(e.message);
    }
};

async function fetchLobbyState() {
    const {data, error} = await sb.from('bingo_state').select('data').eq('id', GAME_ID).maybeSingle();
    if (error) throw new Error("Erreur serveur lors de la récupération du Lobby.");
    return data?.data || null;
}

async function updateLobbyState(newState) {
    const {error} = await sb.from('bingo_state').upsert({ id: GAME_ID, data: newState, updated_at: new Date().toISOString() }, { onConflict: 'id' });
    if (error) throw new Error("Erreur serveur lors de la sauvegarde du Lobby.");
}

async function autoJoinLobby() {
    try {
        let state = await fetchLobbyState();
        
        if(!state || !state.players) {
            state = { phase: 'lobby', master: myPseudo, players: {}, gameEndedSaved: false };
        } else {
            if (!state.players[state.master] && Object.keys(state.players).length > 0) {
                state.master = Object.keys(state.players)[0];
            } else if (!state.master) {
                state.master = myPseudo;
            }
        }

        if(Object.keys(state.players).length >= 4 && !state.players[myPseudo]) {
            alert("L'arène est pleine !");
            window.location.href = '../index.html';
            return;
        }

        if(!state.players[myPseudo]) {
            const colors = ['#00FFFF', '#FF00FF', '#FFFF00', '#00FF00'];
            let usedColors = Object.values(state.players).map(p => p.colorCode);
            let avail = colors.filter(c => !usedColors.includes(c));
            myColorCode = avail.length > 0 ? avail[0] : colors[Math.floor(Math.random() * colors.length)];
            
            state.players[myPseudo] = { pseudo: myPseudo, avatar: myAvatar, colorCode: myColorCode, score: 0 };
        } else {
            state.players[myPseudo].avatar = myAvatar; 
            myColorCode = state.players[myPseudo].colorCode;
        }
        
        await updateLobbyState(state);
        
        document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
        document.getElementById('screenLobby').classList.add('active');
        
        dbSyncInterval = setInterval(async () => {
            try {
                const s = await fetchLobbyState();
                if(s) updateLobbyUI(s);
            } catch(err) {
                console.error("Sync error:", err);
            }
        }, 1500);

    } catch (e) {
        showLoadingError(e.message);
    }
}

function updateLobbyUI(state) {
    isMaster = (state.master === myPseudo);
    // Remplacement du .placeholder.com par paulo1.jpg local pour éviter le spam réseau
    document.getElementById('playersList').innerHTML = Object.values(state.players).map(p => `
        <div class="player-row">
            <img src="${p.avatar}" class="player-avatar" style="border-color: ${p.colorCode}" onerror="this.onerror=null; this.src='../bingoudalo/avatar/paulo1.jpg';">
            <span style="color: ${p.colorCode}">${p.pseudo}</span>
            ${state.master === p.pseudo ? '<span class="badge badge-master">👑 Chef</span>' : ''}
        </div>
    `).join('');

    if(state.phase === 'lobby' && isMaster) {
        document.getElementById('lobbyControls').innerHTML = `<button class="btn-primary" onclick="startGame()">LANCER L'ARÈNE</button>`;
    } else if(state.phase === 'playing' && gameState === 'lobby') {
        gameState = 'playing';
        clearInterval(dbSyncInterval);
        initGameEngine(state.players);
    }
}

async function startGame() {
    try {
        let state = await fetchLobbyState();
        state.phase = 'playing';
        await updateLobbyState(state);
    } catch(e) {
        alert("Erreur de lancement : " + e.message);
    }
}

function initGameEngine(lobbyPlayers) {
    document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
    document.getElementById('screenGame').classList.add('active');
    orderedPlayerNames = Object.keys(lobbyPlayers);
    
    const header = document.getElementById('gameHeader');
    header.innerHTML = '';
    orderedPlayerNames.forEach(pseudo => {
        const p = lobbyPlayers[pseudo];
        playersGameData[pseudo] = { color: p.colorCode, avatar: p.avatar, score: 0, dead: false, x: 0, y: 0, nextDir: 'right', trail: [] };
        header.innerHTML += `<div class="player-hud" id="hud-${pseudo}" style="color:${p.colorCode}"><img src="${p.avatar}" onerror="this.onerror=null; this.src='../bingoudalo/avatar/paulo1.jpg';"><span>${pseudo}: <span id="score-${pseudo}">0</span></span></div>`;
    });

    resetPositions();
    realtimeChannel = sb.channel('kavale_arena').on('broadcast', {event:'move'}, (p)=>{
        if(p.payload.pseudo !== myPseudo && playersGameData[p.payload.pseudo]) {
            playersGameData[p.payload.pseudo].nextDir = p.payload.direction;
        }
    }).on('broadcast', {event:'start'}, ()=>startCountdown()).subscribe();

    if(isMaster) setTimeout(()=>realtimeChannel.send({type:'broadcast', event:'start'}), 1000);
}

function resetPositions() {
    const size = canvas.width;
    const spawns = [{x:50, y:size/2, d:'right'}, {x:size-50, y:size/2, d:'left'}, {x:size/2, y:50, d:'down'}, {x:size/2, y:size-50, d:'up'}];
    orderedPlayerNames.forEach((n, i) => {
        playersGameData[n].x = spawns[i].x; playersGameData[n].y = spawns[i].y;
        playersGameData[n].nextDir = spawns[i].d; playersGameData[n].direction = spawns[i].d;
        playersGameData[n].trail = []; playersGameData[n].dead = false;
        document.getElementById(`hud-${n}`).style.opacity = '1';
    });
}

function startCountdown() {
    let c = 3;
    const t = document.getElementById('statusText');
    const i = setInterval(() => {
        t.textContent = c > 0 ? c : "GO !";
        if(c-- < 0) { clearInterval(i); t.textContent = ""; gameLoop = setInterval(update, 80); }
    }, 1000);
}

function update() {
    ctx.clearRect(0,0,600,600);
    orderedPlayerNames.forEach(n => {
        const p = playersGameData[n];
        if(p.dead) return;
        p.trail.push({x:p.x, y:p.y});
        p.direction = p.nextDir;
        if(p.direction==='up') p.y-=10; if(p.direction==='down') p.y+=10;
        if(p.direction==='left') p.x-=10; if(p.direction==='right') p.x+=10;

        if(p.x<0 || p.x>=600 || p.y<0 || p.y>=600) p.dead = true;
        orderedPlayerNames.forEach(o => {
            playersGameData[o].trail.forEach(t => { if(p.x===t.x && p.y===t.y) p.dead=true; });
        });

        if(p.dead) document.getElementById(`hud-${n}`).style.opacity = '0.3';
        ctx.fillStyle = p.color; p.trail.forEach(t=>ctx.fillRect(t.x, t.y, 10, 10));
        ctx.fillStyle = 'white'; ctx.fillRect(p.x, p.y, 10, 10);
    });

    const alive = orderedPlayerNames.filter(n=>!playersGameData[n].dead);
    if(alive.length <= 1) {
        clearInterval(gameLoop);
        if(alive.length===1) {
            playersGameData[alive[0]].score++;
            document.getElementById(`score-${alive[0]}`).textContent = playersGameData[alive[0]].score;
            if(playersGameData[alive[0]].score >= 3) finish(alive[0]); else setTimeout(()=>resetPositions() || startCountdown(), 2000);
        } else setTimeout(()=>resetPositions() || startCountdown(), 2000);
    }
}

async function finish(w) {
    document.getElementById('victoryName').textContent = w;
    document.getElementById('victoryAvatar').src = playersGameData[w].avatar;
    document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
    document.getElementById('screenVictory').classList.add('active');
    if(isMaster) {
        try {
            const {data} = await sb.from('cdsi_users').select('kavale_wins').eq('pseudo', w).single();
            await sb.from('cdsi_users').update({ kavale_wins: (data?.kavale_wins || 0) + 1 }).eq('pseudo', w);
            await sb.from('bingo_state').delete().eq('id', GAME_ID);
        } catch(e) { console.error("Erreur sauvegarde victoire", e); }
    }
}

window.addEventListener('keydown', e => {
    const p = playersGameData[myPseudo];
    if(!p || p.dead) return;
    let d = null;
    if(e.code==='ArrowUp' && p.direction!=='down') d='up';
    if(e.code==='ArrowDown' && p.direction!=='up') d='down';
    if(e.code==='ArrowLeft' && p.direction!=='right') d='left';
    if(e.code==='ArrowRight' && p.direction!=='left') d='right';
    if(d) { p.nextDir = d; realtimeChannel.send({type:'broadcast', event:'move', payload:{pseudo:myPseudo, direction:d}}); }
});
</script>
</body>
</html>
