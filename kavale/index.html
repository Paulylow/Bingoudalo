<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KAVALE 🏍️💨 - Arène Multijoueur</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0b0c10; --surface: #14141e; --border: #1f2833;
    --cyan: #00FFFF; --magenta: #FF00FF; --accent3: #45a29e;
    --text: #c5c6c7; --muted: #66fcf1;
  }
  body { background:var(--bg); color:var(--text); font-family:'DM Sans',sans-serif; min-height:100vh; display:flex; flex-direction:column; align-items:center; padding:32px 16px; position:relative; overflow-x:hidden; }
  body::before { content:''; position:fixed; inset:0; background-image: linear-gradient(rgba(0, 255, 255, 0.05) 1px, transparent 1px), linear-gradient(90deg, rgba(0, 255, 255, 0.05) 1px, transparent 1px); background-size: 30px 30px; pointer-events:none; z-index:0; }
  
  .hub-link { position: absolute; top: 20px; left: 20px; color: var(--muted); text-decoration: none; font-weight: bold; z-index: 10; font-size: 14px; text-transform: uppercase; letter-spacing: 1px; transition: 0.2s;}
  .hub-link:hover { color: var(--cyan); text-shadow: 0 0 10px var(--cyan); }

  .screen { display:none; flex-direction:column; align-items:center; width:100%; max-width:800px; position:relative; z-index:1; }
  .screen.active { display:flex; }
  .logo { font-family:'Bebas Neue',sans-serif; font-size:clamp(52px,10vw,88px); letter-spacing:8px; line-height:1; background:linear-gradient(135deg,var(--cyan) 0%,var(--magenta) 100%); -webkit-background-clip:text; -webkit-text-fill-color:transparent; filter:drop-shadow(0 0 20px rgba(0,255,255,0.4)); font-style: italic; }
  .tagline { color:var(--muted); font-size:14px; letter-spacing:4px; text-transform:uppercase; margin-top:6px; margin-bottom:32px; font-weight: bold;}
  
  .join-card, .players-list { background:rgba(20,20,30,0.8); border:1px solid var(--border); border-radius:16px; padding:36px 32px; width:100%; max-width:500px; display:flex; flex-direction:column; gap:16px; backdrop-filter: blur(10px); box-shadow: 0 0 30px rgba(0,255,255,0.1); }
  .join-card h2, .players-list h3 { font-family:'Bebas Neue',sans-serif; font-size:24px; letter-spacing:2px; color:white; margin:0;}
  
  button { font-family:'DM Sans',sans-serif; font-weight:700; font-size:14px; letter-spacing:2px; text-transform:uppercase; border:none; border-radius:8px; cursor:pointer; padding:14px 24px; transition:0.2s; width: 100%;}
  .btn-primary { background:var(--cyan); color:#000; box-shadow:0 0 20px rgba(0,255,255,0.3); }
  .btn-primary:hover { transform:translateY(-2px); box-shadow:0 0 30px rgba(0,255,255,0.6); }
  button:disabled { opacity:0.5; cursor:not-allowed; transform:none !important; }

  .player-row { display:flex; align-items:center; gap:15px; padding:12px 0; border-bottom:1px solid var(--border); font-size:15px; font-weight:bold; color: white;}
  .player-row:last-child { border-bottom:none; }
  .player-avatar { width:40px; height:40px; border-radius:50%; object-fit: cover; border: 2px solid transparent; }
  .badge { font-size:10px; letter-spacing:1px; text-transform:uppercase; padding:4px 8px; border-radius:4px; margin-left:auto; }
  .badge-master { background:rgba(0,255,255,0.1); color:var(--cyan); border:1px solid var(--cyan); }
  
  /* JEU */
  #gameCanvas { border: 4px solid var(--border); background: #000; box-shadow: 0 0 40px rgba(0,0,0,0.8); border-radius: 8px; margin-top: 10px; max-width: 100%;}
  .game-header { display: flex; justify-content: space-around; width: 100%; margin-bottom: 10px; flex-wrap: wrap; gap: 15px; background: rgba(0,0,0,0.5); padding: 10px; border-radius: 10px; border: 1px solid #333;}
  .player-hud { display: flex; align-items: center; gap: 10px; font-weight: bold; font-size: 16px; text-transform: uppercase; letter-spacing: 1px; transition: 0.3s;}
  .player-hud img { width: 35px; height: 35px; border-radius: 50%; border: 2px solid transparent; object-fit: cover;}
  .player-hud .score-hud { font-size: 20px; font-family: 'Bebas Neue'; background: rgba(255,255,255,0.1); padding: 2px 10px; border-radius: 5px; }
  #statusText { font-family: 'Bebas Neue'; font-size: 38px; letter-spacing: 2px; text-align: center; height: 45px;}

  /* ÉCRAN DE VICTOIRE */
  .victory-card { text-align: center; padding: 40px; background: rgba(20,20,30,0.95); border: 2px solid; border-radius: 20px; animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); backdrop-filter: blur(10px); width: 100%; max-width: 500px; display: flex; flex-direction: column; align-items: center;}
  .victory-avatar { width: 120px; height: 120px; border-radius: 50%; border: 4px solid; margin-bottom: 20px; object-fit: cover; }
  .victory-title { font-family: 'Bebas Neue'; font-size: 70px; margin-bottom: 5px; letter-spacing: 4px;}
  .victory-name { font-size: 35px; margin-bottom: 30px; font-weight: bold; text-transform: uppercase; letter-spacing: 2px;}
  .btn-outline { background: transparent; border: 2px solid #555; color: white; box-shadow: none; margin-top: 15px;}
  .btn-outline:hover { border-color: white; transform: translateY(-2px);}
  @keyframes popIn { 0% { transform: scale(0.5); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }

  .loading-text { text-align: center; font-size: 18px; color: var(--cyan); font-weight: bold; margin-bottom: 20px; animation: blink 1s infinite alternate; }
  @keyframes blink { from { opacity: 0.5; } to { opacity: 1; } }

</style>
</head>
<body>

<a href="../index.html" class="hub-link">← Retour au Hub</a>

<div class="screen active" id="screenJoin">
  <div class="logo">KAVALE</div>
  <div class="tagline">3 manches gagnantes - Jusqu'à 4 joueurs</div>
  <div class="join-card" style="background: transparent; border: none; box-shadow: none;">
    <div id="loadingProfile" class="loading-text">Connexion au profil en cours...</div>
  </div>
</div>

<div class="screen" id="screenLobby">
  <div class="logo">KAVALE</div>
  <div class="tagline" id="lobbySubtitle">En attente des pilotes...</div>
  
  <div class="players-list">
    <h3>Pilotes (Max 4)</h3>
    <div id="playersList"></div>
    <div id="lobbyControls" style="margin-top: 15px;"></div>
  </div>
</div>

<div class="screen" id="screenGame">
    <div id="statusText">PRÉPARATION...</div>
    <div class="game-header" id="gameHeader"></div>
    <canvas id="gameCanvas" width="600" height="600"></canvas>
    <p style="color: #666; font-size: 12px; margin-top: 15px; text-transform: uppercase; letter-spacing: 1px;">Contrôles : Flèches directionnelles</p>
</div>

<div class="screen" id="screenVictory">
  <div class="logo" style="margin-bottom: 40px;">KAVALE</div>
  <div class="victory-card" id="victoryCard">
    <h2 class="victory-title" id="victoryTitle">VICTOIRE !</h2>
    <img src="" id="victoryAvatar" class="victory-avatar" onerror="this.src='https://via.placeholder.com/120/333/fff?text=?'">
    <div class="victory-name" id="victoryName">Pseudo</div>
    <button class="btn-primary" onclick="location.reload()">🔄 Rejouer</button>
    <button class="btn-outline" onclick="window.location.href='../index.html'">🏠 Retour au Hub</button>
  </div>
</div>

<script>
// --- CONFIGURATION SUPABASE ---
const SUPABASE_URL = 'https://pdybshweyfvxzvngnuxe.supabase.co'; 
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBkeWJzaHdleWZ2eHp2bmdudXhlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ5NDg2MDAsImV4cCI6MjA5MDUyNDYwMH0.u442X28Mhs-4T-tydabnMm8now8VfAEeNU-Sicuipq4'; 
const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

const GAME_ID = 'kavale_main_lobby';

// --- VARIABLES GLOBALES ---
let myPseudo = '';
let myAvatar = '';
let myColorCode = '#00FFFF'; // Couleur par défaut
let isMaster = false;
let gameState = 'lobby'; 
let realtimeChannel = null; 
let dbSyncInterval = null; 

// --- MOTEUR DE JEU KAVALE ---
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const gridSize = 10;
let gameLoop = null;
let playersGameData = {}; 
let orderedPlayerNames = [];

let isCountingDown = false;
let isRoundEnding = false;
let syncSpamInterval = null;

function showScreen(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

// --- INITIALISATION & AUTO-CONNEXION ---
window.onload = async () => {
    myPseudo = localStorage.getItem('cdsi_logged_user');
    
    if (!myPseudo) {
        window.location.href = '../index.html'; 
        return;
    }

    // Récupérer l'avatar depuis la DB
    const { data, error } = await sb.from('cdsi_users').select('avatar').eq('pseudo', myPseudo).single();
    if (data && data.avatar) {
        myAvatar = '../' + data.avatar; 
    } else {
        myAvatar = '../bingoudalo/avatar/paulo1.jpg'; // Secours
    }

    autoJoinLobby();
};

// --- BASE DE DONNÉES (LOBBY) ---
async function fetchLobbyState() {
    try {
        const {data} = await sb.from('bingo_state').select('data').eq('id', GAME_ID).maybeSingle();
        return data?.data || null;
    } catch(e) { return null; }
}
async function updateLobbyState(newState) {
    try {
        await sb.from('bingo_state').upsert({ id: GAME_ID, data: newState, updated_at: new Date().toISOString() }, { onConflict: 'id' });
    } catch(e) {}
}

// --- REJOINDRE LE LOBBY AUTOMATIQUEMENT ---
async function autoJoinLobby() {
    try {
        let state = await fetchLobbyState();
        
        if(!state || !state.players || Object.keys(state.players).length === 0) {
            state = { phase: 'lobby', master: myPseudo, players: {}, gameEndedSaved: false };
        } else {
            if (!state.players[state.master]) {
                state.master = myPseudo; // Si le master a buggé
            }
        }

        if(Object.keys(state.players).length >= 4 && !state.players[myPseudo]) {
            alert("La salle est pleine (4 joueurs max) !");
            window.location.href = '../index.html';
            return;
        }

        isMaster = (state.master === myPseudo);
        
        // ATTRIBUTION INTELLIGENTE DE COULEUR
        if(!state.players[myPseudo]) {
            const NEON_COLORS = ['#00FFFF', '#FF00FF', '#FFFF00', '#00FF00'];
            let usedColors = Object.values(state.players).map(p => p.colorCode);
            let availableColors = NEON_COLORS.filter(c => !usedColors.includes(c));
            
            // Prendre une couleur libre s'il en reste, sinon au hasard
            if (availableColors.length > 0) {
                myColorCode = availableColors[Math.floor(Math.random() * availableColors.length)];
            } else {
                myColorCode = NEON_COLORS[Math.floor(Math.random() * NEON_COLORS.length)];
            }

            state.players[myPseudo] = { pseudo: myPseudo, avatar: myAvatar, colorCode: myColorCode, score: 0 };
        } else {
            state.players[myPseudo].avatar = myAvatar; 
            myColorCode = state.players[myPseudo].colorCode; // On récupère sa couleur déjà assignée
        }
        
        await updateLobbyState(state);
        showScreen('screenLobby');
        startLobbySync(); 
    } catch (error) {
        alert("Erreur de connexion au serveur. Retour au Hub.");
        window.location.href = '../index.html';
    }
}

// --- SYNCHRONISATION LOBBY ---
function startLobbySync() {
    updateLobbyUI(null); 
    if(dbSyncInterval) clearInterval(dbSyncInterval);
    dbSyncInterval = setInterval(async () => {
        const state = await fetchLobbyState();
        if(state) updateLobbyUI(state);
    }, 2000);
}

function updateLobbyUI(state) {
    if(!state) return;
    
    isMaster = (state.master === myPseudo);
    const playersList = Object.values(state.players);
    
    document.getElementById('playersList').innerHTML = playersList.map(p => `
        <div class="player-row">
            <img src="${p.avatar}" class="player-avatar" style="border-color: ${p.colorCode}" onerror="this.src='https://via.placeholder.com/40/333/fff?text=?'">
            <span style="color: ${p.colorCode}">${p.pseudo}</span>
            ${state.master === p.pseudo ? '<span class="badge badge-master">👑 Maître</span>' : ''}
        </div>
    `).join('');

    if(state.phase === 'lobby') {
        const controls = document.getElementById('lobbyControls');
        if(isMaster) {
            // VÉRIFICATION : Au moins 2 joueurs requis pour Kavale !
            if (playersList.length >= 2) {
                controls.innerHTML = `<button class="btn-primary" onclick="launchGameFromLobby()">🏁 Démarrer la partie</button>`;
                document.getElementById('lobbySubtitle').textContent = `Tu es le maître. Lance la partie quand tout le monde est là.`;
            } else {
                controls.innerHTML = `<p style="color:var(--cyan); font-size:14px; font-weight:bold; text-align:center;">Il faut au moins 2 joueurs pour démarrer !</p>`;
                document.getElementById('lobbySubtitle').textContent = `En attente d'autres pilotes...`;
            }
        } else {
            controls.innerHTML = '';
            document.getElementById('lobbySubtitle').textContent = `Attends que ${state.master} lance la partie...`;
        }
    } 
    else if(state.phase === 'playing' && gameState === 'lobby') {
        gameState = 'playing';
        clearInterval(dbSyncInterval); 
        initGameEngine(state.players); 
    }
}

// --- LE MAÎTRE LANCE LE JEU ---
async function launchGameFromLobby() {
    let state = await fetchLobbyState();
    state.phase = 'playing';
    await updateLobbyState(state); 
    
    gameState = 'playing';
    clearInterval(dbSyncInterval);
    initGameEngine(state.players);
}

// ==========================================
// MOTEUR DE JEU (BROADCAST + ROUNDS)
// ==========================================

function initGameEngine(lobbyPlayers) {
    showScreen('screenGame');
    
    orderedPlayerNames = Object.keys(lobbyPlayers);
    const numPlayers = orderedPlayerNames.length;
    
    const newSize = 500 + ((numPlayers - 2) * 150);
    canvas.width = newSize;
    canvas.height = newSize;
    
    playersGameData = {};
    const header = document.getElementById('gameHeader');
    header.innerHTML = '';

    orderedPlayerNames.forEach(pseudo => {
        const p = lobbyPlayers[pseudo];
        
        playersGameData[pseudo] = { 
            color: p.colorCode, avatar: p.avatar, score: 0, dead: false, 
            x: 0, y: 0, direction: 'right', nextDir: 'right', trail: [] 
        };
        
        header.innerHTML += `
            <div class="player-hud" id="hud-${pseudo}" style="color: ${p.colorCode};">
                <img src="${p.avatar}" style="border-color: ${p.colorCode}">
                <span>${pseudo} : <span class="score-hud" id="score-${pseudo}">0</span>/3</span>
            </div>
        `;
    });

    resetPlayerPositions(); 

    realtimeChannel = sb.channel('kavale_arena');
    
    realtimeChannel.on('broadcast', { event: 'move' }, (payload) => {
        const data = payload.payload;
        if(data.pseudo !== myPseudo && playersGameData[data.pseudo]) {
            playersGameData[data.pseudo].nextDir = data.direction;
            playersGameData[data.pseudo].x = data.x;
            playersGameData[data.pseudo].y = data.y;
        }
    });

    realtimeChannel.on('broadcast', { event: 'p2_ready' }, () => {
        if (isMaster && !isCountingDown) {
            realtimeChannel.send({ type: 'broadcast', event: 'start_countdown', payload: {} });
            startCountdown();
        }
    });

    realtimeChannel.on('broadcast', { event: 'start_countdown' }, () => {
        if (!isMaster && !isCountingDown) {
            clearInterval(syncSpamInterval); 
            startCountdown();
        }
    });

    realtimeChannel.on('broadcast', { event: 'next_round' }, () => {
        if (!isMaster) prepareNextRound(false);
    });

    realtimeChannel.subscribe((status) => {
        if (status === 'SUBSCRIBED') {
            document.getElementById('statusText').textContent = "SYNCHRONISATION...";
            if (!isMaster) {
                syncSpamInterval = setInterval(() => { realtimeChannel.send({ type: 'broadcast', event: 'p2_ready', payload: {} }); }, 500);
            }
        }
    });
}

function resetPlayerPositions() {
    const size = canvas.width;
    const spawnPoints = [
        { x: 100, y: size/2, dir: 'right' },            
        { x: size - 100, y: size/2, dir: 'left' },      
        { x: size/2, y: 100, dir: 'down' },             
        { x: size/2, y: size - 100, dir: 'up' }         
    ];

    orderedPlayerNames.forEach((pseudo, index) => {
        const p = playersGameData[pseudo];
        const sp = spawnPoints[index];
        p.x = Math.round(sp.x / 10) * 10;
        p.y = Math.round(sp.y / 10) * 10;
        p.direction = sp.dir;
        p.nextDir = sp.dir;
        p.trail = [];
        p.dead = false;
        
        document.getElementById(`hud-${pseudo}`).style.opacity = '1';
    });
    
    ctx.clearRect(0, 0, canvas.width, canvas.height);
}

function startCountdown() {
    isCountingDown = true;
    isRoundEnding = false;
    let count = 3;
    const statusEl = document.getElementById('statusText');
    const interval = setInterval(() => {
        statusEl.textContent = count > 0 ? count : "GO !";
        statusEl.style.color = count > 0 ? "white" : "var(--cyan)";
        if(count === 0) {
            clearInterval(interval);
            setTimeout(() => statusEl.textContent = "", 1000); 
            if(gameLoop) clearInterval(gameLoop);
            gameLoop = setInterval(updatePhysics, 80); 
        }
        count--;
    }, 1000);
}

// --- PHYSIQUE ---
function updatePhysics() {
    if (isRoundEnding) return;

    ctx.clearRect(0, 0, canvas.width, canvas.height);
    const pseudos = orderedPlayerNames;
    
    pseudos.forEach(pseudo => {
        const p = playersGameData[pseudo];
        if (p.dead) return;

        p.trail.push({ x: p.x, y: p.y });
        p.direction = p.nextDir;

        if (p.direction === 'up') p.y -= gridSize;
        if (p.direction === 'down') p.y += gridSize;
        if (p.direction === 'left') p.x -= gridSize;
        if (p.direction === 'right') p.x += gridSize;

        checkCollisions(pseudo, pseudos);

        ctx.fillStyle = p.color;
        ctx.shadowBlur = 10;
        ctx.shadowColor = p.color;
        p.trail.forEach(pos => ctx.fillRect(pos.x, pos.y, gridSize, gridSize));
        
        ctx.fillStyle = 'white';
        ctx.shadowBlur = 15;
        ctx.shadowColor = 'white';
        ctx.fillRect(p.x, p.y, gridSize, gridSize);
        ctx.shadowBlur = 0; 
    });

    checkWinCondition(pseudos);
}

// --- CONTRÔLES ---
window.addEventListener('keydown', e => {
    if (gameState !== 'playing' || isRoundEnding || !playersGameData[myPseudo] || playersGameData[myPseudo].dead) return;

    let newDir = null;
    const p = playersGameData[myPseudo];

    if (e.code === 'ArrowUp' && p.direction !== 'down') newDir = 'up';
    if (e.code === 'ArrowDown' && p.direction !== 'up') newDir = 'down';
    if (e.code === 'ArrowLeft' && p.direction !== 'right') newDir = 'left';
    if (e.code === 'ArrowRight' && p.direction !== 'left') newDir = 'right';

    if (newDir && newDir !== p.nextDir) {
        p.nextDir = newDir;
        if(realtimeChannel) {
            realtimeChannel.send({ type: 'broadcast', event: 'move', payload: { pseudo: myPseudo, direction: newDir, x: p.x, y: p.y }});
        }
    }
});

// --- COLLISIONS ---
function checkCollisions(myId, allIds) {
    const p = playersGameData[myId];
    if (p.x < 0 || p.x >= canvas.width || p.y < 0 || p.y >= canvas.height) { p.dead = true; document.getElementById(`hud-${myId}`).style.opacity = '0.4'; return;}

    allIds.forEach(otherId => {
        const otherP = playersGameData[otherId];
        for (let i = 0; i < otherP.trail.length; i++) {
            if (p.x === otherP.trail[i].x && p.y === otherP.trail[i].y) { p.dead = true; document.getElementById(`hud-${myId}`).style.opacity = '0.4';}
        }
        if (myId !== otherId && p.x === otherP.x && p.y === otherP.y) {
            p.dead = true; otherP.dead = true;
            document.getElementById(`hud-${myId}`).style.opacity = '0.4';
            document.getElementById(`hud-${otherId}`).style.opacity = '0.4';
        }
    });
}

// --- GESTION DES MANCHES ET VICTOIRE ---
function checkWinCondition(allIds) {
    const alive = allIds.filter(id => !playersGameData[id].dead);
    
    if (alive.length <= 1 && allIds.length > 1) {
        isRoundEnding = true;
        handleRoundEnd(alive);
    }
}

function handleRoundEnd(alivePlayers) {
    clearInterval(gameLoop);
    const statusEl = document.getElementById('statusText');

    if(alivePlayers.length === 0) {
        statusEl.textContent = "CRASH TOTAL ! MANCHE NULLE";
        statusEl.style.color = "white";
        setTimeout(() => prepareNextRound(true), 3000);
    } else {
        const winnerPseudo = alivePlayers[0];
        const winner = playersGameData[winnerPseudo];
        winner.score++;
        document.getElementById(`score-${winnerPseudo}`).textContent = winner.score;
        
        if(winner.score >= 3) {
            statusEl.textContent = `🏆 VICTOIRE TOTALE ! 🏆`;
            statusEl.style.color = winner.color;
            setTimeout(() => triggerVictoryScreen(winnerPseudo), 2000);
        } else {
            statusEl.textContent = `MANCHE POUR ${winnerPseudo} !`;
            statusEl.style.color = winner.color;
            setTimeout(() => prepareNextRound(true), 3000);
        }
    }
}

function prepareNextRound(triggerBroadcast) {
    resetPlayerPositions();
    if(isMaster && triggerBroadcast) {
        realtimeChannel.send({ type: 'broadcast', event: 'next_round', payload: {} });
        startCountdown();
    } else if (!isMaster && !triggerBroadcast) {
        startCountdown();
    }
}

// --- L'ÉCRAN DE VICTOIRE ET SAUVEGARDE EN DB ---
async function triggerVictoryScreen(winnerPseudo) {
    const winner = playersGameData[winnerPseudo];
    
    document.getElementById('victoryName').textContent = winnerPseudo;
    document.getElementById('victoryName').style.color = winner.color;
    document.getElementById('victoryAvatar').src = winner.avatar;
    document.getElementById('victoryAvatar').style.borderColor = winner.color;
    
    document.getElementById('victoryCard').style.borderColor = winner.color;
    document.getElementById('victoryCard').style.boxShadow = `0 0 50px ${winner.color}`;
    document.getElementById('victoryTitle').style.color = winner.color;
    document.getElementById('victoryTitle').style.textShadow = `0 0 20px ${winner.color}`;

    showScreen('screenVictory');

    // SEUL LE MAÎTRE SAUVEGARDE LA VICTOIRE POUR ÉVITER LES DOUBLONS
    if(isMaster) {
        let state = await fetchLobbyState();
        if (state && !state.gameEndedSaved) {
            state.gameEndedSaved = true;
            await updateLobbyState(state);
            
            let {data} = await sb.from('cdsi_users').select('kavale_wins').eq('pseudo', winnerPseudo).single();
            if (data) {
                await sb.from('cdsi_users').update({ kavale_wins: (data.kavale_wins || 0) + 1 }).eq('pseudo', winnerPseudo);
            }
        }
        await sb.from('bingo_state').delete().eq('id', GAME_ID);
    }

    if(realtimeChannel) {
        sb.removeChannel(realtimeChannel);
    }
}

// --- Sécurité si on ferme l'onglet pendant le lobby ---
window.addEventListener("beforeunload", async (e) => {
    if (gameState === 'lobby' && isMaster) {
        await sb.from('bingo_state').delete().eq('id', GAME_ID);
    }
});

</script>
