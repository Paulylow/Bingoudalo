<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SUBWAY RUN</title>
<link href="https://fonts.googleapis.com/css2?family=Bangers&family=Nunito:wght@700;900&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; user-select:none; }
body { background:#1a1a2e; font-family:'Nunito',sans-serif; height:100vh; display:flex; flex-direction:column; overflow:hidden; }
#hud { display:flex; align-items:center; justify-content:space-between; padding:8px 20px; background:#16213e; border-bottom:3px solid #e94560; flex-shrink:0; height:56px; }
#hud h1 { font-family:'Bangers'; font-size:26px; letter-spacing:3px; color:#e94560; text-shadow:2px 2px 0 #000; }
.hud-stats { display:flex; gap:14px; }
.stat { background:rgba(0,0,0,0.4); border:2px solid #e94560; border-radius:8px; padding:3px 14px; text-align:center; }
.stat-label { font-size:9px; font-weight:900; letter-spacing:2px; color:#666; text-transform:uppercase; }
.stat-val { font-family:'Bangers'; font-size:22px; color:#fff; line-height:1.1; }
#score-val { color:#ffd700; } #coins-val { color:#ffd700; } #lives-val { color:#e94560; font-size:16px; }
#wrap { flex:1; position:relative; overflow:hidden; }
canvas { display:block; }
.screen { position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center; background:rgba(22,33,62,0.93); z-index:20; }
.screen.hidden { display:none; }
.stitle { font-family:'Bangers'; font-size:72px; letter-spacing:6px; color:#e94560; text-shadow:4px 4px 0 #000; line-height:1; text-align:center; }
.ssub { font-size:12px; font-weight:700; letter-spacing:4px; color:#444; text-transform:uppercase; margin:8px 0 32px; }
.sscore { font-family:'Bangers'; font-size:50px; color:#ffd700; letter-spacing:3px; text-shadow:3px 3px 0 #000; }
.sbest { font-size:12px; font-weight:700; color:#444; letter-spacing:2px; text-transform:uppercase; margin:4px 0 28px; }
.btn { font-family:'Bangers'; font-size:22px; letter-spacing:4px; padding:13px 54px; border-radius:50px; border:none; cursor:pointer; background:#e94560; color:#fff; box-shadow:0 5px 0 #9b1e34; transition:transform .1s, box-shadow .1s; }
.btn:hover { transform:translateY(-2px); }
.btn:active { transform:translateY(3px); box-shadow:0 2px 0 #9b1e34; }
.hint { margin-top:22px; font-size:11px; font-weight:700; color:#333; text-align:center; line-height:2.2; letter-spacing:1px; text-transform:uppercase; }
kbd { background:rgba(255,255,255,0.06); border:1px solid #333; border-radius:4px; padding:1px 7px; color:#444; font-size:10px; }
#notif { position:absolute; top:12px; left:50%; transform:translateX(-50%) translateY(-70px); background:#1a1a2e; border:2px solid #ffd700; border-radius:50px; padding:6px 22px; font-family:'Bangers'; font-size:18px; letter-spacing:3px; color:#ffd700; z-index:30; transition:transform .3s cubic-bezier(.17,.89,.32,1.28); pointer-events:none; white-space:nowrap; }
#notif.show { transform:translateX(-50%) translateY(0); }
</style>
</head>
<body>
<div id="hud">
  <h1>SUBWAY RUN</h1>
  <div class="hud-stats">
    <div class="stat"><div class="stat-label">Score</div><div class="stat-val" id="score-val">0</div></div>
    <div class="stat"><div class="stat-label">Pièces</div><div class="stat-val" id="coins-val">0</div></div>
    <div class="stat"><div class="stat-label">Vies</div><div class="stat-val" id="lives-val">❤❤❤</div></div>
    <div class="stat"><div class="stat-label">Record</div><div class="stat-val" id="best-val" style="color:#555">0</div></div>
  </div>
</div>
<div id="wrap">
  <canvas id="c"></canvas>
  <div class="screen" id="s-start">
    <div class="stitle">SUBWAY<br>RUN</div>
    <div class="ssub">Endless Runner · Esquive tout !</div>
    <button class="btn" id="btn-start">▶ JOUER</button>
    <div class="hint"><kbd>←</kbd> <kbd>→</kbd> changer de voie &nbsp;·&nbsp; <kbd>↑</kbd> <kbd>Espace</kbd> sauter<br><kbd>↓</kbd> glisser sous les obstacles</div>
  </div>
  <div class="screen hidden" id="s-over">
    <div class="stitle" style="font-size:56px">GAME<br>OVER</div>
    <div class="sscore" id="fs">0 PTS</div>
    <div class="sbest" id="fb">Record : 0</div>
    <button class="btn" id="btn-retry">↺ REJOUER</button>
  </div>
  <div id="notif">+50</div>
</div>

<script>
const cv = document.getElementById('c');
const cx = cv.getContext('2d');
const wrap = document.getElementById('wrap');

let W, H;
function resize() {
  W = wrap.clientWidth;
  H = wrap.clientHeight;
  cv.width = W;
  cv.height = H;
}
resize();
window.addEventListener('resize', resize);

// ─────────────────────────────────────────
// PERSPECTIVE
// The road goes from horizon (top) to bottom of screen.
// PLAYER is drawn at a fixed screen position — bottom-center, large.
// Everything else uses proj() to scale with depth.
//
// depth: 0.0 = horizon (tiny), 1.0 = bottom of road area (large)
// ─────────────────────────────────────────

// Horizon Y: where road meets sky
function HY() { return H * 0.38; }

// Bottom of road on screen (where player stands) — leave room so player is fully visible
function BY() { return H * 0.78; }

// Project a world object to screen
// lane: -1 / 0 / 1
// depth: 0=far, 1=near
// yLift: pixels to lift above ground (for jump, signs, etc)
function proj(lane, depth, yLift) {
  yLift = yLift || 0;
  // road half-width at the near plane
  const ROAD_HALF = W * 0.26;
  const LANE_W = ROAD_HALF * 0.65;
  const hy = HY(), by = BY();
  const screenY = hy + (by - hy) * depth;
  const screenX = W/2 + lane * LANE_W * depth;
  // lift: objects higher up = lower screenY
  const liftPx = yLift * depth;
  return { x: screenX, y: screenY - liftPx, s: depth };
}

// ─────────────────────────────────────────
// STATE
// ─────────────────────────────────────────
let phase = 'start';
let score, coins, lives, best;
let spd, tick, frame, invFrames;
let playerLane;     // -1, 0, 1  (target)
let visualLane;     // smooth float
let prevVisualLane;
let laneT;
let jumpT, isJump, slideT, inputCD;
let obstacles, coinObjs, planks;
let bobT = 0;

best = +(localStorage.getItem('sr4_best') || 0);
document.getElementById('best-val').textContent = best;

function resetGame() {
  score=0; coins=0; lives=3;
  spd=0.008; tick=0; frame=0; invFrames=0;
  playerLane=0; visualLane=0; prevVisualLane=0; laneT=1;
  jumpT=0; isJump=false; slideT=0; inputCD=0;
  obstacles=[]; coinObjs=[];
  planks = Array.from({length:22}, (_,i) => i/22);
  updateHUD();
}

function updateHUD() {
  document.getElementById('score-val').textContent = score;
  document.getElementById('coins-val').textContent = coins;
  document.getElementById('lives-val').textContent = [0,1,2].map(i=>i<lives?'❤':'🖤').join('');
}

// ─────────────────────────────────────────
// INPUT
// ─────────────────────────────────────────
document.addEventListener('keydown', e => {
  if (phase !== 'play') return;
  if (e.repeat) return;
  if (e.code==='ArrowLeft'  || e.code==='KeyA') { moveLane(-1); e.preventDefault(); }
  if (e.code==='ArrowRight' || e.code==='KeyD') { moveLane(+1); e.preventDefault(); }
  if (e.code==='ArrowUp' || e.code==='KeyW' || e.code==='Space') { doJump(); e.preventDefault(); }
  if (e.code==='ArrowDown'  || e.code==='KeyS') { doSlide(); e.preventDefault(); }
});

let tx0=0, ty0=0;
wrap.addEventListener('touchstart', e=>{ tx0=e.touches[0].clientX; ty0=e.touches[0].clientY; }, {passive:true});
wrap.addEventListener('touchend', e=>{
  if (phase!=='play') return;
  const dx=e.changedTouches[0].clientX-tx0, dy=e.changedTouches[0].clientY-ty0;
  if (Math.abs(dx)>Math.abs(dy)) moveLane(dx<0?-1:1);
  else dy<0?doJump():doSlide();
});

function moveLane(dir) {
  if (inputCD>0) return;
  const next = playerLane + dir;
  if (next<-1||next>1) return;
  prevVisualLane = visualLane;
  playerLane = next;
  laneT = 0;
  inputCD = 10;
}
function doJump()  { if (!isJump && slideT<=0) { isJump=true; jumpT=0; } }
function doSlide() { if (!isJump) slideT=36; else jumpT=Math.max(jumpT,32); }

// ─────────────────────────────────────────
// BUTTONS
// ─────────────────────────────────────────
document.getElementById('btn-start').onclick = startGame;
document.getElementById('btn-retry').onclick  = startGame;

function startGame() {
  document.getElementById('s-start').classList.add('hidden');
  document.getElementById('s-over').classList.add('hidden');
  resetGame();
  phase = 'play';
}

function endGame() {
  phase = 'over';
  if (score>best) { best=score; localStorage.setItem('sr4_best', best); }
  document.getElementById('fs').textContent = score+' PTS';
  document.getElementById('fb').textContent = 'Record : '+best;
  document.getElementById('best-val').textContent = best;
  document.getElementById('s-over').classList.remove('hidden');
}

// ─────────────────────────────────────────
// SPAWN
// ─────────────────────────────────────────
function spawnObs() {
  const types = ['barrel','fence','sign','cart'];
  const type = types[Math.floor(Math.random()*types.length)];
  const lanes = [-1,0,1].sort(()=>Math.random()-0.5);
  const n = Math.random()<0.3 ? 2 : 1;
  for (let i=0;i<n;i++) {
    obstacles.push({ lane:lanes[i], depth:0.0, type, hit:false });
  }
}

function spawnCoins() {
  const lane = [-1,0,1][Math.floor(Math.random()*3)];
  const air  = Math.random()<0.35;
  const cnt  = Math.floor(Math.random()*3)+2;
  for (let i=0;i<cnt;i++) {
    coinObjs.push({ lane, depth:0.0 - i*0.03, air });
  }
}

// ─────────────────────────────────────────
// UPDATE
// ─────────────────────────────────────────
function update() {
  frame++; tick++;
  if (inputCD>0) inputCD--;
  if (invFrames>0) invFrames--;

  // Speed ramp
  if (tick%400===0) { spd=Math.min(spd+0.001,0.018); showNotif('⚡ VITESSE !'); }

  score += Math.round(spd * 180);
  document.getElementById('score-val').textContent = score;

  // Lane lerp
  laneT = Math.min(laneT+0.18, 1);
  const t = laneT<0.5 ? 2*laneT*laneT : -1+(4-2*laneT)*laneT;
  visualLane = prevVisualLane + (playerLane - prevVisualLane) * t;

  // Jump (42-frame arc)
  if (isJump) { jumpT++; if(jumpT>=42){isJump=false;jumpT=0;} }
  if (slideT>0) slideT--;

  // Planks scroll
  planks = planks.map(d => { d+=spd*0.8; return d>1.02?d-1.02:0; }).map((d,i)=>d===0?planks[i]+spd*0.8-1.02+(i/22):d);
  // simpler plank scroll:
  for (let i=0;i<planks.length;i++) {
    planks[i] += spd*0.8;
    if (planks[i]>1.02) planks[i] -= 1.02;
  }

  // Move obstacles — slow enough to see from afar
  const OBS_SPEED = spd * 0.5;
  for (const o of obstacles) o.depth += OBS_SPEED;

  // Collision check: when obstacle is at player depth (0.9-1.0)
  for (const o of obstacles) {
    if (o.hit || invFrames>0) continue;
    if (o.depth < 0.88 || o.depth > 1.02) continue;
    if (Math.round(visualLane) !== o.lane) continue;

    const jumpH = isJump ? Math.sin(jumpT/42*Math.PI) * 130 : 0;
    const sliding = slideT > 0;
    let hit = false;
    if (o.type==='barrel' || o.type==='cart') hit = (jumpH < 45);
    if (o.type==='fence')  hit = true;
    if (o.type==='sign')   hit = !sliding;
    if (hit) { o.hit=true; takeHit(); }
  }
  obstacles = obstacles.filter(o => o.depth < 1.1);

  // Move coins
  const COIN_SPEED = spd * 0.5;
  for (const c of coinObjs) c.depth += COIN_SPEED;

  coinObjs = coinObjs.filter(c => {
    if (c.depth < 0.88 || c.depth > 1.02) return c.depth < 1.1;
    if (Math.round(visualLane) !== c.lane) return true;
    const jumpH = isJump ? Math.sin(jumpT/42*Math.PI)*130 : 0;
    const coinH = c.air ? 90 : 0;
    if (Math.abs(jumpH-coinH) < 55) {
      coins++; score+=50;
      document.getElementById('coins-val').textContent = coins;
      document.getElementById('score-val').textContent = score;
      showNotif('🪙 +50');
      return false;
    }
    return true;
  });

  // Spawn
  const spawnInterval = Math.max(Math.round(100 - spd*3000), 40);
  if (frame % spawnInterval === 0) spawnObs();
  if (frame % 50 === 0) spawnCoins();
}

function takeHit() {
  lives--; invFrames=100; updateHUD();
  if (lives<=0) endGame();
}

// ─────────────────────────────────────────
// DRAW
// ─────────────────────────────────────────
function draw() {
  cx.clearRect(0,0,W,H);

  drawSky();
  drawBuildings();
  drawGround();
  drawRoad();
  drawPlanks();

  // ── SORTED DRAW: cop < obstacles/coins < player ──
  // Cop is drawn at a fixed depth of 0.65 (always behind player at 1.0)
  // We collect all drawables and sort by depth so nearer = drawn later = on top

  const drawables = [];

  // Cop: fixed depth 0.60, always behind player
  drawables.push({ depth: 0.60, fn: drawCop });

  // Obstacles
  for (const o of obstacles) {
    const d = o.depth;
    drawables.push({ depth: d, fn: () => drawObstacle(o) });
  }

  // Coins
  for (const c of coinObjs) {
    const d = c.depth;
    drawables.push({ depth: d, fn: () => drawCoin(c) });
  }

  // Player: always depth 1.0 → ALWAYS LAST → ALWAYS ON TOP
  drawables.push({ depth: 1.0, fn: drawPlayer });

  // Sort back to front: smallest depth first
  drawables.sort((a,b) => a.depth - b.depth);

  for (const d of drawables) d.fn();
}

// ─────────────────────────────────────────
// BACKGROUND
// ─────────────────────────────────────────
function drawSky() {
  const g = cx.createLinearGradient(0,0,0,HY());
  g.addColorStop(0,'#5ab8e8'); g.addColorStop(1,'#c8eaf8');
  cx.fillStyle=g; cx.fillRect(0,0,W,HY());
  cx.save();
  cx.shadowColor='#ffcc00'; cx.shadowBlur=28;
  cx.fillStyle='#ffe040';
  cx.beginPath(); cx.arc(W*0.82, HY()*0.26, 30, 0, Math.PI*2); cx.fill();
  cx.restore();
}

function drawBuildings() {
  const hy = HY();
  const bldgs = [
    {x:.01,w:.07,h:.30,c:'#d4845a'},{x:.07,w:.05,h:.42,c:'#c06040'},
    {x:.11,w:.09,h:.22,c:'#e09060'},{x:.18,w:.06,h:.36,c:'#b85040'},{x:.23,w:.04,h:.28,c:'#d4845a'},
    {x:.62,w:.07,h:.34,c:'#d4845a'},{x:.68,w:.05,h:.44,c:'#c06040'},
    {x:.72,w:.09,h:.24,c:'#e09060'},{x:.79,w:.06,h:.38,c:'#b85040'},
    {x:.84,w:.05,h:.30,c:'#d4845a'},{x:.88,w:.08,h:.46,c:'#c06040'},{x:.94,w:.06,h:.26,c:'#e09060'},
  ];
  bldgs.forEach(b => {
    const bh=hy*b.h;
    cx.fillStyle=b.c; cx.fillRect(W*b.x,hy-bh,W*b.w,bh);
    cx.fillStyle='rgba(255,240,160,0.25)';
    for(let wy=hy-bh+8;wy<hy-4;wy+=16)
      for(let wx=W*b.x+5;wx<W*(b.x+b.w)-8;wx+=13)
        cx.fillRect(wx,wy,7,9);
    cx.fillStyle='rgba(0,0,0,0.1)'; cx.fillRect(W*b.x,hy-bh,W*b.w,4);
  });
}

function drawGround() {
  const g = cx.createLinearGradient(0,HY(),0,H);
  g.addColorStop(0,'#c8a060'); g.addColorStop(1,'#8a6030');
  cx.fillStyle=g; cx.fillRect(0,HY(),W,H-HY());
}

function drawRoad() {
  // Road is a trapezoid: narrow at top (horizon), wide at bottom
  const hy = HY(), by = BY();
  const ROAD_HALF_FAR  = W * 0.01;  // width at horizon
  const ROAD_HALF_NEAR = W * 0.26;  // width at player level

  cx.beginPath();
  cx.moveTo(W/2 - ROAD_HALF_FAR,  hy);
  cx.lineTo(W/2 + ROAD_HALF_FAR,  hy);
  cx.lineTo(W/2 + ROAD_HALF_NEAR, by + 40);
  cx.lineTo(W/2 - ROAD_HALF_NEAR, by + 40);
  cx.closePath();
  const rg = cx.createLinearGradient(0,hy,0,by);
  rg.addColorStop(0,'#888'); rg.addColorStop(1,'#bbb');
  cx.fillStyle=rg; cx.fill();

  // Lane dividers at 1/3 and 2/3 of road width
  [-0.333, 0.333].forEach(lx => {
    const pFar  = proj(lx, 0.01);
    const pNear = proj(lx, 1.0);
    cx.save();
    cx.strokeStyle='rgba(255,255,255,0.55)'; cx.lineWidth=2;
    cx.setLineDash([18,14]);
    cx.beginPath(); cx.moveTo(pFar.x,pFar.y); cx.lineTo(pNear.x,pNear.y); cx.stroke();
    cx.restore();
  });

  // Road edges
  cx.setLineDash([]);
  [[-1,1],[1,1]].forEach(([lane,depth])=>{
    const pF=proj(lane,0.01), pN=proj(lane,1.0);
    cx.beginPath(); cx.moveTo(pF.x,pF.y); cx.lineTo(pN.x,pN.y);
    cx.strokeStyle='rgba(255,255,255,0.8)'; cx.lineWidth=3; cx.stroke();
  });
}

function drawPlanks() {
  planks.forEach(d => {
    if (d<0.01) return;
    const pL = proj(-1, d), pR = proj(1, d);
    cx.beginPath(); cx.moveTo(pL.x,pL.y); cx.lineTo(pR.x,pR.y);
    cx.strokeStyle = `rgba(60,40,10,${d*0.3})`; cx.lineWidth = Math.max(d*4,0.5);
    cx.setLineDash([]); cx.stroke();
  });
}

// ─────────────────────────────────────────
// CHARACTERS
// ─────────────────────────────────────────

// Player — drawn at fixed screen position (bottom center), big
function drawPlayer() {
  // Fixed screen position, not using proj() for placement
  // This ensures player is ALWAYS fully visible and never cut off
  const px = W/2 + visualLane * W * 0.26 * 0.65;
  const py = BY();
  const s  = 1.4; // scale multiplier — big and clear

  const jH = isJump ? Math.sin(jumpT/42*Math.PI) * 110 : 0;
  const sliding = slideT > 0;

  // Shadow on road
  cx.save();
  cx.globalAlpha = 0.25 * (1 - jH/120);
  cx.fillStyle = 'rgba(0,0,0,0.6)';
  cx.beginPath(); cx.ellipse(px, py, 28*s, 8*s, 0, 0, Math.PI*2); cx.fill();
  cx.restore();

  if (invFrames>0 && Math.floor(invFrames/6)%2===0) return;

  cx.save();
  cx.translate(px, py - jH);
  if (sliding) { cx.translate(0, 22*s); cx.scale(1, 0.45); }

  const lg = Math.sin(frame * 0.32);

  // Legs
  [[-1, lg],[1, -lg]].forEach(([side, sw]) => {
    cx.save();
    cx.translate(side*10*s, 0);
    cx.rotate(sw * 0.32);
    cx.fillStyle='#2255bb';
    cx.beginPath(); cx.roundRect(-7*s, 0, 14*s, 36*s, 4*s); cx.fill();
    cx.fillStyle='#111'; cx.fillRect(-8*s, 30*s, 20*s, 8*s);
    cx.restore();
  });

  // Body (jacket)
  cx.fillStyle='#e83030';
  cx.beginPath(); cx.roundRect(-20*s, -40*s, 40*s, 42*s, [0,0,6*s,6*s]); cx.fill();
  cx.fillStyle='#c01010'; cx.fillRect(-20*s, -40*s, 40*s, 14*s);

  // Backpack
  cx.fillStyle='#1a3faa';
  cx.beginPath(); cx.roundRect(-14*s, -80*s, 28*s, 42*s, 5*s); cx.fill();
  cx.fillStyle='#2255cc'; cx.fillRect(-10*s, -68*s, 20*s, 14*s);

  // Arms
  [[-1, -lg],[1, lg]].forEach(([side, sw]) => {
    cx.save();
    cx.translate(side * 21*s, -38*s);
    cx.rotate(sw * 0.36);
    cx.fillStyle='#e83030';
    cx.beginPath(); cx.roundRect(side>0?0:-11*s, 0, 11*s, 30*s, 4*s); cx.fill();
    cx.restore();
  });

  // Head
  cx.fillStyle='#f5c090';
  cx.beginPath(); cx.arc(0, -90*s, 18*s, 0, Math.PI*2); cx.fill();
  // Hair
  cx.fillStyle='#2a1000';
  cx.beginPath(); cx.arc(0, -93*s, 18*s, Math.PI, 2*Math.PI); cx.fill();
  cx.fillRect(-18*s, -96*s, 36*s, 6*s);
  // Hood/collar
  cx.fillStyle='#c01010';
  cx.beginPath(); cx.arc(0, -90*s, 20*s, 0.2, Math.PI-0.2); cx.fill();

  cx.restore();
}

// Cop — drawn using proj() at depth 0.60, same lane as player, always behind
function drawCop() {
  bobT += 0.10;
  const bob = Math.sin(bobT) * 4;

  // Use the same visual lane as player so cop follows
  const p = proj(visualLane * 0.65, 0.60, bob);
  const s = p.s * 80; // scale from depth

  cx.save();
  cx.translate(p.x, p.y);

  const lg = Math.sin(frame*0.32 + Math.PI);

  // Legs
  [[-1,lg],[1,-lg]].forEach(([side,sw])=>{
    cx.save();
    cx.translate(side*s*0.12, 0);
    cx.rotate(sw*0.28);
    cx.fillStyle='#1a3a8a';
    cx.beginPath(); cx.roundRect(-s*0.09,0,s*0.17,s*0.45,s*0.05); cx.fill();
    cx.fillStyle='#111'; cx.fillRect(-s*0.10,s*0.38,s*0.26,s*0.10);
    cx.restore();
  });

  // Body
  cx.fillStyle='#1a3a8a';
  cx.beginPath(); cx.roundRect(-s*0.25,-s*0.52,s*0.50,s*0.54,[0,0,s*0.08,s*0.08]); cx.fill();
  // Belt
  cx.fillStyle='#111'; cx.fillRect(-s*0.25,-s*0.14,s*0.50,s*0.10);
  cx.fillStyle='#ffd700'; cx.fillRect(-s*0.06,-s*0.14,s*0.12,s*0.10);

  // Arms
  [[-1,-lg],[1,lg]].forEach(([side,sw])=>{
    cx.save();
    cx.translate(side*(s*0.25+s*0.06),-s*0.50);
    cx.rotate(sw*0.34);
    cx.fillStyle='#1a3a8a';
    cx.beginPath(); cx.roundRect(side>0?0:-s*0.13,0,s*0.13,s*0.38,s*0.05); cx.fill();
    cx.restore();
  });

  // Head
  cx.fillStyle='#f5c090';
  cx.beginPath(); cx.arc(0,-s*0.68,s*0.21,0,Math.PI*2); cx.fill();
  // Hat
  cx.fillStyle='#1a3a8a';
  cx.beginPath(); cx.ellipse(0,-s*0.78,s*0.26,s*0.09,0,0,Math.PI*2); cx.fill();
  cx.beginPath(); cx.arc(0,-s*0.79,s*0.18,Math.PI,2*Math.PI); cx.fill();
  cx.fillStyle='#ffd700'; cx.fillRect(-s*0.10,-s*0.84,s*0.20,s*0.05);
  // Sunglasses
  cx.fillStyle='rgba(0,0,0,0.7)';
  cx.fillRect(-s*0.18,-s*0.66,s*0.14,s*0.06);
  cx.fillRect(s*0.04,-s*0.66,s*0.14,s*0.06);

  // STOP speech bubble
  if (Math.floor(frame/50)%2===0) {
    cx.fillStyle='#e94560'; cx.font=`bold ${Math.max(s*0.18,10)}px Nunito`;
    cx.textAlign='center'; cx.fillText('STOP !', 0, -s*0.98);
  }

  cx.restore();
}

// ─────────────────────────────────────────
// OBSTACLES
// ─────────────────────────────────────────
function drawObstacle(o) {
  const p = proj(o.lane * 0.65, o.depth, 0);
  if (p.s < 0.04) return; // too small to see
  const s = p.s * 80;
  cx.save(); cx.translate(p.x, p.y);
  if (o.type==='barrel') drawBarrel(s, o.hit);
  if (o.type==='fence')  drawFence(s, o.hit);
  if (o.type==='sign')   drawSign(s, o.hit);
  if (o.type==='cart')   drawCart(s, o.hit);
  cx.restore();
}

function drawBarrel(s, hit) {
  const w=s*0.48, h=s*0.65;
  cx.fillStyle='rgba(0,0,0,0.18)';
  cx.beginPath(); cx.ellipse(0,4,w*.6,s*0.09,0,0,Math.PI*2); cx.fill();
  cx.fillStyle=hit?'#ff5555':'#4a7a4a';
  cx.beginPath(); cx.roundRect(-w/2,-h,w,h,s*0.06); cx.fill();
  cx.fillStyle=hit?'#ff8888':'#3a6a3a';
  for(let i=0;i<3;i++) cx.fillRect(-w/2,-h*0.78+i*s*0.19,w,s*0.07);
  cx.fillStyle=hit?'#ff7777':'#5a9a5a';
  cx.beginPath(); cx.ellipse(0,-h,w/2,s*0.10,0,0,Math.PI*2); cx.fill();
  cx.fillStyle='rgba(255,255,255,0.5)';
  cx.font=`bold ${Math.max(s*0.18,8)}px Nunito`;
  cx.textAlign='center'; cx.textBaseline='middle'; cx.fillText('♻',0,-h*.5);
}

function drawFence(s, hit) {
  const fw=s*1.1, fh=s*0.88;
  cx.fillStyle='rgba(0,0,0,0.16)';
  cx.beginPath(); cx.ellipse(0,4,fw*.5,s*0.10,0,0,Math.PI*2); cx.fill();
  const col=hit?'#ff6666':'#bbb';
  [-fw/2,0,fw/2].forEach(px=>{ cx.fillStyle=col; cx.fillRect(px-s*0.05,-fh,s*0.10,fh); });
  cx.strokeStyle=col; cx.lineWidth=s*0.06;
  [-fh*.15,-fh*.55,-fh*.88].forEach(py=>{
    cx.beginPath(); cx.moveTo(-fw/2,py); cx.lineTo(fw/2,py); cx.stroke();
  });
  cx.lineWidth=s*0.025;
  cx.strokeStyle=hit?'rgba(255,150,150,.4)':'rgba(180,180,180,.35)';
  for(let x=-fw/2; x<fw/2; x+=s*0.27) {
    cx.beginPath(); cx.moveTo(x,-fh*.15); cx.lineTo(x+s*0.25,-fh*.88); cx.stroke();
    cx.beginPath(); cx.moveTo(x+s*0.25,-fh*.15); cx.lineTo(x,-fh*.88); cx.stroke();
  }
}

function drawSign(s, hit) {
  const sw=s*1.4, sh=s*0.35, ph=s*1.3;
  cx.fillStyle=hit?'#ff6666':'#999';
  cx.fillRect(-sw/2-s*0.06,-ph,s*0.10,ph);
  cx.fillRect(sw/2-s*0.04,-ph,s*0.10,ph);
  cx.fillStyle=hit?'#ff3333':'#e74c3c';
  cx.fillRect(-sw/2,-ph-sh*.3,sw,sh);
  cx.fillStyle='#fff';
  cx.font=`bold ${Math.max(s*0.14,8)}px Nunito`;
  cx.textAlign='center'; cx.textBaseline='middle';
  cx.fillText('⚠ BAISSEZ-VOUS', 0, -ph+sh*.15);
}

function drawCart(s, hit) {
  const cw=s*0.90, ch=s*0.68;
  cx.fillStyle='rgba(0,0,0,0.18)';
  cx.beginPath(); cx.ellipse(0,4,cw*.5,s*0.09,0,0,Math.PI*2); cx.fill();
  [-cw*.35,cw*.35].forEach(wx=>{
    cx.fillStyle='#333'; cx.beginPath(); cx.arc(wx,0,s*0.09,0,Math.PI*2); cx.fill();
    cx.fillStyle='#777'; cx.beginPath(); cx.arc(wx,0,s*0.045,0,Math.PI*2); cx.fill();
  });
  const col=hit?'#ff8888':'#e8c060';
  cx.strokeStyle=col; cx.lineWidth=s*0.045;
  cx.fillStyle=hit?'rgba(255,80,80,.15)':'rgba(232,192,96,.1)';
  cx.beginPath();
  cx.moveTo(-cw/2,0); cx.lineTo(-cw/2+s*0.10,-ch);
  cx.lineTo(cw/2-s*0.10,-ch); cx.lineTo(cw/2,0); cx.closePath();
  cx.fill(); cx.stroke();
  cx.lineWidth=s*0.05;
  cx.beginPath();
  cx.moveTo(-cw/2+s*0.10,-ch); cx.lineTo(-cw/2-s*0.05,-ch-s*0.23);
  cx.lineTo(cw/2+s*0.05,-ch-s*0.23); cx.lineTo(cw/2-s*0.10,-ch); cx.stroke();
}

// COIN
function drawCoin(c) {
  const yLift = c.air ? 90 : 0;
  const p = proj(c.lane * 0.65, c.depth, yLift);
  if (p.s < 0.04) return;
  const r = p.s * 22;
  cx.save(); cx.translate(p.x, p.y);
  const gd=cx.createRadialGradient(0,0,0,0,0,r*2);
  gd.addColorStop(0,'rgba(255,215,0,0.35)'); gd.addColorStop(1,'transparent');
  cx.fillStyle=gd; cx.beginPath(); cx.arc(0,0,r*2,0,Math.PI*2); cx.fill();
  const cg=cx.createRadialGradient(-r*.3,-r*.3,0,0,0,r);
  cg.addColorStop(0,'#ffe566'); cg.addColorStop(.5,'#ffd700'); cg.addColorStop(1,'#c8a000');
  cx.fillStyle=cg; cx.beginPath(); cx.arc(0,0,r,0,Math.PI*2); cx.fill();
  cx.strokeStyle='#b08000'; cx.lineWidth=p.s*2; cx.stroke();
  cx.fillStyle='#806000';
  cx.font=`bold ${Math.max(r*.9,7)}px Nunito`;
  cx.textAlign='center'; cx.textBaseline='middle'; cx.fillText('$',0,1);
  cx.restore();
}

// ─────────────────────────────────────────
// NOTIF
// ─────────────────────────────────────────
let nTO;
function showNotif(msg) {
  const el=document.getElementById('notif');
  el.textContent=msg; el.classList.add('show');
  clearTimeout(nTO); nTO=setTimeout(()=>el.classList.remove('show'),1100);
}

// ─────────────────────────────────────────
// MAIN LOOP
// ─────────────────────────────────────────
function loop() {
  requestAnimationFrame(loop);
  if (phase==='play') update();
  draw();
}
loop();
</script>
