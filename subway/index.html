<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SUBWAY RUN</title>
<link href="https://fonts.googleapis.com/css2?family=Bangers&family=Nunito:wght@700;900&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; user-select:none; }
body { background:#1a1a2e; font-family:'Nunito',sans-serif; height:100vh; display:flex; flex-direction:column; overflow:hidden; }

#hud {
  display:flex; align-items:center; justify-content:space-between;
  padding:8px 20px; background:#16213e;
  border-bottom:3px solid #e94560; flex-shrink:0; height:56px;
}
#hud h1 { font-family:'Bangers'; font-size:26px; letter-spacing:3px; color:#e94560; text-shadow:2px 2px 0 #000; }
.hud-stats { display:flex; gap:14px; }
.stat { background:rgba(0,0,0,0.4); border:2px solid #e94560; border-radius:8px; padding:3px 14px; text-align:center; }
.stat-label { font-size:9px; font-weight:900; letter-spacing:2px; color:#666; text-transform:uppercase; }
.stat-val { font-family:'Bangers'; font-size:22px; color:#fff; line-height:1.1; }
#score-val { color:#ffd700; }
#coins-val { color:#ffd700; }
#lives-val { color:#e94560; font-size:16px; letter-spacing:1px; }

#wrap { flex:1; position:relative; overflow:hidden; }
canvas { display:block; }

.screen {
  position:absolute; inset:0; display:flex; flex-direction:column;
  align-items:center; justify-content:center;
  background:rgba(22,33,62,0.93); z-index:20;
}
.screen.hidden { display:none; }
.stitle { font-family:'Bangers'; font-size:72px; letter-spacing:6px; color:#e94560; text-shadow:4px 4px 0 #000; line-height:1; text-align:center; }
.ssub { font-size:12px; font-weight:700; letter-spacing:4px; color:#444; text-transform:uppercase; margin:8px 0 32px; }
.sscore { font-family:'Bangers'; font-size:50px; color:#ffd700; letter-spacing:3px; text-shadow:3px 3px 0 #000; }
.sbest { font-size:12px; font-weight:700; color:#444; letter-spacing:2px; text-transform:uppercase; margin:4px 0 28px; }
.btn {
  font-family:'Bangers'; font-size:22px; letter-spacing:4px;
  padding:13px 54px; border-radius:50px; border:none; cursor:pointer;
  background:#e94560; color:#fff;
  box-shadow:0 5px 0 #9b1e34, 0 8px 18px rgba(233,69,96,0.4);
  transition:transform .1s, box-shadow .1s;
}
.btn:hover { transform:translateY(-2px); box-shadow:0 7px 0 #9b1e34, 0 12px 22px rgba(233,69,96,0.5); }
.btn:active { transform:translateY(3px); box-shadow:0 2px 0 #9b1e34; }
.hint { margin-top:22px; font-size:11px; font-weight:700; color:#333; text-align:center; line-height:2.2; letter-spacing:1px; text-transform:uppercase; }
kbd { background:rgba(255,255,255,0.06); border:1px solid #333; border-radius:4px; padding:1px 7px; color:#444; font-family:'Nunito'; font-size:10px; }

#notif {
  position:absolute; top:12px; left:50%;
  transform:translateX(-50%) translateY(-70px);
  background:#1a1a2e; border:2px solid #ffd700; border-radius:50px;
  padding:6px 22px; font-family:'Bangers'; font-size:18px; letter-spacing:3px;
  color:#ffd700; z-index:30; transition:transform .3s cubic-bezier(.17,.89,.32,1.28);
  pointer-events:none; white-space:nowrap;
}
#notif.show { transform:translateX(-50%) translateY(0); }
</style>
</head>
<body>
<div id="hud">
  <h1>SUBWAY RUN</h1>
  <div class="hud-stats">
    <div class="stat"><div class="stat-label">Score</div><div class="stat-val" id="score-val">0</div></div>
    <div class="stat"><div class="stat-label">Pièces</div><div class="stat-val" id="coins-val">0</div></div>
    <div class="stat"><div class="stat-label">Vies</div><div class="stat-val" id="lives-val">❤❤❤</div></div>
    <div class="stat"><div class="stat-label">Record</div><div class="stat-val" id="best-val" style="color:#555">0</div></div>
  </div>
</div>

<div id="wrap">
  <canvas id="c"></canvas>

  <div class="screen" id="s-start">
    <div class="stitle">SUBWAY<br>RUN</div>
    <div class="ssub">Endless Runner · Esquive tout !</div>
    <button class="btn" id="btn-start">▶ JOUER</button>
    <div class="hint">
      <kbd>←</kbd> <kbd>→</kbd> changer de voie &nbsp;·&nbsp; <kbd>↑</kbd> <kbd>Espace</kbd> sauter<br>
      <kbd>↓</kbd> glisser sous les obstacles
    </div>
  </div>

  <div class="screen hidden" id="s-over">
    <div class="stitle" style="font-size:56px">GAME<br>OVER</div>
    <div class="sscore" id="fs">0 PTS</div>
    <div class="sbest" id="fb">Record : 0</div>
    <button class="btn" id="btn-retry">↺ REJOUER</button>
  </div>

  <div id="notif">+50</div>
</div>

<script>
const cv   = document.getElementById('c');
const cx   = cv.getContext('2d');
const wrap = document.getElementById('wrap');

let W, H;
function resize() {
  W = wrap.clientWidth; H = wrap.clientHeight;
  cv.width = W; cv.height = H;
}
resize();
window.addEventListener('resize', resize);

// ── PERSPECTIVE ──
// Vanishing point is horizontally centered, vertically at 36% of game area
// proj(laneX, depth, worldY) → screen coords
// laneX: -1 (left lane) / 0 (center) / 1 (right lane)
// depth: 0 = horizon, 1 = bottom (player)
// worldY: height above ground in world units (0 = ground)
function vpX() { return W / 2; }
function vpY() { return H * 0.36; }

function proj(laneX, depth, worldY) {
  // Road half-width at the near plane (bottom of screen)
  const ROAD_HALF_NEAR = W * 0.27;
  const LANE_SPACING   = ROAD_HALF_NEAR * 0.63; // spacing between lane centers
  const sx = vpX() + laneX * LANE_SPACING * depth;
  const sy = vpY() + (H - vpY()) * depth - worldY * depth * 1.15;
  return { x: sx, y: sy, s: depth };
}

// ── STATE ──
let phase = 'start';
let score, coins, lives, best;
let spd, tick, frame, invFrames;
let playerLane;   // target lane: -1, 0, 1
let lerpLane;     // smoothed visual lane position
let prevLane;
let laneT;        // 0→1 lerp progress
let jumpT, isJump, slideT;
let inputCD;
let obstacles, coinObjs, planks;
let bobT = 0;

best = +(localStorage.getItem('sr3_best') || 0);
document.getElementById('best-val').textContent = best;

function reset() {
  score=0; coins=0; lives=3;
  spd=0.009; tick=0; frame=0; invFrames=0;
  playerLane=0; lerpLane=0; prevLane=0; laneT=1;
  jumpT=0; isJump=false; slideT=0; inputCD=0;
  obstacles=[]; coinObjs=[];
  planks = Array.from({length:20}, (_,i) => i/20);
  updateHUD();
}

function updateHUD() {
  document.getElementById('score-val').textContent = score;
  document.getElementById('coins-val').textContent = coins;
  document.getElementById('lives-val').textContent = [0,1,2].map(i=>i<lives?'❤':'🖤').join('');
}

// ── INPUT ──
document.addEventListener('keydown', e => {
  if (phase !== 'play') return;
  if (e.repeat) return;
  if (e.code==='ArrowLeft'  || e.code==='KeyA') { goLane(-1); e.preventDefault(); }
  if (e.code==='ArrowRight' || e.code==='KeyD') { goLane(+1); e.preventDefault(); }
  if (e.code==='ArrowUp' || e.code==='KeyW' || e.code==='Space') { doJump(); e.preventDefault(); }
  if (e.code==='ArrowDown'  || e.code==='KeyS') { doSlide(); e.preventDefault(); }
});

let tx0=0, ty0=0;
wrap.addEventListener('touchstart', e=>{ tx0=e.touches[0].clientX; ty0=e.touches[0].clientY; }, {passive:true});
wrap.addEventListener('touchend', e=>{
  if (phase!=='play') return;
  const dx=e.changedTouches[0].clientX-tx0, dy=e.changedTouches[0].clientY-ty0;
  if (Math.abs(dx)>Math.abs(dy)) goLane(dx<0?-1:1);
  else dy<0?doJump():doSlide();
});

function goLane(dir) {
  if (inputCD>0) return;
  const next = playerLane + dir;
  if (next<-1||next>1) return;
  prevLane  = lerpLane;   // start lerp from current visual position
  playerLane= next;
  laneT     = 0;
  inputCD   = 10;
}
function doJump()  { if (!isJump && slideT<=0) { isJump=true; jumpT=0; } }
function doSlide() { if (!isJump) slideT=36; else jumpT=Math.max(jumpT,32); }

// ── BUTTONS ──
document.getElementById('btn-start').onclick = startGame;
document.getElementById('btn-retry').onclick  = startGame;

function startGame() {
  document.getElementById('s-start').classList.add('hidden');
  document.getElementById('s-over').classList.add('hidden');
  reset();
  phase='play';
}
function endGame() {
  phase='over';
  if (score>best) { best=score; localStorage.setItem('sr3_best',best); }
  document.getElementById('fs').textContent=score+' PTS';
  document.getElementById('fb').textContent='Record : '+best;
  document.getElementById('best-val').textContent=best;
  document.getElementById('s-over').classList.remove('hidden');
}

// ── UPDATE ──
function update() {
  frame++; tick++;
  if (inputCD>0) inputCD--;
  if (invFrames>0) invFrames--;

  if (tick%380===0) { spd=Math.min(spd+0.0014,0.022); notif('⚡ VITESSE !'); }
  score += Math.round(spd*220);
  document.getElementById('score-val').textContent = score;

  // Smooth lane lerp
  laneT = Math.min(laneT+0.2, 1);
  lerpLane = prevLane + (playerLane - prevLane) * easeInOut(laneT);

  // Jump arc
  if (isJump) { jumpT++; if (jumpT>=42){isJump=false;jumpT=0;} }
  if (slideT>0) slideT--;

  // Scroll planks
  planks = planks.map(z => { z+=spd*1.6; return z>1.05?z-1.05:z; });

  // Obstacles
  obstacles.forEach(o => o.z+=spd*1.5);
  obstacles = obstacles.filter(o => {
    if (o.z>1.08) return false;
    if (!o.hit && invFrames===0 && o.z>0.83 && o.z<1.04) {
      if (Math.round(lerpLane)===o.lane) {
        const jH = isJump?Math.sin(jumpT/42*Math.PI)*130:0;
        let hit=false;
        if ((o.type==='barrel'||o.type==='cart') && jH<50) hit=true;
        if (o.type==='fence') hit=true;
        if (o.type==='sign' && slideT<=0) hit=true;
        if (hit) { o.hit=true; takeHit(); }
      }
    }
    return true;
  });

  // Coins
  coinObjs.forEach(c=>c.z+=spd*1.5);
  coinObjs = coinObjs.filter(c => {
    if (c.z>1.08) return false;
    if (c.z>0.83 && c.z<1.04 && Math.round(lerpLane)===c.lane) {
      const jH=isJump?Math.sin(jumpT/42*Math.PI)*130:0;
      const cH=c.air?90:0;
      if (Math.abs(jH-cH)<55) {
        coins++; score+=50;
        document.getElementById('coins-val').textContent=coins;
        document.getElementById('score-val').textContent=score;
        notif('🪙 +50'); return false;
      }
    }
    return true;
  });

  // Spawn
  const iv=Math.max(Math.round(52-spd*1800),20);
  if (frame%iv===0) spawnObs();
  if (frame%28===0) spawnCoins();
}

function takeHit() {
  lives--; invFrames=100; updateHUD();
  if (lives<=0) endGame();
}
function easeInOut(t) { return t<0.5?2*t*t:-1+(4-2*t)*t; }

function spawnObs() {
  const types=['barrel','fence','sign','cart'];
  const t=types[Math.floor(Math.random()*types.length)];
  const lanes=[-1,0,1].sort(()=>Math.random()-0.5);
  const n=Math.random()<0.32?2:1;
  for(let i=0;i<n;i++) obstacles.push({lane:lanes[i],z:0.01,type:t,hit:false});
}
function spawnCoins() {
  const lane=[-1,0,1][Math.floor(Math.random()*3)];
  const air=Math.random()<0.38;
  const cnt=Math.floor(Math.random()*3)+2;
  for(let i=0;i<cnt;i++) coinObjs.push({lane,z:0.01-i*0.03,air});
}

// ── DRAW ──
function draw() {
  cx.clearRect(0,0,W,H);
  drawSky();
  drawBuildings();
  drawGround();
  drawRoad();
  drawPlanks();
  coinObjs.slice().sort((a,b)=>a.z-b.z).forEach(c=>drawCoin(c));
  obstacles.slice().sort((a,b)=>a.z-b.z).forEach(o=>drawObs(o));
  drawPursuer();
  drawPlayer();
}

function drawSky() {
  const g=cx.createLinearGradient(0,0,0,vpY());
  g.addColorStop(0,'#5ab8e8'); g.addColorStop(1,'#c8eaf8');
  cx.fillStyle=g; cx.fillRect(0,0,W,vpY());
  cx.save();
  cx.shadowColor='#ffcc00'; cx.shadowBlur=28;
  cx.fillStyle='#ffe040';
  cx.beginPath(); cx.arc(W*0.82,vpY()*0.25,30,0,Math.PI*2); cx.fill();
  cx.restore();
}

function drawBuildings() {
  const hy=vpY();
  const bldgs=[
    {x:.01,w:.07,h:.28,c:'#d4845a'},{x:.07,w:.05,h:.40,c:'#c06040'},
    {x:.11,w:.09,h:.22,c:'#e09060'},{x:.18,w:.06,h:.34,c:'#b85040'},
    {x:.23,w:.04,h:.26,c:'#d4845a'},
    {x:.62,w:.07,h:.32,c:'#d4845a'},{x:.68,w:.05,h:.42,c:'#c06040'},
    {x:.72,w:.09,h:.24,c:'#e09060'},{x:.79,w:.06,h:.36,c:'#b85040'},
    {x:.84,w:.05,h:.28,c:'#d4845a'},{x:.88,w:.08,h:.44,c:'#c06040'},
    {x:.94,w:.06,h:.26,c:'#e09060'},
  ];
  bldgs.forEach(b=>{
    const bh=hy*b.h;
    cx.fillStyle=b.c; cx.fillRect(W*b.x,hy-bh,W*b.w,bh);
    cx.fillStyle='rgba(255,240,160,0.25)';
    for(let wy=hy-bh+8;wy<hy-4;wy+=16)
      for(let wx=W*b.x+5;wx<W*(b.x+b.w)-8;wx+=13)
        cx.fillRect(wx,wy,7,9);
    cx.fillStyle='rgba(0,0,0,0.1)'; cx.fillRect(W*b.x,hy-bh,W*b.w,4);
  });
}

function drawGround() {
  const g=cx.createLinearGradient(0,vpY(),0,H);
  g.addColorStop(0,'#c8a060'); g.addColorStop(1,'#8a6030');
  cx.fillStyle=g; cx.fillRect(0,vpY(),W,H-vpY());
}

function drawRoad() {
  // Road corners: near = bottom, far = near vanishing point
  const pNL=proj(-1,1,0), pNR=proj(1,1,0);
  const pFL=proj(-1,0.02,0), pFR=proj(1,0.02,0);

  cx.beginPath();
  cx.moveTo(pFL.x,pFL.y); cx.lineTo(pFR.x,pFR.y);
  cx.lineTo(pNR.x,pNR.y); cx.lineTo(pNL.x,pNL.y);
  cx.closePath();
  const rg=cx.createLinearGradient(0,vpY(),0,H);
  rg.addColorStop(0,'#888'); rg.addColorStop(1,'#bbb');
  cx.fillStyle=rg; cx.fill();

  // Lane dividers
  [-0.333, 0.333].forEach(lx=>{
    const a=proj(lx,1), b=proj(lx,0.02);
    cx.save();
    cx.strokeStyle='rgba(255,255,255,0.55)'; cx.lineWidth=2;
    cx.setLineDash([16,14]);
    cx.beginPath(); cx.moveTo(b.x,b.y); cx.lineTo(a.x,a.y); cx.stroke();
    cx.restore();
  });

  // Edges
  cx.setLineDash([]);
  [[pNL,pFL],[pNR,pFR]].forEach(([a,b])=>{
    cx.beginPath(); cx.moveTo(a.x,a.y); cx.lineTo(b.x,b.y);
    cx.strokeStyle='rgba(255,255,255,0.8)'; cx.lineWidth=3; cx.stroke();
  });
}

function drawPlanks() {
  planks.forEach(z=>{
    if(z<0.03) return;
    const pL=proj(-1,z), pR=proj(1,z);
    cx.beginPath(); cx.moveTo(pL.x,pL.y); cx.lineTo(pR.x,pR.y);
    cx.strokeStyle=`rgba(60,40,10,${z*0.3})`; cx.lineWidth=Math.max(z*5,0.5);
    cx.setLineDash([]); cx.stroke();
  });
}

// Map lane -1/0/1 to proj laneX (road thirds)
function laneToRoad(lane) { return lane * 0.667; }

function drawCoin(c) {
  const p=proj(laneToRoad(c.lane), c.z, c.air?90:0);
  const r=p.s*17; if(r<1) return;
  cx.save(); cx.translate(p.x,p.y);
  const gd=cx.createRadialGradient(0,0,0,0,0,r*2);
  gd.addColorStop(0,'rgba(255,215,0,0.35)'); gd.addColorStop(1,'transparent');
  cx.fillStyle=gd; cx.beginPath(); cx.arc(0,0,r*2,0,Math.PI*2); cx.fill();
  const cg=cx.createRadialGradient(-r*.3,-r*.3,0,0,0,r);
  cg.addColorStop(0,'#ffe566'); cg.addColorStop(.5,'#ffd700'); cg.addColorStop(1,'#c8a000');
  cx.fillStyle=cg; cx.beginPath(); cx.arc(0,0,r,0,Math.PI*2); cx.fill();
  cx.strokeStyle='#b08000'; cx.lineWidth=p.s*1.5; cx.stroke();
  cx.fillStyle='#806000'; cx.font=`bold ${Math.max(r*.9,6)}px Nunito`;
  cx.textAlign='center'; cx.textBaseline='middle'; cx.fillText('$',0,1);
  cx.restore();
}

function drawObs(o) {
  const p=proj(laneToRoad(o.lane), o.z, 0);
  if(p.s<0.03) return;
  cx.save(); cx.translate(p.x,p.y);
  if(o.type==='barrel') drawBarrel(cx,p.s,o.hit);
  if(o.type==='fence')  drawFence(cx,p.s,o.hit);
  if(o.type==='sign')   drawSign(cx,p.s,o.hit);
  if(o.type==='cart')   drawCart(cx,p.s,o.hit);
  cx.restore();
}

function drawBarrel(c,s,hit) {
  const w=s*38,h=s*52;
  c.fillStyle='rgba(0,0,0,0.2)';
  c.beginPath(); c.ellipse(0,4,w*.6,s*7,0,0,Math.PI*2); c.fill();
  c.fillStyle=hit?'#ff5555':'#4a7a4a';
  c.beginPath(); c.roundRect(-w/2,-h,w,h,s*5); c.fill();
  c.fillStyle=hit?'#ff8888':'#3a6a3a';
  for(let i=0;i<3;i++) c.fillRect(-w/2,-h*0.75+i*s*15,w,s*6);
  c.fillStyle=hit?'#ff7777':'#5a9a5a';
  c.beginPath(); c.ellipse(0,-h,w/2,s*8,0,0,Math.PI*2); c.fill();
  c.fillStyle='rgba(255,255,255,0.5)'; c.font=`bold ${s*14}px Nunito`;
  c.textAlign='center'; c.textBaseline='middle'; c.fillText('♻',0,-h*.5);
}

function drawFence(c,s,hit) {
  const fw=s*88,fh=s*70;
  c.fillStyle='rgba(0,0,0,0.18)';
  c.beginPath(); c.ellipse(0,4,fw*.5,s*8,0,0,Math.PI*2); c.fill();
  const col=hit?'#ff6666':'#bbb';
  [-fw/2,0,fw/2].forEach(px=>{c.fillStyle=col;c.fillRect(px-s*4,-fh,s*8,fh);});
  c.strokeStyle=col; c.lineWidth=s*5;
  [-fh*.15,-fh*.55,-fh*.88].forEach(py=>{
    c.beginPath();c.moveTo(-fw/2,py);c.lineTo(fw/2,py);c.stroke();
  });
  c.lineWidth=s*2; c.strokeStyle=hit?'rgba(255,150,150,.4)':'rgba(180,180,180,.35)';
  for(let x=-fw/2;x<fw/2;x+=s*22){
    c.beginPath();c.moveTo(x,-fh*.15);c.lineTo(x+s*20,-fh*.88);c.stroke();
    c.beginPath();c.moveTo(x+s*20,-fh*.15);c.lineTo(x,-fh*.88);c.stroke();
  }
}

function drawSign(c,s,hit) {
  const sw=s*110,sh=s*28,ph=s*105;
  c.fillStyle=hit?'#ff6666':'#999';
  c.fillRect(-sw/2-s*5,-ph,s*8,ph);
  c.fillRect(sw/2-s*3,-ph,s*8,ph);
  c.fillStyle=hit?'#ff3333':'#e74c3c';
  c.fillRect(-sw/2,-ph-sh*.3,sw,sh);
  c.fillStyle='#fff'; c.font=`bold ${s*11}px Nunito`;
  c.textAlign='center'; c.textBaseline='middle';
  c.fillText('⚠ BAISSEZ-VOUS',0,-ph+sh*.15);
}

function drawCart(c,s,hit) {
  const cw=s*72,ch=s*54;
  c.fillStyle='rgba(0,0,0,0.2)';
  c.beginPath();c.ellipse(0,4,cw*.5,s*7,0,0,Math.PI*2);c.fill();
  [-cw*.35,cw*.35].forEach(wx=>{
    c.fillStyle='#333';c.beginPath();c.arc(wx,0,s*7,0,Math.PI*2);c.fill();
    c.fillStyle='#777';c.beginPath();c.arc(wx,0,s*3.5,0,Math.PI*2);c.fill();
  });
  const col=hit?'#ff8888':'#e8c060';
  c.strokeStyle=col;c.lineWidth=s*3.5;
  c.fillStyle=hit?'rgba(255,80,80,.15)':'rgba(232,192,96,.1)';
  c.beginPath();
  c.moveTo(-cw/2,0);c.lineTo(-cw/2+s*8,-ch);
  c.lineTo(cw/2-s*8,-ch);c.lineTo(cw/2,0);c.closePath();
  c.fill();c.stroke();
  c.lineWidth=s*4;
  c.beginPath();
  c.moveTo(-cw/2+s*8,-ch);c.lineTo(-cw/2-s*4,-ch-s*18);
  c.lineTo(cw/2+s*4,-ch-s*18);c.lineTo(cw/2-s*8,-ch);c.stroke();
}

// ── PLAYER ──
function drawPlayer() {
  const lx   = laneToRoad(lerpLane);
  const jH   = isJump ? Math.sin(jumpT/42*Math.PI)*130 : 0;
  const p    = proj(lx, 0.97, jH);
  const s    = p.s * 0.95;

  // ground shadow
  const pg=proj(lx,0.97,0);
  cx.save();
  cx.globalAlpha=0.20*(1-jH/145);
  cx.fillStyle='rgba(0,0,0,0.55)';
  cx.beginPath();cx.ellipse(pg.x,pg.y+s*5,s*22,s*7,0,0,Math.PI*2);cx.fill();
  cx.restore();

  if(invFrames>0 && Math.floor(invFrames/6)%2===0) return;

  cx.save();
  cx.translate(p.x,p.y);
  const sliding=slideT>0;
  if(sliding){cx.translate(0,s*22);cx.scale(1,0.48);}

  const lg=Math.sin(frame*0.34);

  // Legs
  [[-1,lg],[1,-lg]].forEach(([side,sw])=>{
    cx.save();
    cx.translate(side*s*9,s*34);cx.rotate(sw*0.32);
    cx.fillStyle='#2255bb';
    cx.beginPath();cx.roundRect(-s*7,0,s*14,s*38,s*4);cx.fill();
    cx.fillStyle='#111';cx.fillRect(-s*8,s*32,s*22,s*8);
    cx.restore();
  });

  // Body
  cx.fillStyle='#e83030';
  cx.beginPath();cx.roundRect(-s*19,-s*2,s*38,s*38,[0,0,s*6,s*6]);cx.fill();
  cx.fillStyle='#c01010';cx.fillRect(-s*19,-s*2,s*38,s*13);
  // Backpack
  cx.fillStyle='#1a3faa';
  cx.beginPath();cx.roundRect(-s*13,-s*42,s*26,s*42,s*5);cx.fill();
  cx.fillStyle='#2255cc';cx.fillRect(-s*10,-s*30,s*20,s*14);
  cx.strokeStyle='#1a3faa';cx.lineWidth=s*3;
  cx.beginPath();cx.moveTo(-s*8,-s*2);cx.lineTo(-s*8,-s*42);cx.stroke();
  cx.beginPath();cx.moveTo(s*8,-s*2);cx.lineTo(s*8,-s*42);cx.stroke();

  // Arms
  [[-1,-lg],[1,lg]].forEach(([side,sw])=>{
    cx.save();
    cx.translate(side*(s*19+s*5),-s*2);cx.rotate(sw*0.36);
    cx.fillStyle='#e83030';
    cx.beginPath();cx.roundRect(side>0?0:-s*11,0,s*11,s*32,s*4);cx.fill();
    cx.restore();
  });

  // Head
  cx.fillStyle='#f5c090';cx.beginPath();cx.arc(0,-s*50,s*18,0,Math.PI*2);cx.fill();
  cx.fillStyle='#2a1000';
  cx.beginPath();cx.arc(0,-s*50-s*3,s*18,Math.PI,2*Math.PI);cx.fill();
  cx.fillRect(-s*18,-s*50-s*5,s*36,s*5);
  cx.fillStyle='#c01010';
  cx.beginPath();cx.arc(0,-s*50,s*20,0.2,Math.PI-0.2);cx.fill();

  cx.restore();
}

// ── PURSUER ──
function drawPursuer() {
  bobT+=0.11;
  const bob=Math.sin(bobT)*5;
  const p=proj(laneToRoad(lerpLane), 0.80, -bob);
  const s=p.s*0.86;

  cx.save();cx.translate(p.x,p.y);
  const lg=Math.sin(frame*0.34+Math.PI);

  [[-1,lg],[1,-lg]].forEach(([side,sw])=>{
    cx.save();cx.translate(side*s*8,s*32);cx.rotate(sw*.3);
    cx.fillStyle='#1a3a8a';
    cx.beginPath();cx.roundRect(-s*6,0,s*13,s*34,s*4);cx.fill();
    cx.fillStyle='#111';cx.fillRect(-s*7,s*28,s*20,s*7);
    cx.restore();
  });

  cx.fillStyle='#1a3a8a';
  cx.beginPath();cx.roundRect(-s*18,-s*2,s*36,s*36,[0,0,s*6,s*6]);cx.fill();
  cx.fillStyle='#111';cx.fillRect(-s*18,s*12,s*36,s*7);
  cx.fillStyle='#ffd700';cx.fillRect(-s*5,s*12,s*10,s*7);

  [[-1,-lg],[1,lg]].forEach(([side,sw])=>{
    cx.save();cx.translate(side*(s*18+s*5),-s*2);cx.rotate(sw*.34);
    cx.fillStyle='#1a3a8a';
    cx.beginPath();cx.roundRect(side>0?0:-s*10,0,s*10,s*30,s*4);cx.fill();
    cx.restore();
  });

  cx.fillStyle='#f5c090';cx.beginPath();cx.arc(0,-s*46,s*17,0,Math.PI*2);cx.fill();
  cx.fillStyle='#1a3a8a';
  cx.beginPath();cx.ellipse(0,-s*46-s*8,s*20,s*7,0,0,Math.PI*2);cx.fill();
  cx.beginPath();cx.arc(0,-s*46-s*8,s*14,Math.PI,2*Math.PI);cx.fill();
  cx.fillStyle='#ffd700';cx.fillRect(-s*8,-s*46-s*12,s*16,s*4);
  cx.fillStyle='rgba(0,0,0,0.7)';
  cx.fillRect(-s*14,-s*46-s*2,s*11,s*5);
  cx.fillRect(s*3,-s*46-s*2,s*11,s*5);
  if(Math.floor(frame/50)%2===0){
    cx.fillStyle='#e94560';cx.font=`bold ${s*13}px Nunito`;
    cx.textAlign='center';cx.fillText('STOP !',0,-s*68);
  }
  cx.restore();
}

// ── NOTIF ──
let nTO;
function notif(msg){
  const el=document.getElementById('notif');
  el.textContent=msg;el.classList.add('show');
  clearTimeout(nTO);nTO=setTimeout(()=>el.classList.remove('show'),1100);
}

// ── LOOP ──
function loop() {
  requestAnimationFrame(loop);
  if(phase==='play') update();
  draw();
}
loop();
</script>
