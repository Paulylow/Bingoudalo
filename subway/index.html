<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SUBWAY RUN</title>
<link href="https://fonts.googleapis.com/css2?family=Bangers&family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; user-select:none; }
body {
  background: #1a1a2e;
  font-family: 'Nunito', sans-serif;
  height: 100vh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}
#hud {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 10px 20px;
  background: #16213e;
  border-bottom: 3px solid #e94560;
  flex-shrink: 0;
}
#hud h1 {
  font-family: 'Bangers';
  font-size: 28px;
  letter-spacing: 3px;
  color: #e94560;
  text-shadow: 2px 2px 0 #000;
}
.hud-stats { display: flex; gap: 20px; align-items: center; }
.stat {
  background: rgba(0,0,0,0.4);
  border: 2px solid #e94560;
  border-radius: 8px;
  padding: 4px 14px;
  text-align: center;
}
.stat-label { font-size: 9px; font-weight: 900; letter-spacing: 2px; color: #888; text-transform: uppercase; }
.stat-val { font-family: 'Bangers'; font-size: 24px; color: #fff; line-height: 1.1; }
#score-val { color: #ffd700; }
#coins-val { color: #ffd700; }
#lives-val { color: #e94560; font-size: 18px; }

#game-wrap {
  flex: 1;
  position: relative;
  overflow: hidden;
}
canvas {
  display: block;
  width: 100%;
  height: 100%;
}

/* ── OVERLAYS ── */
.screen {
  position: absolute;
  inset: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  background: rgba(22, 33, 62, 0.92);
  z-index: 20;
}
.screen.hidden { display: none; }

.screen-title {
  font-family: 'Bangers';
  font-size: 80px;
  letter-spacing: 6px;
  color: #e94560;
  text-shadow: 4px 4px 0 #000, 0 0 40px rgba(233,69,96,0.6);
  line-height: 1;
}
.screen-sub {
  font-size: 13px;
  font-weight: 700;
  letter-spacing: 4px;
  color: #555;
  text-transform: uppercase;
  margin-top: 8px;
  margin-bottom: 36px;
}
.screen-score {
  font-family: 'Bangers';
  font-size: 54px;
  color: #ffd700;
  letter-spacing: 3px;
  text-shadow: 3px 3px 0 #000;
  margin-bottom: 6px;
}
.screen-best {
  font-size: 13px;
  font-weight: 700;
  color: #555;
  letter-spacing: 2px;
  text-transform: uppercase;
  margin-bottom: 32px;
}
.btn {
  font-family: 'Bangers';
  font-size: 22px;
  letter-spacing: 4px;
  padding: 14px 56px;
  border-radius: 50px;
  border: none;
  cursor: pointer;
  background: #e94560;
  color: #fff;
  box-shadow: 0 6px 0 #9b1e34, 0 8px 20px rgba(233,69,96,0.4);
  transition: transform 0.1s, box-shadow 0.1s;
}
.btn:hover { transform: translateY(-2px); box-shadow: 0 8px 0 #9b1e34, 0 12px 24px rgba(233,69,96,0.5); }
.btn:active { transform: translateY(3px); box-shadow: 0 3px 0 #9b1e34; }

.controls-hint {
  margin-top: 24px;
  font-size: 12px;
  font-weight: 700;
  color: #3a3a5a;
  text-align: center;
  line-height: 2.2;
  letter-spacing: 1px;
  text-transform: uppercase;
}
kbd {
  background: rgba(255,255,255,0.07);
  border: 1px solid #3a3a5a;
  border-radius: 4px;
  padding: 1px 7px;
  font-family: 'Nunito';
  font-size: 11px;
  color: #555;
}

#notif {
  position: absolute;
  top: 14px;
  left: 50%;
  transform: translateX(-50%) translateY(-80px);
  background: #1a1a2e;
  border: 2px solid #ffd700;
  border-radius: 50px;
  padding: 7px 24px;
  font-family: 'Bangers';
  font-size: 20px;
  letter-spacing: 3px;
  color: #ffd700;
  z-index: 30;
  transition: transform 0.3s cubic-bezier(.17,.89,.32,1.28);
  pointer-events: none;
  white-space: nowrap;
}
#notif.show { transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>

<div id="hud">
  <h1>SUBWAY RUN</h1>
  <div class="hud-stats">
    <div class="stat">
      <div class="stat-label">Score</div>
      <div class="stat-val" id="score-val">0</div>
    </div>
    <div class="stat">
      <div class="stat-label">Pièces</div>
      <div class="stat-val" id="coins-val">0</div>
    </div>
    <div class="stat">
      <div class="stat-label">Vies</div>
      <div class="stat-val" id="lives-val">❤❤❤</div>
    </div>
    <div class="stat">
      <div class="stat-label">Record</div>
      <div class="stat-val" id="best-val" style="color:#888;">0</div>
    </div>
  </div>
</div>

<div id="game-wrap">
  <canvas id="c"></canvas>

  <div class="screen" id="start-screen">
    <div class="screen-title">SUBWAY<br>RUN</div>
    <div class="screen-sub">Endless Runner · Esquive tout !</div>
    <button class="btn" id="start-btn">▶ JOUER</button>
    <div class="controls-hint">
      <kbd>←</kbd> <kbd>→</kbd> changer de voie &nbsp;·&nbsp; <kbd>↑</kbd> <kbd>Espace</kbd> sauter<br>
      <kbd>↓</kbd> glisser sous les obstacles · swipe sur mobile
    </div>
  </div>

  <div class="screen hidden" id="over-screen">
    <div class="screen-title" style="font-size:64px;">GAME<br>OVER</div>
    <div class="screen-score" id="final-score">0 PTS</div>
    <div class="screen-best" id="final-best">Record : 0</div>
    <button class="btn" id="retry-btn">↺ REJOUER</button>
  </div>

  <div id="notif">+50 PTS</div>
</div>

<script>
// ═══════════════════════════════════════════
//  SETUP
// ═══════════════════════════════════════════
const canvas = document.getElementById('c');
const ctx    = canvas.getContext('2d');
const wrap   = document.getElementById('game-wrap');

let W, H, VP_X, VP_Y; // viewport / vanishing point

function resize() {
  canvas.width  = wrap.clientWidth;
  canvas.height = wrap.clientHeight;
  W = canvas.width;
  H = canvas.height;
  VP_X = W / 2;
  VP_Y = H * 0.38;  // vanishing point on horizon
}
resize();
window.addEventListener('resize', () => { resize(); });

// ═══════════════════════════════════════════
//  CONSTANTS
// ═══════════════════════════════════════════
const LANES      = [-1, 0, 1];       // lane offsets
const LANE_WIDTH = 160;              // world unit width per lane
const NEAR_Z     = 1.0;             // closest plane (player z)
const FAR_Z      = 0.02;            // farthest visible z
const HORIZON_Y  = () => VP_Y;

// Project a world point (lane offset x, depth z 0..1, world_y=0) to screen
// z=1 → at player (bottom), z=0 → at horizon (top)
function project(worldX, z, worldY = 0) {
  const t = z; // 0 = horizon, 1 = near
  const screenY = VP_Y + (H - VP_Y) * t - worldY * t * 1.2;
  const screenX = VP_X + worldX * t;
  return { x: screenX, y: screenY, scale: t };
}

// ═══════════════════════════════════════════
//  GAME STATE
// ═══════════════════════════════════════════
let state = 'start'; // start | play | over
let score = 0, coins = 0, lives = 3, best = +(localStorage.getItem('sr_best') || 0);
let frame = 0, gameSpeed = 0.008, speedTick = 0;
let invTimer = 0; // invincibility frames after hit

// Player
let playerLane  = 0;   // -1, 0, 1
let laneProgress = 0;  // smooth interpolation 0..1
let fromLane     = 0;
let jumpT = 0;         // 0 = grounded, >0 = jumping arc (0..1)
let jumpDir = 0;       // +1 going up, -1 coming down (unused, using parabola)
let isJumping = false;
let jumpTimer = 0;
let slideTimer = 0;    // sliding
let inputCooldown = 0;

// Obstacles & coins lists
let obstacles = [];
let coinsList  = [];

// Background tiles (track planks)
let planks = [];
for (let i = 0; i < 20; i++) planks.push(i / 20);  // z positions 0..1

// Pursuer (cop chasing player)
let pursuerBob = 0;

// ═══════════════════════════════════════════
//  INPUT
// ═══════════════════════════════════════════
let keys = {};
document.addEventListener('keydown', e => {
  if (state !== 'play') return;
  switch(e.code) {
    case 'ArrowLeft':  case 'KeyA': moveLeft();  e.preventDefault(); break;
    case 'ArrowRight': case 'KeyD': moveRight(); e.preventDefault(); break;
    case 'ArrowUp':    case 'KeyW': case 'Space': doJump(); e.preventDefault(); break;
    case 'ArrowDown':  case 'KeyS': doSlide(); e.preventDefault(); break;
  }
});

let tx0, ty0;
wrap.addEventListener('touchstart', e => { tx0 = e.touches[0].clientX; ty0 = e.touches[0].clientY; }, {passive:true});
wrap.addEventListener('touchend',   e => {
  if (state !== 'play') return;
  const dx = e.changedTouches[0].clientX - tx0;
  const dy = e.changedTouches[0].clientY - ty0;
  if (Math.abs(dx) > Math.abs(dy)) { dx < 0 ? moveLeft() : moveRight(); }
  else { dy < 0 ? doJump() : doSlide(); }
});

function moveLeft()  { if (inputCooldown > 0) return; if (playerLane > -1) { fromLane=playerLane; playerLane--; laneProgress=0; inputCooldown=12; } }
function moveRight() { if (inputCooldown > 0) return; if (playerLane <  1) { fromLane=playerLane; playerLane++; laneProgress=0; inputCooldown=12; } }
function doJump()  { if (!isJumping && slideTimer <= 0) { isJumping=true; jumpTimer=0; } }
function doSlide() { if (!isJumping) { slideTimer=38; } else { jumpTimer=30; } } // fast fall

// ═══════════════════════════════════════════
//  START / RESTART
// ═══════════════════════════════════════════
document.getElementById('start-btn').onclick  = startGame;
document.getElementById('retry-btn').onclick  = startGame;

document.getElementById('best-val').textContent = best;

function startGame() {
  document.getElementById('start-screen').classList.add('hidden');
  document.getElementById('over-screen').classList.add('hidden');
  score=0; coins=0; lives=3; frame=0; gameSpeed=0.008; speedTick=0;
  invTimer=0; playerLane=0; fromLane=0; laneProgress=1;
  isJumping=false; jumpTimer=0; slideTimer=0; inputCooldown=0;
  obstacles=[]; coinsList=[];
  updateHUD();
  state = 'play';
}

function gameOver() {
  state = 'over';
  if (score > best) { best=score; localStorage.setItem('sr_best', best); }
  document.getElementById('final-score').textContent = score + ' PTS';
  document.getElementById('final-best').textContent  = 'Record : ' + best;
  document.getElementById('best-val').textContent    = best;
  document.getElementById('over-screen').classList.remove('hidden');
}

function updateHUD() {
  document.getElementById('score-val').textContent = score;
  document.getElementById('coins-val').textContent = coins;
  const h = ['❤','❤','❤'].map((x,i)=> i<lives ? '❤' : '🖤').join('');
  document.getElementById('lives-val').textContent = h;
}

// ═══════════════════════════════════════════
//  NOTIF
// ═══════════════════════════════════════════
let notifTO;
function notif(msg) {
  const el = document.getElementById('notif');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(notifTO);
  notifTO = setTimeout(() => el.classList.remove('show'), 1100);
}

// ═══════════════════════════════════════════
//  MAIN LOOP
// ═══════════════════════════════════════════
function loop() {
  requestAnimationFrame(loop);
  ctx.clearRect(0, 0, W, H);

  if (state === 'play') update();
  draw();
}
loop();

// ═══════════════════════════════════════════
//  UPDATE
// ═══════════════════════════════════════════
function update() {
  frame++;
  if (inputCooldown > 0) inputCooldown--;
  if (invTimer > 0) invTimer--;

  // Speed up over time
  speedTick++;
  if (speedTick % 400 === 0) {
    gameSpeed = Math.min(gameSpeed + 0.0012, 0.022);
    notif('⚡ PLUS VITE !');
  }

  score += Math.round(gameSpeed * 200);
  document.getElementById('score-val').textContent = score;

  // Smooth lane change
  laneProgress = Math.min(laneProgress + 0.18, 1);

  // Jump parabola
  if (isJumping) {
    jumpTimer++;
    if (jumpTimer >= 44) { isJumping=false; jumpTimer=0; }
  }

  // Slide countdown
  if (slideTimer > 0) slideTimer--;

  // Scroll planks
  planks = planks.map(z => {
    z += gameSpeed * 1.8;
    if (z > 1.05) z -= 1.05;
    return z;
  });

  // Spawn obstacles — ensure always one free lane
  if (frame % Math.max(Math.round(55 - gameSpeed * 1200), 22) === 0) {
    spawnObstacle();
  }

  // Spawn coins
  if (frame % 30 === 0) {
    spawnCoins();
  }

  // Move & check obstacles
  obstacles = obstacles.filter(o => {
    o.z += gameSpeed * 1.65;

    if (o.z > 1.08) return false;

    // Collision window: near player depth
    if (o.z > 0.80 && o.z < 1.05 && invTimer === 0) {
      const pLane = laneProgress > 0.5 ? playerLane : fromLane;
      if (o.lane === pLane) {
        // Check jump/slide
        if (o.type === 'low' && isJumping && jumpTimer < 36) {
          // cleared by jump
        } else if (o.type === 'high' && slideTimer > 0) {
          // cleared by slide
        } else if (o.type === 'low' || o.type === 'wide') {
          takeHit(o);
        } else if (o.type === 'high') {
          takeHit(o);
        } else if (o.type === 'barrier') {
          takeHit(o);
        }
      }
    }
    return true;
  });

  // Move & collect coins
  coinsList = coinsList.filter(c => {
    c.z += gameSpeed * 1.65;
    if (c.z > 1.08) return false;

    if (c.z > 0.82 && c.z < 1.02) {
      const pLane = laneProgress > 0.5 ? playerLane : fromLane;
      if (c.lane === pLane) {
        // Check vertical match
        const jumpHeight = isJumping ? Math.sin(jumpTimer/44 * Math.PI) * 120 : 0;
        const coinH = c.high ? 80 : 0;
        if (Math.abs(jumpHeight - coinH) < 60) {
          coins++;
          score += 50;
          document.getElementById('score-val').textContent = score;
          document.getElementById('coins-val').textContent = coins;
          notif('🪙 +50');
          return false;
        }
      }
    }
    return true;
  });
}

function takeHit(o) {
  o.hit = true;
  lives--;
  invTimer = 110;
  updateHUD();
  if (lives <= 0) { gameOver(); }
}

// ═══════════════════════════════════════════
//  SPAWN
// ═══════════════════════════════════════════
function spawnObstacle() {
  const types = ['low','low','high','barrier','wide'];
  const type  = types[Math.floor(Math.random() * types.length)];

  // 1 or 2 obstacles, leaving at least 1 free lane
  const blocked = [];
  const n = Math.random() < 0.35 ? 2 : 1;
  const shuffled = [-1,0,1].sort(()=>Math.random()-0.5);
  for (let i=0; i<Math.min(n, 2); i++) {
    blocked.push(shuffled[i]);
  }
  // Must leave at least one free lane
  if (blocked.length === 3) blocked.pop();

  blocked.forEach(lane => {
    obstacles.push({ lane, z: FAR_Z, type, hit: false });
  });
}

function spawnCoins() {
  const lane = [-1,0,1][Math.floor(Math.random()*3)];
  const high = Math.random() < 0.35; // coins in the air (need jump)
  const count = Math.floor(Math.random()*3)+2;
  for (let i=0; i<count; i++) {
    coinsList.push({ lane, z: FAR_Z - i * 0.035, high });
  }
}

// ═══════════════════════════════════════════
//  DRAW
// ═══════════════════════════════════════════
function draw() {
  drawBackground();
  drawTracks();
  drawCoins();
  drawObstacles();
  drawPlayer();
  drawPursuer();
}

// ── BACKGROUND ──
function drawBackground() {
  // Sky
  const sky = ctx.createLinearGradient(0, 0, 0, VP_Y);
  sky.addColorStop(0, '#87ceeb');
  sky.addColorStop(0.5, '#b8e4f7');
  sky.addColorStop(1, '#d4f0ff');
  ctx.fillStyle = sky;
  ctx.fillRect(0, 0, W, VP_Y);

  // Sun
  ctx.save();
  ctx.fillStyle = '#ffe066';
  ctx.shadowColor = '#ffaa00';
  ctx.shadowBlur = 30;
  ctx.beginPath();
  ctx.arc(W * 0.78, VP_Y * 0.25, 34, 0, Math.PI*2);
  ctx.fill();
  ctx.restore();

  // City buildings (far, static, warm tones)
  drawBuildings();

  // Ground (below horizon)
  const gnd = ctx.createLinearGradient(0, VP_Y, 0, H);
  gnd.addColorStop(0, '#c8a96e');
  gnd.addColorStop(0.3, '#b89050');
  gnd.addColorStop(1, '#8a6a30');
  ctx.fillStyle = gnd;
  ctx.fillRect(0, VP_Y, W, H - VP_Y);
}

function drawBuildings() {
  const bldgs = [
    {x:0.05, w:0.07, h:0.28, c:'#d4956a'},
    {x:0.10, w:0.05, h:0.38, c:'#c47a55'},
    {x:0.13, w:0.08, h:0.22, c:'#e8aa7a'},
    {x:0.19, w:0.06, h:0.32, c:'#b86040'},
    {x:0.25, w:0.04, h:0.42, c:'#c47a55'},
    {x:0.65, w:0.08, h:0.30, c:'#d4956a'},
    {x:0.71, w:0.05, h:0.44, c:'#c47a55'},
    {x:0.75, w:0.09, h:0.25, c:'#e8aa7a'},
    {x:0.82, w:0.06, h:0.38, c:'#b86040'},
    {x:0.87, w:0.07, h:0.28, c:'#d4956a'},
    {x:0.93, w:0.05, h:0.36, c:'#c47a55'},
  ];
  bldgs.forEach(b => {
    const bh = VP_Y * b.h;
    ctx.fillStyle = b.c;
    ctx.fillRect(W*b.x, VP_Y - bh, W*b.w, bh);
    // windows
    ctx.fillStyle = 'rgba(255,240,180,0.35)';
    for (let wy = VP_Y-bh+8; wy < VP_Y-6; wy += 16) {
      for (let wx = W*b.x+5; wx < W*(b.x+b.w)-8; wx += 13) {
        ctx.fillRect(wx, wy, 7, 9);
      }
    }
    // roof
    ctx.fillStyle = 'rgba(0,0,0,0.1)';
    ctx.fillRect(W*b.x, VP_Y-bh, W*b.w, 5);
  });
}

// ── TRACKS ──
function drawTracks() {
  // Draw lane dividers and ground texture using perspective lines
  const laneOffsets = [-LANE_WIDTH, 0, LANE_WIDTH, LANE_WIDTH*2]; // edges
  const laneLineX   = [-LANE_WIDTH*1.5, -LANE_WIDTH*0.5, LANE_WIDTH*0.5, LANE_WIDTH*1.5];

  // Ground fill per lane (alternating shade)
  for (let li=0; li<3; li++) {
    const lx = LANES[li];
    const lEdgeL = (lx - 0.5) * LANE_WIDTH;
    const lEdgeR = (lx + 0.5) * LANE_WIDTH;
    const pNearL = project(lEdgeL, 1.0);
    const pNearR = project(lEdgeR, 1.0);
    const pFarL  = project(lEdgeL, FAR_Z);
    const pFarR  = project(lEdgeR, FAR_Z);

    ctx.beginPath();
    ctx.moveTo(pFarL.x,  pFarL.y);
    ctx.lineTo(pFarR.x,  pFarR.y);
    ctx.lineTo(pNearR.x, pNearR.y);
    ctx.lineTo(pNearL.x, pNearL.y);
    ctx.closePath();

    const shade = li === 1 ? 'rgba(0,0,0,0.07)' : 'rgba(0,0,0,0.14)';
    ctx.fillStyle = shade;
    ctx.fill();
  }

  // Rail / lane-edge lines
  laneLineX.forEach(lx => {
    const pNear = project(lx, 1.0);
    const pFar  = project(lx, FAR_Z);
    ctx.beginPath();
    ctx.moveTo(pFar.x, pFar.y);
    ctx.lineTo(pNear.x, pNear.y);
    ctx.strokeStyle = 'rgba(80,50,10,0.5)';
    ctx.lineWidth = 2;
    ctx.stroke();
  });

  // Scrolling planks / sleepers
  planks.forEach(z => {
    if (z < FAR_Z) return;
    const lL = project(-LANE_WIDTH * 1.55, z);
    const lR = project( LANE_WIDTH * 1.55, z);
    ctx.beginPath();
    ctx.moveTo(lL.x, lL.y);
    ctx.lineTo(lR.x, lR.y);
    ctx.strokeStyle = `rgba(100,70,20,${z * 0.5})`;
    ctx.lineWidth = Math.max(z * 4, 0.5);
    ctx.stroke();
  });

  // Side walls / curbs
  drawSideWalls();
}

function drawSideWalls() {
  // Left wall
  const wallLX = -LANE_WIDTH * 1.6;
  const pWLN = project(wallLX, 1.0);
  const pWLF = project(wallLX, FAR_Z);
  ctx.beginPath();
  ctx.moveTo(pWLF.x, pWLF.y);
  ctx.lineTo(pWLN.x, pWLN.y);
  ctx.lineTo(pWLN.x, H);
  ctx.lineTo(0, H);
  ctx.closePath();
  ctx.fillStyle = '#8a6a30';
  ctx.fill();

  // Right wall
  const wallRX = LANE_WIDTH * 1.6;
  const pWRN = project(wallRX, 1.0);
  const pWRF = project(wallRX, FAR_Z);
  ctx.beginPath();
  ctx.moveTo(pWRF.x, pWRF.y);
  ctx.lineTo(pWRN.x, pWRN.y);
  ctx.lineTo(pWRN.x, H);
  ctx.lineTo(W, H);
  ctx.closePath();
  ctx.fillStyle = '#8a6a30';
  ctx.fill();

  // Wall tops
  ctx.strokeStyle = 'rgba(0,0,0,0.3)';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(pWLF.x, pWLF.y); ctx.lineTo(pWLN.x, pWLN.y); ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(pWRF.x, pWRF.y); ctx.lineTo(pWRN.x, pWRN.y); ctx.stroke();
}

// ── COINS ──
function drawCoins() {
  coinsList.forEach(c => {
    const lx = LANES[c.lane + 1] * LANE_WIDTH;
    const coinH = c.high ? 80 : 0;
    const p = project(lx, c.z, coinH);
    const r = p.scale * 18;

    ctx.save();
    ctx.translate(p.x, p.y);

    // Coin glow
    const grd = ctx.createRadialGradient(0,0,0,0,0,r*1.5);
    grd.addColorStop(0,'rgba(255,215,0,0.4)');
    grd.addColorStop(1,'transparent');
    ctx.fillStyle = grd;
    ctx.beginPath(); ctx.arc(0,0,r*1.5,0,Math.PI*2); ctx.fill();

    // Coin body
    ctx.beginPath(); ctx.arc(0,0,r,0,Math.PI*2);
    const coinGrd = ctx.createRadialGradient(-r*0.3,-r*0.3,0,0,0,r);
    coinGrd.addColorStop(0,'#ffe566');
    coinGrd.addColorStop(0.5,'#ffd700');
    coinGrd.addColorStop(1,'#c8a000');
    ctx.fillStyle = coinGrd;
    ctx.fill();
    ctx.strokeStyle = '#c8a000';
    ctx.lineWidth = p.scale * 1.5;
    ctx.stroke();

    // $ sign
    ctx.fillStyle = '#8a6000';
    ctx.font = `bold ${r}px Nunito`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('$', 0, 1);

    ctx.restore();
  });
}

// ── OBSTACLES ──
function drawObstacles() {
  // Sort back to front
  const sorted = [...obstacles].sort((a,b) => a.z - b.z);

  sorted.forEach(o => {
    const lx = LANES[o.lane+1] * LANE_WIDTH;
    const p  = project(lx, o.z, 0);
    const sc = p.scale;

    if (o.type === 'low')     drawTrash(p, sc, o.hit);
    if (o.type === 'high')    drawSign(p, sc, o.hit);
    if (o.type === 'barrier') drawFence(p, sc, o.hit);
    if (o.type === 'wide')    drawCart(p, sc, o.hit);
  });
}

function drawTrash(p, sc, hit) {
  // Trash bin obstacle (low, duck under?)
  // Actually: trash → need to jump over
  ctx.save();
  ctx.translate(p.x, p.y);
  const w = sc * 44, h = sc * 52;
  const flash = hit ? 'rgba(255,0,0,0.5)' : 'transparent';

  // Shadow
  ctx.fillStyle = 'rgba(0,0,0,0.25)';
  ctx.beginPath(); ctx.ellipse(0, 4, w*0.6, sc*8, 0, 0, Math.PI*2); ctx.fill();

  // Bin body
  ctx.fillStyle = hit ? '#ff5555' : '#5a8a5a';
  ctx.fillRect(-w/2, -h, w, h);
  // Bin lid
  ctx.fillStyle = hit ? '#ff8888' : '#7ab87a';
  ctx.fillRect(-w/2-4, -h-sc*8, w+8, sc*10);
  // Label
  ctx.fillStyle = 'rgba(255,255,255,0.5)';
  ctx.font = `bold ${sc*10}px Nunito`;
  ctx.textAlign = 'center';
  ctx.fillText('♻', 0, -h*0.45);
  // Stripes
  ctx.fillStyle = 'rgba(0,0,0,0.15)';
  for (let i=0; i<3; i++) ctx.fillRect(-w/2, -h+h*0.3+i*sc*12, w, sc*5);

  ctx.restore();
}

function drawSign(p, sc, hit) {
  // Overhead sign / barrier — need to slide
  ctx.save();
  ctx.translate(p.x, p.y);
  const sw = sc * 100;
  const sh = sc * 30;
  const poleH = sc * 110;

  // Poles
  ctx.fillStyle = hit ? '#ff6666' : '#888';
  ctx.fillRect(-sw/2 - sc*5, -poleH, sc*8, poleH);
  ctx.fillRect( sw/2 - sc*3, -poleH, sc*8, poleH);

  // Sign board
  ctx.fillStyle = hit ? '#ff4444' : '#e74c3c';
  ctx.fillRect(-sw/2, -poleH - sh*0.3, sw, sh);
  ctx.fillStyle = '#fff';
  ctx.font = `bold ${sc*12}px Nunito`;
  ctx.textAlign = 'center';
  ctx.fillText('⚠ BAISSEZ-VOUS', 0, -poleH - sh*0.3 + sh*0.65);

  ctx.restore();
}

function drawFence(p, sc, hit) {
  // Metal fence — can't pass, need to change lane
  ctx.save();
  ctx.translate(p.x, p.y);
  const fw = sc * 90, fh = sc * 75;
  const shadow_alpha = 0.3;

  ctx.fillStyle = 'rgba(0,0,0,' + shadow_alpha + ')';
  ctx.beginPath(); ctx.ellipse(0, 4, fw*0.5, sc*10, 0, 0, Math.PI*2); ctx.fill();

  // Posts
  const postColor = hit ? '#ff6666' : '#aaa';
  ctx.fillStyle = postColor;
  [-fw/2, 0, fw/2].forEach(px => ctx.fillRect(px-sc*4, -fh, sc*8, fh));

  // Horizontal bars
  ctx.strokeStyle = postColor;
  ctx.lineWidth = sc * 5;
  [-fh*0.2, -fh*0.55, -fh*0.88].forEach(py => {
    ctx.beginPath(); ctx.moveTo(-fw/2, py); ctx.lineTo(fw/2, py); ctx.stroke();
  });

  // Diagonal bars
  ctx.lineWidth = sc * 2.5;
  ctx.strokeStyle = hit ? 'rgba(255,100,100,0.5)' : 'rgba(180,180,180,0.4)';
  for (let x=-fw/2; x<fw/2; x+=sc*20) {
    ctx.beginPath(); ctx.moveTo(x, -fh*0.2); ctx.lineTo(x+sc*18, -fh*0.88); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(x+sc*18, -fh*0.2); ctx.lineTo(x, -fh*0.88); ctx.stroke();
  }

  ctx.restore();
}

function drawCart(p, sc, hit) {
  // Shopping cart
  ctx.save();
  ctx.translate(p.x, p.y);
  const cw = sc * 70, ch = sc * 55;

  // Shadow
  ctx.fillStyle = 'rgba(0,0,0,0.22)';
  ctx.beginPath(); ctx.ellipse(0, 4, cw*0.55, sc*8, 0, 0, Math.PI*2); ctx.fill();

  // Wheels
  ctx.fillStyle = '#333';
  [-cw*0.35, cw*0.35].forEach(wx => {
    ctx.beginPath(); ctx.arc(wx, 0, sc*7, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#888';
    ctx.beginPath(); ctx.arc(wx, 0, sc*3.5, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#333';
  });

  // Cart body (wire mesh look)
  ctx.strokeStyle = hit ? '#ff8888' : '#e8c060';
  ctx.lineWidth = sc * 3.5;
  ctx.fillStyle = hit ? 'rgba(255,80,80,0.15)' : 'rgba(232,192,96,0.1)';
  ctx.beginPath();
  ctx.moveTo(-cw/2, 0);
  ctx.lineTo(-cw/2 + sc*8, -ch);
  ctx.lineTo(cw/2 - sc*8, -ch);
  ctx.lineTo(cw/2, 0);
  ctx.closePath();
  ctx.fill();
  ctx.stroke();

  // Grid lines
  ctx.lineWidth = sc * 1;
  ctx.strokeStyle = hit ? 'rgba(255,150,150,0.4)' : 'rgba(232,192,96,0.4)';
  for (let i=1; i<4; i++) {
    const t = i/4;
    const x1 = -cw/2 + t*(cw - sc*16);
    ctx.beginPath();
    ctx.moveTo(-cw/2 + t*(sc*8), 0);
    ctx.lineTo(-cw/2 + t*(sc*8) + sc*8*(1-t)*0.5, -ch);
    ctx.stroke();
  }
  for (let i=1; i<3; i++) {
    const t = i/3;
    ctx.beginPath();
    ctx.moveTo(-cw/2 + (sc*8)*t, -ch*t);
    ctx.lineTo(cw/2 - (sc*8)*t, -ch*t);
    ctx.stroke();
  }

  // Handle
  ctx.lineWidth = sc * 4;
  ctx.strokeStyle = hit ? '#ff8888' : '#e8c060';
  ctx.beginPath();
  ctx.moveTo(-cw/2 + sc*8, -ch);
  ctx.lineTo(-cw/2 - sc*4, -ch - sc*18);
  ctx.lineTo(cw/2 + sc*4, -ch - sc*18);
  ctx.lineTo(cw/2 - sc*8, -ch);
  ctx.stroke();

  ctx.restore();
}

// ── PLAYER ──
function drawPlayer() {
  const lerpLane = fromLane + (playerLane - fromLane) * Math.min(laneProgress, 1);
  const lx = lerpLane * LANE_WIDTH;

  // Jump height (parabola)
  const jumpHeight = isJumping ? Math.sin(jumpTimer / 44 * Math.PI) * 120 : 0;

  // Slide: crouch
  const isSliding = slideTimer > 0;

  const p = project(lx, 0.98, jumpHeight);
  const sc = p.scale * 0.92;

  // Shadow on ground
  const pGround = project(lx, 0.98, 0);
  ctx.save();
  ctx.globalAlpha = 0.3 * (1 - jumpHeight / 130);
  ctx.fillStyle = 'rgba(0,0,0,0.5)';
  ctx.beginPath();
  ctx.ellipse(pGround.x, pGround.y + sc*4, sc*22, sc*8, 0, 0, Math.PI*2);
  ctx.fill();
  ctx.restore();

  // Invincible flash
  if (invTimer > 0 && Math.floor(invTimer / 7) % 2 === 0) return;

  ctx.save();
  ctx.translate(p.x, p.y);

  if (isSliding) {
    ctx.translate(0, sc * 22);
    ctx.scale(1, 0.5);
  }

  const runPhase = frame % 20;
  const legSwing = Math.sin(frame * 0.32) * (isSliding ? 0 : 1);

  // ── Legs ──
  const legW = sc * 14, legH = sc * 38;
  const legY = sc * 36;
  const legColorL = '#3a6abf', legColorR = '#2e55a0';

  // Left leg
  ctx.save();
  ctx.translate(-sc * 9, legY);
  ctx.rotate(legSwing * 0.35);
  ctx.fillStyle = legColorL;
  ctx.beginPath();
  ctx.roundRect(-legW/2, 0, legW, legH, sc*4);
  ctx.fill();
  // Shoe
  ctx.fillStyle = '#222';
  ctx.fillRect(-legW/2-sc*2, legH - sc*6, legW+sc*10, sc*8);
  ctx.restore();

  // Right leg
  ctx.save();
  ctx.translate(sc * 9, legY);
  ctx.rotate(-legSwing * 0.35);
  ctx.fillStyle = legColorR;
  ctx.beginPath();
  ctx.roundRect(-legW/2, 0, legW, legH, sc*4);
  ctx.fill();
  ctx.fillStyle = '#222';
  ctx.fillRect(-legW/2-sc*2, legH - sc*6, legW+sc*10, sc*8);
  ctx.restore();

  // ── Body ──
  const bw = sc * 38, bh = sc * 48;
  // Jacket
  ctx.fillStyle = '#e84040';
  ctx.beginPath();
  ctx.roundRect(-bw/2, -bh*0.05, bw, bh, [0,0,sc*6,sc*6]);
  ctx.fill();
  // Hood/collar
  ctx.fillStyle = '#c42020';
  ctx.fillRect(-bw/2, -bh*0.05, bw, bh*0.35);
  // Backpack
  ctx.fillStyle = '#2244aa';
  ctx.beginPath();
  ctx.roundRect(-sc*13, -bh*0.55, sc*26, bh * 0.9, sc*5);
  ctx.fill();
  ctx.fillStyle = '#3366cc';
  ctx.fillRect(-sc*10, -bh*0.35, sc*20, bh*0.35);

  // ── Arms ──
  const armW = sc * 12, armH = sc * 36;
  const armSwing = legSwing;
  // Left arm
  ctx.save();
  ctx.translate(-bw/2 - armW/2 + sc*2, -bh * 0.0);
  ctx.rotate(-armSwing * 0.4);
  ctx.fillStyle = '#e84040';
  ctx.beginPath(); ctx.roundRect(-armW/2, 0, armW, armH, sc*4); ctx.fill();
  ctx.restore();
  // Right arm
  ctx.save();
  ctx.translate(bw/2 + armW/2 - sc*2, -bh * 0.0);
  ctx.rotate(armSwing * 0.4);
  ctx.fillStyle = '#e84040';
  ctx.beginPath(); ctx.roundRect(-armW/2, 0, armW, armH, sc*4); ctx.fill();
  ctx.restore();

  // ── Head ──
  const hR = sc * 18;
  ctx.fillStyle = '#f5c5a0';
  ctx.beginPath(); ctx.arc(0, -bh + sc*6, hR, 0, Math.PI*2); ctx.fill();
  // Hair
  ctx.fillStyle = '#3a1a00';
  ctx.beginPath();
  ctx.arc(0, -bh + sc*6 - hR*0.2, hR, Math.PI, 2*Math.PI);
  ctx.fill();
  ctx.fillRect(-hR, -bh + sc*6 - hR*0.5, hR*2, hR*0.4);
  // Hoodie
  ctx.fillStyle = '#c42020';
  ctx.beginPath();
  ctx.arc(0, -bh + sc*6, hR * 1.1, 0.2, Math.PI - 0.2);
  ctx.fill();

  ctx.restore();
}

// ── PURSUER (cop chasing from behind) ──
function drawPursuer() {
  pursuerBob = (pursuerBob + 0.12) % (Math.PI * 2);
  const bob = Math.sin(pursuerBob) * 5;

  // Pursuer stays at a fixed depth slightly behind player
  const p = project(0, 0.72, -bob);
  const sc = p.scale * 0.85;

  ctx.save();
  ctx.translate(p.x, p.y);

  const runPhase = frame % 18;
  const legSwing2 = Math.sin(frame * 0.38 + Math.PI) * 1; // opposite phase

  // Legs
  const legW = sc*13, legH = sc*36;
  [[-sc*8, legSwing2], [sc*8, -legSwing2]].forEach(([lx, sw]) => {
    ctx.save();
    ctx.translate(lx, sc*34);
    ctx.rotate(sw * 0.3);
    ctx.fillStyle = '#1a3a8a';
    ctx.beginPath(); ctx.roundRect(-legW/2, 0, legW, legH, sc*4); ctx.fill();
    ctx.fillStyle = '#111';
    ctx.fillRect(-legW/2 - sc*2, legH - sc*5, legW+sc*9, sc*7);
    ctx.restore();
  });

  // Body (cop uniform)
  const bw = sc*36, bh = sc*46;
  ctx.fillStyle = '#1a3a8a';
  ctx.beginPath(); ctx.roundRect(-bw/2, -bh*0.05, bw, bh, [0,0,sc*6,sc*6]); ctx.fill();
  // Belt
  ctx.fillStyle = '#111';
  ctx.fillRect(-bw/2, bh*0.35, bw, sc*8);
  ctx.fillStyle = '#ffd700';
  ctx.fillRect(-sc*6, bh*0.35, sc*12, sc*8); // badge on belt

  // Arms
  const armW=sc*11, armH=sc*34;
  [[-bw/2-armW/2+sc*2, legSwing2*0.4], [bw/2+armW/2-sc*2, -legSwing2*0.4]].forEach(([ax, rot]) => {
    ctx.save();
    ctx.translate(ax, 0);
    ctx.rotate(rot);
    ctx.fillStyle = '#1a3a8a';
    ctx.beginPath(); ctx.roundRect(-armW/2, 0, armW, armH, sc*4); ctx.fill();
    ctx.restore();
  });

  // Head
  const hR = sc*17;
  ctx.fillStyle = '#f5c5a0';
  ctx.beginPath(); ctx.arc(0, -bh+sc*6, hR, 0, Math.PI*2); ctx.fill();
  // Police hat
  ctx.fillStyle = '#1a3a8a';
  ctx.beginPath(); ctx.ellipse(0, -bh+sc*6-hR*0.5, hR*1.3, hR*0.5, 0, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(0, -bh+sc*6-hR*0.5, hR*0.9, Math.PI, 2*Math.PI); ctx.fill();
  ctx.fillStyle = '#ffd700';
  ctx.fillRect(-sc*7, -bh+sc*6-hR*0.6, sc*14, sc*4);
  // Sunglasses
  ctx.fillStyle = 'rgba(0,0,0,0.7)';
  ctx.fillRect(-hR*0.7, -bh+sc*6-hR*0.1, hR*0.6, hR*0.3);
  ctx.fillRect(hR*0.1, -bh+sc*6-hR*0.1, hR*0.6, hR*0.3);

  // Exclamation / speech
  const dist = Math.floor(frame / 40) % 3;
  if (dist === 0) {
    ctx.fillStyle = '#e84040';
    ctx.font = `bold ${sc*18}px Nunito`;
    ctx.textAlign = 'center';
    ctx.fillText('STOP !', 0, -bh - sc*25);
  }

  ctx.restore();
}
