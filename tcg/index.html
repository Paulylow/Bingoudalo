<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TCG MAUBEUGE 🎴</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; font-family: 'DM Sans', sans-serif; }
  body { background: radial-gradient(circle at center, #1a1a2e 0%, #0f0f16 100%); color: #fff; min-height: 100vh; display: flex; flex-direction: column; align-items: center; overflow-x: hidden; }

  /* ── TOP BAR ── */
  .top-bar { position: fixed; top: 0; left: 0; width: 100%; padding: 15px 30px; background: rgba(0,0,0,0.8); backdrop-filter: blur(10px); display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid rgba(255,255,255,0.1); z-index: 100;}
  .logo { font-family: 'Bebas Neue'; font-size: 30px; color: #f39c12; letter-spacing: 2px; text-shadow: 0 0 10px rgba(243, 156, 18, 0.5);}
  .wallet-pill { background: rgba(39, 174, 96, 0.2); border: 2px solid #27ae60; padding: 8px 20px; border-radius: 20px; color: #2ecc71; font-family: 'Bebas Neue'; font-size: 22px; letter-spacing: 1px;}
  .hub-link { color: #aaa; text-decoration: none; font-weight: bold; transition: 0.2s; text-transform: uppercase; font-size: 14px;}
  .hub-link:hover { color: #fff; }

  /* ── MAIN AREA ── */
  .main-area { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; width: 100%; padding-top: 80px; }
  
  .booster-pack { cursor: pointer; transition: 0.3s; position: relative; animation: float 3s ease-in-out infinite; display: flex; flex-direction: column; align-items: center; }
  .booster-pack:hover { transform: scale(1.05) translateY(-10px); filter: drop-shadow(0 0 40px rgba(243, 156, 18, 0.8)); }
  .booster-pack img { width: 280px; min-height: 380px; border-radius: 15px; filter: drop-shadow(0 20px 30px rgba(0,0,0,0.9)); object-fit: cover; } 
  .booster-price { position: absolute; bottom: -20px; left: 50%; transform: translateX(-50%); background: #c0392b; color: white; font-family: 'Bebas Neue'; font-size: 24px; padding: 5px 20px; border-radius: 10px; border: 2px solid #ff4444; box-shadow: 0 10px 20px rgba(0,0,0,0.5); white-space: nowrap;}
  
  @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-15px); } }

  /* ── CARDS REVEAL AREA ── */
  .reveal-area { display: none; gap: 30px; margin-top: 40px; perspective: 1000px; flex-wrap: wrap; justify-content: center;}
  
  .card-container { width: 220px; height: 320px; position: relative; cursor: pointer; transition: transform 0.6s; transform-style: preserve-3d; }
  .card-container.flipped { transform: rotateY(180deg) scale(1.1); z-index: 10; }
  
  .card-face { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; border-radius: 15px; display: flex; flex-direction: column; align-items: center; justify-content: center; box-shadow: 0 15px 35px rgba(0,0,0,0.5); overflow: hidden;}
  
  .card-back { background: repeating-linear-gradient(45deg, #111, #111 10px, #222 10px, #222 20px); border: 4px solid #444; }
  .card-back::after { content: '?'; font-family: 'Bebas Neue'; font-size: 80px; color: #555; }
  
  .card-front { transform: rotateY(180deg); background: #000; border: 4px solid #fff; }
  .card-front img { width: 100%; height: 100%; object-fit: cover; background: #222; }
  
  /* ── GLOWS DE RARETÉ (Auras) ── */
  .card-container.common .card-front { border-color: #bdc3c7; box-shadow: 0 0 20px rgba(189, 195, 199, 0.4); }
  .card-container.rare .card-front { border-color: #3498db; box-shadow: 0 0 30px rgba(52, 152, 219, 0.6); }
  .card-container.epic .card-front { border-color: #9b59b6; box-shadow: 0 0 40px rgba(155, 89, 182, 0.8); }
  .card-container.legendary .card-front { border-color: #f1c40f; box-shadow: 0 0 60px rgba(241, 196, 15, 1); animation: legendaryPulse 2s infinite alternate;}
  .card-container.mythic .card-front { border-color: #ff0000; box-shadow: 0 0 80px rgba(255, 0, 0, 1); animation: mythicPulse 0.5s infinite alternate;}
  
  @keyframes legendaryPulse { from { box-shadow: 0 0 40px #f1c40f; } to { box-shadow: 0 0 80px #f39c12; } }
  @keyframes mythicPulse { from { box-shadow: 0 0 60px #e74c3c; } to { box-shadow: 0 0 120px #ff0000; transform: scale(1.02); } }

  .rarity-badge { position: absolute; bottom: 10px; background: rgba(0,0,0,0.9); padding: 5px 15px; border-radius: 20px; font-family: 'Bebas Neue'; letter-spacing: 1px; font-size: 18px; text-transform: uppercase;}
  .common .rarity-badge { color: #bdc3c7; border: 1px solid #bdc3c7;}
  .rare .rarity-badge { color: #3498db; border: 1px solid #3498db;}
  .epic .rarity-badge { color: #9b59b6; border: 1px solid #9b59b6;}
  .legendary .rarity-badge { color: #f1c40f; border: 1px solid #f1c40f;}
  .mythic .rarity-badge { color: #ff0000; border: 1px solid #ff0000; text-shadow: 0 0 10px #ff0000;}

  /* ── CONTROLS ── */
  .action-controls { margin-top: 50px; display: flex; gap: 20px; z-index: 20;}
  .btn { font-family: 'Bebas Neue'; font-size: 22px; letter-spacing: 2px; padding: 15px 30px; border: none; border-radius: 10px; cursor: pointer; transition: 0.2s; text-transform: uppercase; }
  .btn-gold { background: #f39c12; color: #000; box-shadow: 0 0 15px rgba(243, 156, 18, 0.4); }
  .btn-gold:hover { background: #f1c40f; transform: translateY(-2px); box-shadow: 0 0 25px rgba(241, 196, 15, 0.6); }
  .btn-outline { background: transparent; border: 2px solid #aaa; color: #aaa; }
  .btn-outline:hover { border-color: #fff; color: #fff; background: rgba(255,255,255,0.1); }
  
  #btnAgain { display: none; }

  /* ── CLASSEUR (MODAL) ── */
  .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 200; align-items: center; justify-content: center; backdrop-filter: blur(10px); padding: 20px;}
  .modal-content { background: #111; border: 2px solid #444; border-radius: 15px; width: 100%; max-width: 1200px; height: 85vh; padding: 30px; position: relative; display: flex; flex-direction: column;}
  .close-btn { position: absolute; top: 15px; right: 20px; font-size: 35px; color: #aaa; cursor: pointer; transition: 0.2s;}
  .close-btn:hover { color: #ff4444; }
  
  .collection-header { text-align: center; margin-bottom: 20px; flex-shrink: 0;}
  .collection-header h2 { font-family: 'Bebas Neue'; font-size: 40px; color: #f39c12; letter-spacing: 2px;}
  .collection-stats { color: #888; font-size: 16px; margin-top: 5px;}

  .collection-grid { flex: 1; display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 15px; overflow-y: auto; padding-right: 10px;}
  .collection-grid::-webkit-scrollbar { width: 8px; }
  .collection-grid::-webkit-scrollbar-thumb { background: #444; border-radius: 4px; }
  
  .coll-card { position: relative; width: 100%; aspect-ratio: 2.5/3.5; border-radius: 8px; overflow: hidden; border: 2px solid #333; background: #000; transition: 0.2s; cursor: pointer;}
  .coll-card:hover { transform: scale(1.05); z-index: 10; }
  .coll-card img { width: 100%; height: 100%; object-fit: cover; }
  
  .coll-card.locked { cursor: not-allowed; }
  .coll-card.locked:hover { transform: none; }
  .coll-card.locked img { filter: grayscale(100%) brightness(0.2); }
  
  .coll-card.common { border-color: #bdc3c7; }
  .coll-card.rare { border-color: #3498db; }
  .coll-card.epic { border-color: #9b59b6; box-shadow: 0 0 10px rgba(155,89,182,0.3);}
  .coll-card.legendary { border-color: #f1c40f; box-shadow: 0 0 15px rgba(241,196,15,0.5);}
  .coll-card.mythic { border-color: #ff0000; box-shadow: 0 0 20px rgba(255,0,0,0.8);}

  .dupe-badge { position: absolute; top: 5px; right: 5px; background: #e74c3c; color: white; font-size: 12px; font-weight: bold; width: 22px; height: 22px; display: flex; align-items: center; justify-content: center; border-radius: 50%; border: 1px solid #fff; box-shadow: 0 2px 5px rgba(0,0,0,0.5); z-index: 5;}

  /* ── ZOOM CARTE (LIGHTBOX) ── */
  #zoomModal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 300; align-items: center; justify-content: center; flex-direction: column; cursor: zoom-out;}
  #zoomModal img { max-width: 90vw; max-height: 85vh; border-radius: 20px; box-shadow: 0 0 50px rgba(255,255,255,0.2); animation: zoomIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);}
  .zoom-name { font-family: 'Bebas Neue'; font-size: 30px; margin-top: 20px; color: #fff; letter-spacing: 2px; }
  
  @keyframes zoomIn { from { transform: scale(0.5); opacity: 0; } to { transform: scale(1); opacity: 1; } }

</style>
</head>
<body>

<div class="top-bar">
    <a href="../index.html" class="hub-link">← Retour au Hub</a>
    <div class="logo">TCG MAUBEUGE</div>
    <div class="wallet-pill">💰 <span id="myWallet">0</span> M$</div>
</div>

<div class="main-area">
    
    <div class="booster-pack" id="boosterPack" onclick="openPack()">
        <img src="cartes/booster.png" alt="Booster Pack" onerror="this.src='https://via.placeholder.com/250x350/1a0509/f39c12?text=BOOSTER+INTROUVABLE'">
        <div class="booster-price">OUVRIR (500 M$)</div>
    </div>

    <div class="reveal-area" id="revealArea"></div>

    <div class="action-controls">
        <button class="btn btn-outline" onclick="openCollection()">Mon Classeur 📖</button>
        <button class="btn btn-gold" id="btnAgain" onclick="resetPack()">Ouvrir un autre (500 M$)</button>
    </div>
</div>

<!-- LE CLASSEUR (MODAL) -->
<div class="modal" id="collectionModal">
    <div class="modal-content">
        <span class="close-btn" onclick="document.getElementById('collectionModal').style.display='none'">&times;</span>
        <div class="collection-header">
            <h2>MA COLLECTION</h2>
            <div class="collection-stats">Cartes obtenues : <span id="collProgress" style="color: #fff; font-weight: bold;">0/44</span></div>
        </div>
        <div class="collection-grid" id="collectionGrid"></div>
    </div>
</div>

<!-- ZOOM SUR LA CARTE (MODAL) -->
<div id="zoomModal" onclick="closeZoom()">
    <img src="" id="zoomImg" alt="Zoom Carte">
    <div class="zoom-name" id="zoomName">Nom de la carte</div>
</div>

<script>
// --- CONFIGURATION SUPABASE ---
const SUPABASE_URL = 'https://pdybshweyfvxzvngnuxe.supabase.co'; 
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBkeWJzaHdleWZ2eHp2bmdudXhlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ5NDg2MDAsImV4cCI6MjA5MDUyNDYwMH0.u442X28Mhs-4T-tydabnMm8now8VfAEeNU-Sicuipq4'; 
const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

let myPseudo = '';
let myWallet = 0;
let myCollection = {}; 

const PACK_PRICE = 500;

// Ordre d'importance pour le tri
const RARITY_VALUES = {
    'mythic': 5,
    'legendary': 4,
    'epic': 3,
    'rare': 2,
    'common': 1
};

// --- GÉNÉRATION AUTOMATIQUE DE LA BASE DE DONNÉES DES CARTES ---
const CARDS_DB = [];
const raritiesCycle = ['common', 'rare', 'epic', 'legendary'];

// Cartes 1 à 40
for (let i = 1; i <= 40; i++) {
    let rarityIndex = (i - 1) % 4; 
    CARDS_DB.push({
        id: i,
        name: "Carte n°" + i,
        rarity: raritiesCycle[rarityIndex],
        img: "cartes/" + i + ".png" 
    });
}

// Cartes Mythiques : 100, 101, 102 ET 103
const mythics = [100, 101, 102, 103];
mythics.forEach(i => {
    CARDS_DB.push({
        id: i,
        name: "Mythique n°" + i,
        rarity: "mythic",
        img: "cartes/" + i + ".png"
    });
});

window.onload = async () => {
    myPseudo = localStorage.getItem('cdsi_logged_user');
    if (!myPseudo || myPseudo === 'null') { window.location.href = '../index.html'; return; }
    await fetchUserData();
};

async function fetchUserData() {
    try {
        const { data, error } = await sb.from('cdsi_users').select('wallet, collection').eq('pseudo', myPseudo).single();
        if(error) throw error;
        
        if(data) {
            myWallet = Math.floor(parseFloat(data.wallet || 0));
            myCollection = data.collection || {};
            document.getElementById('myWallet').innerText = myWallet;
        }
    } catch(err) {
        console.error("Erreur de chargement des données : ", err);
    }
}

// --- OUVERTURE DU BOOSTER ---
async function openPack() {
    if (myWallet < PACK_PRICE) return alert("❌ T'es à sec ! Il te faut " + PACK_PRICE + " M$ pour un booster.");
    
    // Déduire l'argent
    myWallet -= PACK_PRICE;
    document.getElementById('myWallet').innerText = myWallet;

    document.getElementById('boosterPack').style.display = 'none';
    const revealArea = document.getElementById('revealArea');
    revealArea.style.display = 'flex';
    revealArea.innerHTML = '';

    // Tirage (Slot 1, Slot 2, Slot 3)
    let pulledCards = [pullCard(1), pullCard(2), pullCard(3)];

    // Générer l'HTML
    pulledCards.forEach((card, index) => {
        let rarityText = card.rarity === 'mythic' ? 'MYTHIQUE' : (card.rarity === 'legendary' ? 'LÉGENDAIRE' : (card.rarity === 'epic' ? 'ÉPIQUE' : (card.rarity === 'rare' ? 'RARE' : 'COMMUNE')));
        
        let cardHTML = `
            <div class="card-container ${card.rarity}" onclick="flipCard(this)">
                <div class="card-face card-back"></div>
                <div class="card-face card-front">
                    <img src="${card.img}" onerror="this.src='https://via.placeholder.com/220x320/222/fff?text=Carte+${card.id}'">
                    <div class="rarity-badge">${rarityText}</div>
                </div>
            </div>
        `;
        revealArea.innerHTML += cardHTML;
        
        // Ajouter à la collection
        if(!myCollection[card.id]) myCollection[card.id] = 0;
        myCollection[card.id]++;
    });

    // Sauvegarder dans Supabase
    try {
        await sb.from('cdsi_users').update({ 
            wallet: myWallet, 
            collection: myCollection 
        }).eq('pseudo', myPseudo);
    } catch(err) {
        console.error("Erreur de sauvegarde : ", err);
    }

    document.getElementById('btnAgain').style.display = 'block';
}

function flipCard(element) {
    element.classList.add('flipped');
}

function resetPack() {
    document.getElementById('revealArea').style.display = 'none';
    document.getElementById('boosterPack').style.display = 'flex';
    document.getElementById('btnAgain').style.display = 'none';
}

// --- MOTEUR DE PROBABILITÉS ---
function pullCard(slotNumber) {
    let r = Math.random();
    let rarityTarget = 'common';

    if (slotNumber === 1) {
        if (r < 0.20) rarityTarget = 'rare';
    } 
    else if (slotNumber === 2) {
        if (r < 0.05) rarityTarget = 'epic';
        else if (r < 0.30) rarityTarget = 'rare';
    } 
    else if (slotNumber === 3) {
        if (r < 0.01) rarityTarget = 'mythic';
        else if (r < 0.15) rarityTarget = 'legendary';
        else if (r < 0.50) rarityTarget = 'epic';
        else rarityTarget = 'rare';
    }

    let pool = CARDS_DB.filter(c => c.rarity === rarityTarget);
    if (pool.length === 0) pool = CARDS_DB.filter(c => c.rarity === 'common');

    return pool[Math.floor(Math.random() * pool.length)];
}

// --- LE CLASSEUR ---
function openCollection() {
    const grid = document.getElementById('collectionGrid');
    grid.innerHTML = '';
    
    let ownedCount = 0;

    // Trier les cartes par Rareté (Décroissant) puis par ID
    const sortedCards = [...CARDS_DB].sort((a, b) => {
        let valA = RARITY_VALUES[a.rarity];
        let valB = RARITY_VALUES[b.rarity];
        if (valA !== valB) {
            return valB - valA; // Plus grand en premier (Mythic > Legendary...)
        }
        return a.id - b.id; // En cas d'égalité, tri par ID (personnage)
    });

    sortedCards.forEach(card => {
        let qty = myCollection[card.id] || 0;
        let isOwned = qty > 0;
        
        if (isOwned) ownedCount++;

        let lockedClass = isOwned ? card.rarity : 'locked';
        let badgeHTML = (qty > 1) ? `<div class="dupe-badge">${qty}</div>` : '';
        
        // Si on possède la carte, on ajoute l'événement de zoom, sinon rien
        let clickEvent = isOwned ? `onclick="openZoom('${card.img}', '${card.name}', '${card.rarity}')"` : '';

        grid.innerHTML += `
            <div class="coll-card ${lockedClass}" title="Carte ${card.id} (${card.rarity})" ${clickEvent}>
                ${badgeHTML}
                <img src="${card.img}" onerror="this.src='https://via.placeholder.com/130x182/222/fff?text=${card.id}'">
            </div>
        `;
    });

    document.getElementById('collProgress').innerText = `${ownedCount} / ${CARDS_DB.length}`;
    document.getElementById('collectionModal').style.display = 'flex';
}

// --- GESTION DU ZOOM ---
function openZoom(imgSrc, name, rarity) {
    const zoomModal = document.getElementById('zoomModal');
    const zoomImg = document.getElementById('zoomImg');
    const zoomName = document.getElementById('zoomName');

    zoomImg.src = imgSrc;
    
    let rarityText = rarity === 'mythic' ? 'MYTHIQUE' : (rarity === 'legendary' ? 'LÉGENDAIRE' : (rarity === 'epic' ? 'ÉPIQUE' : (rarity === 'rare' ? 'RARE' : 'COMMUNE')));
    
    // Définir la couleur du texte selon la rareté
    let textColor = '#bdc3c7';
    if(rarity === 'rare') textColor = '#3498db';
    if(rarity === 'epic') textColor = '#9b59b6';
    if(rarity === 'legendary') textColor = '#f1c40f';
    if(rarity === 'mythic') textColor = '#ff0000';

    zoomName.innerHTML = `${name} <br> <span style="font-size: 18px; color: ${textColor};">${rarityText}</span>`;
    
    zoomImg.style.boxShadow = `0 0 50px ${textColor}`; // Aura colorée sur le zoom

    zoomModal.style.display = 'flex';
}

function closeZoom() {
    document.getElementById('zoomModal').style.display = 'none';
}
</script>
</body>
</html>
