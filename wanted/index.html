<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WANTED: DAYOUB 🔍</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root {
    --cyan: #00FFFF; 
    --magenta: #FF00FF; 
    --yellow: #f1c40f;
    --text: #ffffff;
  }
  
  * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; }
  
  body { 
    background: linear-gradient(-45deg, #2b0b12, #7a1b1b, #c0392b, #d35400);
    background-size: 400% 400%;
    animation: fondChaud 15s ease infinite;
    color: var(--text); 
    font-family: 'DM Sans', sans-serif; 
    display: flex; 
    flex-direction: column; 
    align-items: center; 
    min-height: 100vh; 
    padding: 20px; 
    overflow-x: hidden;
  }

  @keyframes fondChaud {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
  }
  
  .hub-link { position: absolute; top: 20px; left: 20px; color: var(--yellow); text-decoration: none; font-weight: bold; font-size: 14px; text-transform: uppercase; transition: 0.2s; text-shadow: 0 0 10px rgba(0,0,0,0.5);}
  .hub-link:hover { color: white; transform: scale(1.05); }
  
  .screen { display: none; flex-direction: column; align-items: center; width: 100%; max-width: 1800px; }
  .screen.active { display: flex; animation: fadeIn 0.3s; }
  @keyframes fadeIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }

  .logo { font-family: 'Bebas Neue'; font-size: 70px; letter-spacing: 5px; color: var(--yellow); text-shadow: 0 5px 15px rgba(0,0,0,0.6); margin-bottom: 20px; text-align: center; line-height: 1;}
  
  .card { 
    background: rgba(20, 20, 30, 0.8); 
    backdrop-filter: blur(15px); 
    -webkit-backdrop-filter: blur(15px);
    border: 2px solid rgba(255, 255, 255, 0.1); 
    border-radius: 15px; 
    padding: 30px; 
    width: 100%; 
    max-width: 500px; 
    box-shadow: 0 15px 35px rgba(0,0,0,0.5); 
    text-align: center; 
  }

  button { font-family: 'DM Sans'; font-weight: bold; text-transform: uppercase; border: none; border-radius: 8px; cursor: pointer; padding: 14px 24px; transition: 0.2s; width: 100%; margin-top: 10px; font-size: 15px; }
  .btn-primary { background: var(--cyan); color: #000; box-shadow: 0 5px 15px rgba(0,255,255,0.3); }
  .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(0,255,255,0.6); }
  .btn-magenta { background: var(--magenta); color: #fff; box-shadow: 0 5px 15px rgba(255,0,255,0.3); }
  .btn-magenta:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(255,0,255,0.6); }
  button:disabled { opacity: 0.5; cursor: not-allowed; transform: none !important; box-shadow: none !important; }
  
  .player-list { margin-top: 10px; width: 100%; text-align: left; display: flex; flex-direction: column; gap: 8px;}
  .player-row { display: flex; align-items: center; justify-content: space-between; padding: 10px 15px; border: 1px solid rgba(255,255,255,0.1); border-radius: 8px; font-weight: bold; background: rgba(0,0,0,0.4); transition: 0.3s;}
  .player-row-info { display: flex; align-items: center; gap: 12px; }
  .player-row img { width: 35px; height: 35px; border-radius: 50%; object-fit: cover; border: 2px solid #555; }
  .badge { background: rgba(0,255,255,0.2); color: var(--cyan); padding: 3px 8px; border-radius: 4px; font-size: 11px; text-transform: uppercase; letter-spacing: 1px;}

  .found-glow { 
      background: rgba(241, 196, 15, 0.2) !important; 
      border-color: var(--yellow) !important; 
      color: var(--yellow); 
      box-shadow: 0 0 20px rgba(241, 196, 15, 0.5); 
      transform: scale(1.02);
  }

  .game-wrapper { display: flex; gap: 20px; width: 100%; max-width: 1500px; align-items: flex-start; justify-content: center; flex-wrap: nowrap;}
  .game-main { flex: 1; min-width: 600px; display: flex; flex-direction: column; align-items: center;}
  .game-sidebar { width: 320px; flex-shrink: 0; background: rgba(20,20,30,0.6); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); border: 2px solid rgba(255,255,255,0.1); border-radius: 15px; padding: 20px; box-shadow: 0 15px 35px rgba(0,0,0,0.5); }

  #gameContainer { position: relative; width: 100%; }
  canvas { background: #0b0c10; border: 4px solid rgba(255,255,255,0.2); border-radius: 10px; width: 100%; height: auto; aspect-ratio: 3 / 2; cursor: crosshair; box-shadow: 0 15px 40px rgba(0,0,0,0.8); display: block; }
  
  .overlay { position: absolute; inset: 0; display: none; flex-direction: column; align-items: center; justify-content: center; background: rgba(0,0,0,0.85); border-radius: 10px; z-index: 10; backdrop-filter: blur(8px); }
  .overlay h2 { font-family: 'Bebas Neue'; font-size: 80px; letter-spacing: 2px; }
  #foundOverlay h2 { color: var(--cyan); text-shadow: 0 0 30px var(--cyan); }

  .game-header { display: flex; justify-content: space-between; width: 100%; margin-bottom: 15px; align-items: center; background: rgba(0,0,0,0.5); backdrop-filter: blur(5px); padding: 10px 20px; border-radius: 10px; border: 1px solid rgba(255,255,255,0.1); box-shadow: 0 10px 20px rgba(0,0,0,0.3);}
  .target-box { display: flex; align-items: center; gap: 15px; text-align: left; }
  .target-box img { width: 60px; height: 60px; object-fit: cover; border-radius: 8px; border: 2px solid var(--yellow); box-shadow: 0 0 20px rgba(241, 196, 15, 0.6); }
  .round-info { font-family: 'Bebas Neue'; font-size: 40px; color: white; line-height: 1; text-shadow: 0 2px 5px rgba(0,0,0,0.8); margin: 0; }
  
  .timer-box { font-family: 'Bebas Neue'; font-size: 50px; color: var(--magenta); text-shadow: 0 0 15px var(--magenta); min-width: 70px; text-align: center;}
  .timer-box.hurry { color: #ff3333; text-shadow: 0 0 25px #ff3333; animation: pulse 0.5s infinite alternate;}
  @keyframes pulse { from { transform: scale(1); } to { transform: scale(1.15); } }

  @media (max-width: 1000px) {
    .game-wrapper { flex-wrap: wrap; }
    .game-sidebar { width: 100%; }
  }

  .loading-text { font-size: 20px; color: var(--yellow); font-weight: bold; margin-top: 20px; animation: blink 1s infinite alternate; }
  @keyframes blink { from { opacity: 0.5; } to { opacity: 1; } }

</style>
</head>
<body>

<a href="../index.html" class="hub-link">← Retour au Hub</a>

<div class="screen active" id="screenJoin">
  <div class="logo">WANTED<br><span style="color:var(--cyan); font-size:45px;">DAYOUB</span></div>
  <div class="card" style="background: transparent; border: none; box-shadow: none;">
    <div class="loading-text">Connexion au profil en cours...</div>
  </div>
</div>

<div class="screen" id="screenLobby">
  <div class="logo">LOBBY</div>
  <div class="card">
    <h3 style="margin-bottom: 15px; color: var(--yellow); text-align: left; font-family: 'Bebas Neue'; font-size: 24px; letter-spacing: 1px;">Joueurs connectés</h3>
    <div class="player-list" id="playersList"></div>
    <div id="lobbyControls" style="margin-top: 25px;"></div>
  </div>
</div>

<div class="screen" id="screenGame">
  <div class="game-wrapper">
      <div class="game-main">
          <div class="game-header">
            <div class="target-box">
              <img src="../bingoudalo/avatar/dayoub.png" alt="Cible">
              <div>
                  <div style="font-size: 14px; font-weight: bold; color: var(--yellow); letter-spacing: 2px;">CIBLE</div>
                  <div class="round-info" id="roundDisplay">MANCHE 1/5</div>
              </div>
            </div>
            <div class="timer-box" id="timerDisplay">30s</div>
          </div>
          
          <div id="gameContainer">
            <canvas id="gameCanvas" width="1200" height="800"></canvas>
            
            <div class="overlay" id="foundOverlay">
              <h2>TROUVÉ !</h2>
              <p id="foundPositionText" style="font-size: 20px; color: white;">En attente des autres joueurs...</p>
            </div>
          </div>
      </div>

      <div class="game-sidebar">
          <h3 style="color: var(--cyan); font-family: 'Bebas Neue'; font-size: 28px; letter-spacing: 2px; margin-bottom: 15px; border-bottom: 1px solid rgba(255,255,255,0.2); padding-bottom: 10px; text-align: center;">CLASSEMENT EN DIRECT</h3>
          <div class="player-list" id="liveLeaderboard"></div>
      </div>
  </div>
</div>

<div class="screen" id="screenScores">
  <div class="logo" id="scoreTitle">RÉSULTATS</div>
  <div class="card">
    <div class="player-list" id="scoreList"></div>
    <div id="scoreControls" style="margin-top: 25px;"></div>
  </div>
</div>

<script>
// --- CONFIGURATION SUPABASE ---
const SUPABASE_URL = 'https://pdybshweyfvxzvngnuxe.supabase.co'; 
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBkeWJzaHdleWZ2eHp2bmdudXhlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ5NDg2MDAsImV4cCI6MjA5MDUyNDYwMH0.u442X28Mhs-4T-tydabnMm8now8VfAEeNU-Sicuipq4'; 
const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
const GAME_ID = 'wanted_main_lobby';

// --- IMAGES DU JEU ---
const targetImg = new Image(); targetImg.src = '../bingoudalo/avatar/dayoub.png';
const distractorSrcs = [
    '../bingoudalo/avatar/ellio.png',
    '../bingoudalo/avatar/paulin.png',
    '../bingoudalo/avatar/elian.png'
];
const distractorImgs = distractorSrcs.map(src => {
    let img = new Image(); img.src = src; return img;
});

// --- VARIABLES GLOBALES ---
let myPseudo = '';
let myAvatar = '';
let isMaster = false;
let dbSyncInterval = null;
let currentPhase = 'lobby';

let roundEndTime = 0;
let visualTimerInterval = null;
let isEndingRound = false;

const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d', { alpha: false });
ctx.imageSmoothingEnabled = false; 

let heads = [];
let animFrame;
let hasFound = false;

// --- INITIALISATION & AUTO-CONNEXION ---
window.onload = async () => {
    myPseudo = localStorage.getItem('cdsi_logged_user');
    
    if (!myPseudo) {
        window.location.href = '../index.html'; 
        return;
    }

    const { data, error } = await sb.from('cdsi_users').select('avatar').eq('pseudo', myPseudo).single();
    
    if (data && data.avatar) {
        myAvatar = '../' + data.avatar; 
    } else {
        myAvatar = '../bingoudalo/avatar/paulo1.jpg';
    }

    autoJoinLobby();
};

function showScreen(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

// --- BASE DE DONNÉES DU JEU ---
async function fetchState() {
    try {
        const {data, error} = await sb.from('bingo_state').select('data').eq('id', GAME_ID).maybeSingle();
        if (error) return null;
        return data?.data || null;
    } catch (e) { return null; }
}

async function updateState(newState) {
    try {
        await sb.from('bingo_state').upsert({ id: GAME_ID, data: newState, updated_at: new Date().toISOString() }, { onConflict: 'id' });
    } catch (e) {}
}

async function autoJoinLobby() {
    try {
        let state = await fetchState();
        if(!state || !state.players || typeof state.players !== 'object') {
            // J'ai enlevé gameEndedSaved, on n'en a plus besoin avec la nouvelle méthode
            state = { phase: 'lobby', master: myPseudo, round: 1, players: {}, roundWinners: [], roundEndTime: 0 };
        }

        isMaster = (state.master === myPseudo);
        if(!state.players[myPseudo]) {
            state.players[myPseudo] = { pseudo: myPseudo, avatar: myAvatar, score: 0 };
        } else {
            state.players[myPseudo].avatar = myAvatar; 
        }
        
        await updateState(state);
        showScreen('screenLobby');
        startSync();
    } catch (error) {
        alert("Erreur de connexion au serveur. Retour au Hub.");
        window.location.href = '../index.html';
    }
}

function startSync() {
    updateUI(null);
    if(dbSyncInterval) clearInterval(dbSyncInterval);
    dbSyncInterval = setInterval(async () => {
        const state = await fetchState();
        if(state) updateUI(state);
    }, 1000); 
}

function updateUI(state) {
    if(!state || !state.players) return;
    isMaster = (state.master === myPseudo);
    let playerCount = Object.keys(state.players).length;

    // LOBBY
    if(state.phase === 'lobby' && currentPhase !== 'lobby') {
        currentPhase = 'lobby'; showScreen('screenLobby');
    }
    if(state.phase === 'lobby') {
        document.getElementById('playersList').innerHTML = Object.values(state.players).map(p => `
            <div class="player-row">
                <div class="player-row-info">
                    <img src="${p.avatar}" onerror="this.src='https://via.placeholder.com/35/333/fff?text=?'">
                    <span>${p.pseudo} ${p.score > 0 ? `<span style="color:var(--yellow)">(${p.score} pts)</span>` : ''}</span>
                </div>
                ${state.master === p.pseudo ? '<span class="badge">Maître</span>' : ''}
            </div>
        `).join('');

        const ctrl = document.getElementById('lobbyControls');
        if(isMaster) {
            if (playerCount >= 2) {
                ctrl.innerHTML = `<button class="btn-primary" onclick="startRound()">Démarrer Manche ${state.round}</button>`;
            } else {
                ctrl.innerHTML = `<p style="color:var(--yellow); font-size:16px; font-weight:bold; text-align:center;">Il faut au moins 2 joueurs pour lancer la partie !</p>`;
            }
        } else {
            ctrl.innerHTML = `<p style="color:var(--cyan); font-size:14px; text-align:center;">En attente que le maître démarre...</p>`;
        }
    }

    // EN JEU
    if(state.phase === 'playing') {
        if(currentPhase !== 'playing') {
            currentPhase = 'playing';
            showScreen('screenGame'); 
            isEndingRound = false;
            roundEndTime = state.roundEndTime;
            initGameEngine(state.round);
            startVisualTimer();
        }
        
        document.getElementById('liveLeaderboard').innerHTML = Object.values(state.players).sort((a,b)=>b.score - a.score).map(p => {
            const hasFound = state.roundWinners.includes(p.pseudo);
            const glowClass = hasFound ? 'found-glow' : '';
            const statusText = hasFound ? '✓ Trouvé' : '...';
            
            return `
            <div class="player-row ${glowClass}">
                <div class="player-row-info">
                    <img src="${p.avatar}" onerror="this.src='https://via.placeholder.com/35/333/fff?text=?'">
                    <span>${p.pseudo}</span>
                </div>
                <span style="font-size: 14px; font-weight: normal;">${statusText}</span>
            </div>`;
        }).join('');
    }

    // VÉRIFICATION FIN DE MANCHE
    if(state.phase === 'playing' && isMaster && !isEndingRound) {
        let allFound = state.roundWinners.length === Object.keys(state.players).length;
        let timeUp = Date.now() > state.roundEndTime;
        
        if(allFound || timeUp) {
            isEndingRound = true;
            endRoundCompute(state);
        }
    }

    // RÉSULTATS
    if(state.phase === 'round_end' && currentPhase !== 'round_end') {
        currentPhase = 'round_end';
        if(visualTimerInterval) clearInterval(visualTimerInterval);
        showScreen('screenScores');
        document.getElementById('scoreTitle').innerText = state.round > 5 ? "CLASSEMENT FINAL" : "FIN DE LA MANCHE";
        
        let sortedPlayers = Object.values(state.players).sort((a,b) => b.score - a.score);
        document.getElementById('scoreList').innerHTML = sortedPlayers.map((p, i) => `
            <div class="player-row" style="${i===0 ? 'border-color:var(--yellow); box-shadow: 0 0 15px rgba(241, 196, 15, 0.3); background: rgba(241, 196, 15, 0.1);' : ''}">
                <div class="player-row-info">
                    <img src="${p.avatar}" onerror="this.src='https://via.placeholder.com/35/333/fff?text=?'">
                    <span style="${i===0 ? 'color:var(--yellow); font-size:18px;' : ''}">${i+1}. ${p.pseudo}</span>
                </div>
                <span style="font-size:22px; font-family:'Bebas Neue'; ${i===0 ? 'color:var(--yellow);' : ''}">${p.score} pts</span>
            </div>
        `).join('');

        const ctrl = document.getElementById('scoreControls');
        if(isMaster) {
            // On a supprimé la gestion de sauvegarde d'ici
            if(state.round > 5) {
                ctrl.innerHTML = `<button class="btn-magenta" onclick="resetGame()">Nouvelle Partie</button>`;
            } else {
                ctrl.innerHTML = `<button class="btn-primary" onclick="returnToLobby()">Manche Suivante</button>`;
            }
        } else {
            ctrl.innerHTML = `<p style="color:#bbb; font-size:14px; text-align:center;">En attente du maître...</p>`;
        }
    }
}

// --- LOGIQUE MULTIJOUEUR MAITRE ---
async function startRound() {
    let state = await fetchState();
    state.phase = 'playing';
    state.roundWinners = []; 
    state.roundEndTime = Date.now() + 32000; 
    await updateState(state);
}

// C'EST ICI QUE LA MAGIE OPÈRE MAINTENANT
async function endRoundCompute(state) {
    state.phase = 'round_end';
    
    // Distribution des points
    if(state.roundWinners[0]) state.players[state.roundWinners[0]].score += 3;
    if(state.roundWinners[1]) state.players[state.roundWinners[1]].score += 2;
    if(state.roundWinners[2]) state.players[state.roundWinners[2]].score += 1;
    
    // SI C'EST LA FIN DE LA 5ÈME MANCHE, ON SAUVEGARDE LA VICTOIRE DIRECTEMENT EN DB !
    if (state.round === 5) {
        let sortedPlayers = Object.values(state.players).sort((a,b) => b.score - a.score);
        if (sortedPlayers.length > 0) {
            let maxScore = sortedPlayers[0].score;
            let winners = sortedPlayers.filter(p => p.score === maxScore);
            
            for (let w of winners) {
                let {data} = await sb.from('cdsi_users').select('wanted_wins').eq('pseudo', w.pseudo).single();
                if (data) {
                    await sb.from('cdsi_users').update({ wanted_wins: (data.wanted_wins || 0) + 1 }).eq('pseudo', w.pseudo);
                }
            }
        }
    }

    state.round++;
    await updateState(state);
}

async function returnToLobby() {
    let state = await fetchState();
    state.phase = 'lobby';
    await updateState(state);
}

async function resetGame() {
    await sb.from('bingo_state').delete().eq('id', GAME_ID);
    location.reload();
}

// ==========================================
// MOTEUR DU JEU OPTIMISÉ EXTRÊME (CANVAS)
// ==========================================
function startVisualTimer() {
    const timerEl = document.getElementById('timerDisplay');
    if(visualTimerInterval) clearInterval(visualTimerInterval);
    visualTimerInterval = setInterval(() => {
        let remaining = Math.max(0, Math.ceil((roundEndTime - Date.now()) / 1000));
        timerEl.innerText = remaining + 's';
        if (remaining <= 5 && remaining > 0) timerEl.classList.add('hurry');
        else timerEl.classList.remove('hurry');
        if(remaining <= 0) clearInterval(visualTimerInterval);
    }, 100);
}

function createPreRenderedSprite(img, size) {
    let offscreen = document.createElement('canvas');
    offscreen.width = size;
    offscreen.height = size;
    let offCtx = offscreen.getContext('2d');
    if(img.complete && img.naturalHeight !== 0) {
        offCtx.drawImage(img, 0, 0, size, size);
    } else {
        offCtx.fillStyle = 'rgba(255,255,255,0.2)';
        offCtx.fillRect(0,0,size,size);
    }
    return offscreen;
}

function initGameEngine(round) {
    document.getElementById('roundDisplay').innerText = `MANCHE ${round}/5`;
    document.getElementById('foundOverlay').style.display = 'none';
    hasFound = false;

    let targetSize = 120 - (round * 8); 
    let speedMult = 2 + (round * 0.5); 
    let numDistractors = 40 * round;   

    heads = [];
    
    for(let i=0; i<numDistractors; i++) {
        let dImg = distractorImgs[Math.floor(Math.random() * distractorImgs.length)];
        let exactSize = (targetSize + (Math.random() * 20 - 10)) | 0;
        
        let sprite = createPreRenderedSprite(dImg, exactSize);

        heads.push({
            sprite: sprite,
            x: Math.random() * (canvas.width - exactSize),
            y: Math.random() * (canvas.height - exactSize),
            size: exactSize,
            vx: (Math.random() > 0.5 ? 1 : -1) * (Math.random() * 2 + speedMult),
            vy: (Math.random() > 0.5 ? 1 : -1) * (Math.random() * 2 + speedMult),
            isTarget: false
        });
    }

    let exactTargetSize = targetSize | 0;
    let targetSprite = createPreRenderedSprite(targetImg, exactTargetSize);

    heads.splice(Math.floor(heads.length / 2), 0, {
        sprite: targetSprite,
        x: Math.random() * (canvas.width - exactTargetSize),
        y: Math.random() * (canvas.height - exactTargetSize),
        size: exactTargetSize,
        vx: (Math.random() > 0.5 ? 1 : -1) * (Math.random() * 2 + speedMult),
        vy: (Math.random() > 0.5 ? 1 : -1) * (Math.random() * 2 + speedMult),
        isTarget: true
    });

    if(animFrame) cancelAnimationFrame(animFrame);
    gameLoop();
}

function gameLoop() {
    if(currentPhase !== 'playing' || hasFound) return;
    
    ctx.fillStyle = '#0b0c10';
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    for (let i = 0; i < heads.length; i++) {
        let h = heads[i];
        h.x += h.vx;
        h.y += h.vy;
        
        if(h.x <= 0 || h.x + h.size >= canvas.width) h.vx *= -1;
        if(h.y <= 0 || h.y + h.size >= canvas.height) h.vy *= -1;

        ctx.drawImage(h.sprite, h.x | 0, h.y | 0);
    }

    animFrame = requestAnimationFrame(gameLoop);
}

// --- GESTION DES CLICS ---
canvas.addEventListener('mousedown', async (e) => {
    if(hasFound || currentPhase !== 'playing' || Date.now() > roundEndTime) return;

    const rect = canvas.getBoundingClientRect();
    const scaleX = canvas.width / rect.width;
    const scaleY = canvas.height / rect.height;
    
    const clickX = (e.clientX - rect.left) * scaleX;
    const clickY = (e.clientY - rect.top) * scaleY;

    let clickedHead = null;
    for (let i = heads.length - 1; i >= 0; i--) {
        const h = heads[i];
        if (clickX >= h.x && clickX <= h.x + h.size && clickY >= h.y && clickY <= h.y + h.size) {
            clickedHead = h;
            break; 
        }
    }

    if (clickedHead && clickedHead.isTarget) {
        hasFound = true;
        document.getElementById('foundOverlay').style.display = 'flex';
        
        let state = await fetchState();
        if(state && !state.roundWinners.includes(myPseudo)) {
            state.roundWinners.push(myPseudo);
            
            let position = state.roundWinners.length;
            let text = position === 1 ? "1er ! (+3 pts)" : position === 2 ? "2ème ! (+2 pts)" : position === 3 ? "3ème ! (+1 pt)" : "Trouvé ! (+0 pt)";
            document.getElementById('foundPositionText').innerText = text;
            
            await updateState(state);
        }
    }
});

window.addEventListener("beforeunload", async () => {
    if (currentPhase === 'lobby' && isMaster) await sb.from('bingo_state').delete().eq('id', GAME_ID);
});
</script>
</body>
</html>
