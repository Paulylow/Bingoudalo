<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GAMBLE LE JEJ 🎰</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;700&display=swap" rel="stylesheet">
<style>
:root {
    --cyan: #00FFFF;
    --magenta: #FF00FF;
    --gold: #FFD700;
}

* { box-sizing:border-box; margin:0; padding:0; user-select:none; }

body {
    background:#0b0c10; color:#c5c6c7;
    font-family:'DM Sans',sans-serif; height:100vh;
    display:flex; flex-direction:column; overflow:hidden;
}

/* ── CANVAS BG ── */
#bg-canvas {
    position:fixed; top:0; left:0; width:100%; height:100%;
    pointer-events:none; z-index:0; opacity:0.07;
}

/* ── RETOUR HUB ── */
#hub-link {
    position:fixed; top:14px; left:16px; z-index:200;
    display:flex; align-items:center; gap:6px;
    color:#00FFFF; font-family:'Bebas Neue'; font-size:14px; letter-spacing:1.5px;
    text-decoration:none; padding:5px 12px;
    border:1px solid rgba(0,255,255,0.35); border-radius:5px;
    background:rgba(0,0,0,0.6);
    transition:background 0.2s, border-color 0.2s;
}
#hub-link:hover { background:rgba(0,255,255,0.1); border-color:#00FFFF; }

/* ── HEADER ── */
header {
    text-align:center; padding:12px 12px 12px 140px;
    background:rgba(0,0,0,0.65); border-bottom:2px solid #1f2833;
    position:relative; z-index:10; flex-shrink:0;
}
h1 {
    font-family:'Bebas Neue'; font-size:38px; letter-spacing:4px;
    background:linear-gradient(90deg,#00FFFF,#FF00FF);
    -webkit-background-clip:text; -webkit-text-fill-color:transparent;
}
.header-sub {
    font-size:12px; color:#555; letter-spacing:2px; font-family:'Bebas Neue';
    margin-top:2px;
}

/* ── LAYOUT ── */
.game-wrapper {
    flex:1; display:flex; align-items:center; justify-content:center;
    position:relative; z-index:1; padding:20px;
    gap:40px;
}

/* ── MACHINE À SOUS ── */
.machine {
    background:linear-gradient(160deg, #0d0f1a 0%, #12141f 100%);
    border:2px solid #2a2a3a;
    border-radius:20px;
    padding:30px 36px 36px;
    box-shadow:0 0 60px rgba(0,255,255,0.08), 0 0 120px rgba(255,0,255,0.04), inset 0 0 40px rgba(0,0,0,0.5);
    display:flex; flex-direction:column; align-items:center; gap:24px;
    min-width:520px;
    position:relative;
}

/* Déco bords machine */
.machine::before {
    content:''; position:absolute; inset:-1px; border-radius:20px;
    background:linear-gradient(135deg, rgba(0,255,255,0.2), transparent 40%, rgba(255,0,255,0.15));
    pointer-events:none; z-index:-1;
}

.machine-title {
    font-family:'Bebas Neue'; font-size:16px; letter-spacing:4px;
    color:#444; text-align:center;
}

/* ── FENÊTRE ROULEAUX ── */
.reels-frame {
    background:#050608;
    border:3px solid #1a1a2e;
    border-radius:12px;
    padding:10px;
    box-shadow:inset 0 0 30px rgba(0,0,0,0.8), 0 0 20px rgba(0,255,255,0.05);
    position:relative;
    overflow:hidden;
}

/* Ligne de résultat */
.reels-frame::after {
    content:''; position:absolute;
    top:50%; left:0; right:0;
    height:3px;
    background:linear-gradient(90deg, transparent, rgba(0,255,255,0.6), rgba(255,0,255,0.6), transparent);
    transform:translateY(-50%);
    pointer-events:none; z-index:10;
}

.reels {
    display:flex; gap:10px;
}

/* ── ROULEAU ── */
.reel-container {
    width:110px; height:110px;
    overflow:hidden; border-radius:8px;
    background:#08090e;
    border:1px solid #1f2833;
    position:relative;
}

.reel {
    display:flex; flex-direction:column;
    transition:transform 0.05s linear;
}

.reel-cell {
    width:110px; height:110px;
    display:flex; align-items:center; justify-content:center;
    font-size:64px;
    flex-shrink:0;
    background:#08090e;
}

/* ── LIGNE DE MISE ── */
.payline {
    position:absolute; top:50%; left:-6px; right:-6px;
    height:2px; background:rgba(0,255,255,0.2);
    transform:translateY(-50%); pointer-events:none; z-index:5;
    transition:background 0.3s;
}
.payline.win { background:rgba(255,215,0,0.7); box-shadow:0 0 12px #FFD700; }

/* ── CREDITS & BET ── */
.stats-row {
    display:flex; gap:24px; align-items:center;
}
.stat-box {
    background:rgba(0,0,0,0.5);
    border:1px solid #1f2833;
    border-radius:8px; padding:10px 18px;
    text-align:center; min-width:110px;
}
.stat-label {
    font-family:'Bebas Neue'; font-size:11px; letter-spacing:2px;
    color:#555; margin-bottom:4px;
}
.stat-value {
    font-family:'Bebas Neue'; font-size:28px;
    color:#fff; text-shadow:0 0 12px rgba(0,255,255,0.4);
    transition:color 0.3s, text-shadow 0.3s;
}
.stat-value.win { color:#FFD700; text-shadow:0 0 20px #FFD700; }
.stat-value.lose { color:#ff4444; text-shadow:0 0 12px rgba(255,68,68,0.4); }

#credits-val { color:#00FFFF; text-shadow:0 0 12px rgba(0,255,255,0.5); }

/* ── BOUTONS MISE ── */
.bet-controls {
    display:flex; gap:8px; align-items:center;
}
.bet-btn {
    font-family:'Bebas Neue'; font-size:13px; letter-spacing:1px;
    color:#FF00FF; background:transparent;
    border:1px solid rgba(255,0,255,0.4); border-radius:5px;
    padding:4px 12px; transition:0.15s;
}
.bet-btn:hover { background:rgba(255,0,255,0.15); border-color:#FF00FF; }
.bet-btn.active { background:rgba(255,0,255,0.2); border-color:#FF00FF; color:#fff; }

/* ── TIRETTE ── */
.lever-area {
    display:flex; flex-direction:column; align-items:center; gap:0;
    position:relative;
}

.lever-track {
    width:18px; height:200px;
    background:linear-gradient(180deg, #1a1a2e, #0d0f1a);
    border:1px solid #2a2a3a;
    border-radius:9px;
    position:relative;
    box-shadow:inset 0 0 10px rgba(0,0,0,0.6);
}

.lever-ball {
    width:40px; height:40px; border-radius:50%;
    background:radial-gradient(circle at 38% 35%, #ff6666, #cc1111 50%, #880000);
    border:2px solid rgba(255,255,255,0.3);
    box-shadow:0 0 20px rgba(255,30,0,0.6), 0 4px 10px rgba(0,0,0,0.5);
    position:absolute; left:50%; top:10px;
    transform:translateX(-50%);
    transition:top 0.1s ease, box-shadow 0.2s;
    cursor:pointer;
}

.lever-ball:hover {
    box-shadow:0 0 30px rgba(255,30,0,0.9), 0 4px 10px rgba(0,0,0,0.5);
    top:6px;
}

.lever-ball.pulled { top:150px; }
.lever-ball.spinning { cursor:not-allowed; }

.lever-arm {
    width:4px; height:100%; position:absolute; left:50%;
    transform:translateX(-50%);
    background:linear-gradient(180deg, #333, #222);
    border-radius:2px;
    z-index:-1;
}

.lever-label {
    font-family:'Bebas Neue'; font-size:11px; letter-spacing:2px;
    color:#333; margin-top:8px; text-align:center;
}

/* ── BOUTON SPIN (alternative mobile) ── */
.spin-btn {
    font-family:'Bebas Neue'; font-size:20px; letter-spacing:3px;
    background:linear-gradient(135deg, rgba(0,255,255,0.15), rgba(255,0,255,0.15));
    border:2px solid #00FFFF; color:#00FFFF;
    border-radius:10px; padding:12px 36px;
    transition:0.2s; width:100%;
    box-shadow:0 0 20px rgba(0,255,255,0.1);
}
.spin-btn:hover:not(:disabled) {
    background:linear-gradient(135deg, rgba(0,255,255,0.3), rgba(255,0,255,0.2));
    box-shadow:0 0 35px rgba(0,255,255,0.25);
    transform:scale(1.02);
}
.spin-btn:disabled {
    opacity:0.4; cursor:not-allowed; transform:none;
}

/* ── RÉSULTAT MESSAGE ── */
.result-msg {
    font-family:'Bebas Neue'; font-size:22px; letter-spacing:3px;
    min-height:32px; text-align:center;
    color:#555; transition:color 0.3s, text-shadow 0.3s;
}
.result-msg.win { color:#FFD700; text-shadow:0 0 20px #FFD700; animation:msgPop 0.4s cubic-bezier(.17,.89,.32,1.28); }
.result-msg.lose { color:#ff4444; }
.result-msg.jackpot { color:#FF00FF; text-shadow:0 0 30px #FF00FF; animation:msgPop 0.4s cubic-bezier(.17,.89,.32,1.28); }
@keyframes msgPop{0%{transform:scale(0.7);opacity:0}100%{transform:scale(1);opacity:1}}

/* ── TABLEAU DES GAINS (panneau droite) ── */
.pay-table {
    background:linear-gradient(160deg, #0d0f1a 0%, #12141f 100%);
    border:1px solid #1f2833;
    border-radius:16px;
    padding:24px 20px;
    min-width:200px;
    max-width:220px;
    box-shadow:inset 0 0 20px rgba(0,0,0,0.4);
}

.pay-table-title {
    font-family:'Bebas Neue'; font-size:18px; letter-spacing:3px;
    color:#FF00FF; border-bottom:1px solid #1f2833;
    padding-bottom:10px; margin-bottom:14px;
    text-align:center;
}

.pay-row {
    display:flex; justify-content:space-between; align-items:center;
    padding:6px 0; border-bottom:1px solid rgba(255,255,255,0.03);
    font-size:13px;
}
.pay-row:last-child { border-bottom:none; }
.pay-symbols { font-size:18px; letter-spacing:2px; }
.pay-mult {
    font-family:'Bebas Neue'; font-size:16px; letter-spacing:1px;
    color:#00FFFF;
}
.pay-row.jackpot-row .pay-mult { color:#FF00FF; text-shadow:0 0 10px #FF00FF; }
.pay-row.jackpot-row .pay-symbols { animation:floatEmoji 2s ease-in-out infinite; }
@keyframes floatEmoji{0%,100%{transform:translateY(0)}50%{transform:translateY(-3px)}}

.pay-note {
    margin-top:14px; font-size:10px; color:#333; text-align:center;
    letter-spacing:1px; font-family:'Bebas Neue';
}

/* ── HISTORIQUE ── */
.history {
    background:linear-gradient(160deg, #0d0f1a 0%, #12141f 100%);
    border:1px solid #1f2833;
    border-radius:16px;
    padding:20px;
    min-width:160px;
    max-width:180px;
    box-shadow:inset 0 0 20px rgba(0,0,0,0.4);
    max-height:360px;
    overflow:hidden;
}

.history-title {
    font-family:'Bebas Neue'; font-size:16px; letter-spacing:3px;
    color:#444; margin-bottom:12px; text-align:center;
}

.history-list { display:flex; flex-direction:column; gap:6px; }

.history-item {
    display:flex; justify-content:space-between; align-items:center;
    padding:4px 8px; border-radius:5px;
    background:rgba(255,255,255,0.02);
    font-size:11px; border:1px solid rgba(255,255,255,0.03);
    animation:itemPop 0.25s ease;
}
@keyframes itemPop{0%{transform:scale(0);opacity:0}60%{transform:scale(1.05)}100%{transform:scale(1);opacity:1}}

.history-item.h-win { border-color:rgba(255,215,0,0.2); background:rgba(255,215,0,0.05); }
.history-item.h-jackpot { border-color:rgba(255,0,255,0.3); background:rgba(255,0,255,0.07); }
.history-item.h-lose { border-color:rgba(255,255,255,0.02); }
.history-symbols { font-size:14px; }
.history-result { font-family:'Bebas Neue'; font-size:12px; color:#444; }
.history-item.h-win .history-result { color:#FFD700; }
.history-item.h-jackpot .history-result { color:#FF00FF; }

/* ── WIN FLASH OVERLAY ── */
#win-flash {
    position:fixed; inset:0; pointer-events:none; z-index:900;
    opacity:0; transition:opacity 0.1s;
    background:radial-gradient(ellipse at center, rgba(255,215,0,0.15), transparent 70%);
}
#win-flash.active { opacity:1; animation:flashAnim 0.6s ease-out forwards; }
@keyframes flashAnim{0%{opacity:0.8}100%{opacity:0}}

/* ── CONFETTIS ── */
#confetti-canvas {
    position:fixed; inset:0; pointer-events:none; z-index:800;
}

/* ── NOTIF TOAST ── */
#notif {
    position:fixed; bottom:24px; left:50%; transform:translateX(-50%) translateY(60px);
    background:#0d0f1a; border:1px solid #2a2a3a;
    border-radius:8px; padding:10px 24px;
    font-family:'Bebas Neue'; font-size:16px; letter-spacing:2px; color:#fff;
    z-index:1000; transition:transform 0.3s ease;
    pointer-events:none;
}
#notif.show { transform:translateX(-50%) translateY(0); }

/* ── RESPONSIVE ajustements ── */
@media (max-width:900px) {
    .pay-table, .history { display:none; }
    .machine { min-width:unset; width:100%; max-width:500px; }
}
</style>
</head>
<body>

<!-- RETOUR HUB -->
<a id="hub-link" href="../../index.html">◀ HUB</a>

<!-- CANVAS FOND -->
<canvas id="bg-canvas"></canvas>
<canvas id="confetti-canvas"></canvas>
<div id="win-flash"></div>
<div id="notif"></div>

<!-- HEADER -->
<header>
    <h1>GAMBLE LE JEJ</h1>
    <div class="header-sub">🎰 MACHINE À SOUS · CASINO BINGOUDALO</div>
</header>

<!-- LAYOUT PRINCIPAL -->
<div class="game-wrapper">

    <!-- PANNEAU GAUCHE : TABLEAU DES GAINS -->
    <div class="pay-table">
        <div class="pay-table-title">GAINS</div>
        <div class="pay-row jackpot-row">
            <span class="pay-symbols">🍒🍒🍒</span>
            <span class="pay-mult">×50</span>
        </div>
        <div class="pay-row jackpot-row">
            <span class="pay-symbols">💎💎💎</span>
            <span class="pay-mult">×30</span>
        </div>
        <div class="pay-row">
            <span class="pay-symbols">7️⃣7️⃣7️⃣</span>
            <span class="pay-mult">×20</span>
        </div>
        <div class="pay-row">
            <span class="pay-symbols">⭐⭐⭐</span>
            <span class="pay-mult">×15</span>
        </div>
        <div class="pay-row">
            <span class="pay-symbols">🍋🍋🍋</span>
            <span class="pay-mult">×10</span>
        </div>
        <div class="pay-row">
            <span class="pay-symbols">🍊🍊🍊</span>
            <span class="pay-mult">×8</span>
        </div>
        <div class="pay-row">
            <span class="pay-symbols">🔔🔔🔔</span>
            <span class="pay-mult">×6</span>
        </div>
        <div class="pay-row">
            <span class="pay-symbols">🍇🍇🍇</span>
            <span class="pay-mult">×5</span>
        </div>
        <div class="pay-row">
            <span class="pay-symbols">✦✦ paire</span>
            <span class="pay-mult">×2</span>
        </div>
        <div class="pay-note">TOUTE PAIRE DE SYMBOLES GAGNE ×2</div>
    </div>

    <!-- MACHINE -->
    <div class="machine">
        <div class="machine-title">· INSÉREZ MISE ET TIREZ ·</div>

        <!-- ROULEAUX -->
        <div class="reels-frame">
            <div class="payline" id="payline"></div>
            <div class="reels">
                <div class="reel-container"><div class="reel" id="reel-0"></div></div>
                <div class="reel-container"><div class="reel" id="reel-1"></div></div>
                <div class="reel-container"><div class="reel" id="reel-2"></div></div>
            </div>
        </div>

        <!-- RÉSULTAT -->
        <div class="result-msg" id="result-msg">TIREZ LA TIRETTE !</div>

        <!-- STATS -->
        <div class="stats-row">
            <div class="stat-box">
                <div class="stat-label">CRÉDITS</div>
                <div class="stat-value" id="credits-val">100</div>
            </div>
            <div class="stat-box">
                <div class="stat-label">MISE</div>
                <div class="stat-value" id="bet-val">5</div>
            </div>
            <div class="stat-box">
                <div class="stat-label">DERNIER GAIN</div>
                <div class="stat-value" id="last-win-val">—</div>
            </div>
        </div>

        <!-- CONTRÔLES MISE -->
        <div class="bet-controls">
            <span style="font-family:'Bebas Neue';font-size:12px;letter-spacing:2px;color:#444;">MISE :</span>
            <button class="bet-btn" onclick="setBet(1)">×1</button>
            <button class="bet-btn active" onclick="setBet(5)">×5</button>
            <button class="bet-btn" onclick="setBet(10)">×10</button>
            <button class="bet-btn" onclick="setBet(25)">×25</button>
            <button class="bet-btn" onclick="setBet(50)">MAX</button>
        </div>

        <!-- BOUTON SPIN -->
        <button class="spin-btn" id="spin-btn" onclick="spin()">🎰 JOUER</button>
    </div>

    <!-- PANNEAU DROITE : TIRETTE + HISTORIQUE -->
    <div style="display:flex;flex-direction:column;align-items:center;gap:20px;">

        <!-- TIRETTE -->
        <div class="lever-area">
            <div class="lever-track" id="lever-track">
                <div class="lever-arm"></div>
                <div class="lever-ball" id="lever-ball" onclick="spin()"></div>
            </div>
            <div class="lever-label">TIRER</div>
        </div>

        <!-- HISTORIQUE -->
        <div class="history">
            <div class="history-title">HISTORIQUE</div>
            <div class="history-list" id="history-list"></div>
        </div>
    </div>

</div>

<script>
/* ── CONFIG ── */
const SYMBOLS = ['🍒','💎','7️⃣','⭐','🍋','🍊','🔔','🍇'];
const WEIGHTS  = [  5,   3,   4,   6,   9,   10,   9,  10]; // Fréquence relative

const PAYOUTS = {
    '🍒': 50, '💎': 30, '7️⃣': 20, '⭐': 15,
    '🍋': 10, '🍊': 8, '🔔': 6, '🍇': 5
};

let credits = 100;
let bet = 5;
let spinning = false;
let history = [];

/* ── BG CANVAS ── */
const bgC = document.getElementById('bg-canvas');
const bgCtx = bgC.getContext('2d');
let particles = [];

function resizeBg() {
    bgC.width = window.innerWidth;
    bgC.height = window.innerHeight;
}
resizeBg();
window.addEventListener('resize', resizeBg);

for (let i = 0; i < 60; i++) {
    particles.push({
        x: Math.random() * window.innerWidth,
        y: Math.random() * window.innerHeight,
        r: Math.random() * 1.5 + 0.5,
        vx: (Math.random() - 0.5) * 0.3,
        vy: (Math.random() - 0.5) * 0.3,
        a: Math.random()
    });
}

function drawBg() {
    bgCtx.clearRect(0, 0, bgC.width, bgC.height);
    particles.forEach(p => {
        p.x += p.vx; p.y += p.vy;
        if (p.x < 0) p.x = bgC.width;
        if (p.x > bgC.width) p.x = 0;
        if (p.y < 0) p.y = bgC.height;
        if (p.y > bgC.height) p.y = 0;
        bgCtx.beginPath();
        bgCtx.arc(p.x, p.y, p.r, 0, Math.PI*2);
        bgCtx.fillStyle = `rgba(0,255,255,${p.a * 0.8})`;
        bgCtx.fill();
    });
    requestAnimationFrame(drawBg);
}
drawBg();

/* ── CONFETTIS ── */
const confC = document.getElementById('confetti-canvas');
const confCtx = confC.getContext('2d');
let confettiPieces = [];

function resizeConf() { confC.width = window.innerWidth; confC.height = window.innerHeight; }
resizeConf();
window.addEventListener('resize', resizeConf);

function launchConfetti(big = false) {
    const count = big ? 120 : 50;
    const colors = big
        ? ['#FF00FF','#00FFFF','#FFD700','#ff4444','#ffffff']
        : ['#FFD700','#00FFFF','#ffffff'];
    for (let i = 0; i < count; i++) {
        confettiPieces.push({
            x: window.innerWidth / 2 + (Math.random()-0.5)*200,
            y: window.innerHeight * 0.4,
            vx: (Math.random()-0.5) * (big ? 14 : 8),
            vy: -(Math.random() * (big ? 18 : 12) + 4),
            color: colors[Math.floor(Math.random()*colors.length)],
            size: Math.random() * (big ? 12 : 8) + 4,
            rot: Math.random()*360, rotV: (Math.random()-0.5)*10,
            life: 1
        });
    }
    animConfetti();
}

let confAnimId = null;
function animConfetti() {
    if (confAnimId) cancelAnimationFrame(confAnimId);
    confCtx.clearRect(0,0,confC.width,confC.height);
    confettiPieces = confettiPieces.filter(p => p.life > 0);
    confettiPieces.forEach(p => {
        p.x += p.vx; p.y += p.vy;
        p.vy += 0.4; p.vx *= 0.99;
        p.rot += p.rotV; p.life -= 0.012;
        confCtx.save();
        confCtx.globalAlpha = p.life;
        confCtx.translate(p.x, p.y);
        confCtx.rotate(p.rot * Math.PI/180);
        confCtx.fillStyle = p.color;
        confCtx.fillRect(-p.size/2, -p.size/2, p.size, p.size*0.5);
        confCtx.restore();
    });
    if (confettiPieces.length > 0) confAnimId = requestAnimationFrame(animConfetti);
    else { confCtx.clearRect(0,0,confC.width,confC.height); confAnimId = null; }
}

/* ── INIT ROULEAUX ── */
function pickSymbol() {
    const total = WEIGHTS.reduce((a,b) => a+b, 0);
    let r = Math.random() * total;
    for (let i=0; i<SYMBOLS.length; i++) {
        r -= WEIGHTS[i];
        if (r <= 0) return SYMBOLS[i];
    }
    return SYMBOLS[SYMBOLS.length-1];
}

function buildReel(id) {
    const reel = document.getElementById(`reel-${id}`);
    reel.innerHTML = '';
    // 20 cellules pour le scroll
    for (let i=0; i<20; i++) {
        const cell = document.createElement('div');
        cell.className = 'reel-cell';
        cell.textContent = pickSymbol();
        reel.appendChild(cell);
    }
}

function initReels() {
    for (let i=0; i<3; i++) buildReel(i);
}

/* ── LECTURE RÉSULTAT ── */
function getCurrentSymbol(reelId) {
    const reel = document.getElementById(`reel-${reelId}`);
    const cells = reel.querySelectorAll('.reel-cell');
    // La cellule centrale visible est l'index 1 si on affiche depuis le haut
    // Après animation on lit le dernier état
    return reel.dataset.result || cells[cells.length - 1].textContent;
}

/* ── ANIMATION ROULEAU ── */
function spinReel(reelId, finalSymbol, duration) {
    return new Promise(resolve => {
        const reel = document.getElementById(`reel-${reelId}`);

        // Remplir de nouveaux symboles aléatoires + le résultat final à la fin
        reel.innerHTML = '';
        const cellCount = 18;
        for (let i=0; i<cellCount; i++) {
            const cell = document.createElement('div');
            cell.className = 'reel-cell';
            cell.textContent = pickSymbol();
            reel.appendChild(cell);
        }
        // Cellule finale = le résultat
        const finalCell = document.createElement('div');
        finalCell.className = 'reel-cell';
        finalCell.textContent = finalSymbol;
        reel.appendChild(finalCell);

        reel.dataset.result = finalSymbol;

        // Animation CSS : on fait défiler de haut en bas
        const cellH = 110;
        const totalH = (cellCount) * cellH; // distance à parcourir
        reel.style.transition = 'none';
        reel.style.transform = `translateY(-${totalH}px)`;

        requestAnimationFrame(() => {
            requestAnimationFrame(() => {
                reel.style.transition = `transform ${duration}ms cubic-bezier(0.17, 0.67, 0.35, 1.0)`;
                reel.style.transform = 'translateY(0px)';
                setTimeout(resolve, duration);
            });
        });
    });
}

/* ── LEVER ── */
function animLever(callback) {
    const ball = document.getElementById('lever-ball');
    ball.classList.add('pulled');
    setTimeout(() => {
        ball.classList.remove('pulled');
        if (callback) callback();
    }, 400);
}

/* ── SPIN PRINCIPAL ── */
async function spin() {
    if (spinning) return;
    if (credits < bet) {
        showNotif('❌ PAS ASSEZ DE CRÉDITS !');
        if (credits <= 0) setTimeout(resetCredits, 1500);
        return;
    }

    spinning = true;
    credits -= bet;
    updateUI();
    document.getElementById('spin-btn').disabled = true;
    document.getElementById('lever-ball').classList.add('spinning');
    document.getElementById('result-msg').className = 'result-msg';
    document.getElementById('result-msg').textContent = '…';
    document.getElementById('payline').classList.remove('win');

    animLever();

    // Déterminer les résultats
    const results = [pickSymbol(), pickSymbol(), pickSymbol()];

    // Lancer les rouleaux avec délais
    const durations = [1200, 1600, 2100];
    const promises = results.map((sym, i) =>
        new Promise(r => setTimeout(() => spinReel(i, sym, durations[i]).then(r), i * 180))
    );
    await Promise.all(promises);

    // Calculer le gain
    const win = calcWin(results, bet);

    if (win > 0) credits += win;
    updateUI(win);
    addHistory(results, win);
    showResult(results, win);

    spinning = false;
    document.getElementById('spin-btn').disabled = false;
    document.getElementById('lever-ball').classList.remove('spinning');
}

function calcWin(results, bet) {
    const [a, b, c] = results;
    // Jackpot : 3 identiques
    if (a === b && b === c) {
        return bet * (PAYOUTS[a] || 5);
    }
    // Paire
    if (a === b || b === c || a === c) {
        return bet * 2;
    }
    return 0;
}

function showResult(results, win) {
    const msg = document.getElementById('result-msg');
    const payline = document.getElementById('payline');
    const lastWin = document.getElementById('last-win-val');

    const [a, b, c] = results;
    const isJackpot = a === b && b === c;
    const isPair = !isJackpot && (a===b || b===c || a===c);

    if (isJackpot) {
        const mult = PAYOUTS[a] || 5;
        msg.textContent = `JACKPOT ! ×${mult} → +${win} CRÉDITS`;
        msg.className = 'result-msg jackpot';
        payline.classList.add('win');
        lastWin.textContent = `+${win}`;
        lastWin.className = 'stat-value win';
        document.getElementById('win-flash').classList.add('active');
        setTimeout(() => document.getElementById('win-flash').classList.remove('active'), 700);
        launchConfetti(mult >= 20);
    } else if (isPair) {
        msg.textContent = `PAIRE ! ×2 → +${win} CRÉDITS`;
        msg.className = 'result-msg win';
        payline.classList.add('win');
        lastWin.textContent = `+${win}`;
        lastWin.className = 'stat-value win';
        document.getElementById('win-flash').classList.add('active');
        setTimeout(() => document.getElementById('win-flash').classList.remove('active'), 500);
        if (win >= 20) launchConfetti(false);
    } else {
        msg.textContent = 'PERDU…';
        msg.className = 'result-msg lose';
        lastWin.textContent = '—';
        lastWin.className = 'stat-value';
    }
}

/* ── UI ── */
function updateUI(win) {
    document.getElementById('credits-val').textContent = credits;
    document.getElementById('bet-val').textContent = bet;
}

function setBet(val) {
    if (spinning) return;
    bet = Math.min(val, credits);
    document.querySelectorAll('.bet-btn').forEach(b => b.classList.remove('active'));
    event.target.classList.add('active');
    updateUI();
}

function resetCredits() {
    credits = 100;
    updateUI();
    showNotif('🎰 CRÉDITS RECHARGÉS ! +100');
}

/* ── HISTORIQUE ── */
function addHistory(results, win) {
    const isJackpot = results[0]===results[1] && results[1]===results[2];
    const isPair = !isJackpot && (results[0]===results[1] || results[1]===results[2] || results[0]===results[2]);

    history.unshift({ results, win, isJackpot, isPair });
    if (history.length > 6) history.pop();

    const list = document.getElementById('history-list');
    list.innerHTML = '';
    history.forEach(h => {
        const cls = h.isJackpot ? 'h-jackpot' : h.isPair ? 'h-win' : 'h-lose';
        const label = h.win > 0 ? `+${h.win}` : `-${bet}`;
        list.innerHTML += `
        <div class="history-item ${cls}">
            <span class="history-symbols">${h.results.join('')}</span>
            <span class="history-result">${label}</span>
        </div>`;
    });
}

/* ── NOTIF ── */
function showNotif(msg) {
    const el = document.getElementById('notif');
    el.textContent = msg;
    el.classList.add('show');
    setTimeout(() => el.classList.remove('show'), 2500);
}

/* ── INIT ── */
initReels();
updateUI();

// Remise à zéro auto si plus de crédits après un spin
setInterval(() => {
    if (!spinning && credits <= 0) {
        setTimeout(() => {
            credits = 100;
            updateUI();
            showNotif('🎰 CRÉDITS RECHARGÉS ! +100');
        }, 2000);
    }
}, 1000);
</script>
